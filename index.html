{fr:{ti:"Piloter par l'indice de consommation (IC)",tx:[
 "L'indice de consommation (IC) est l'indicateur de performance le plus important en engraissement porcin. Il mesure l'efficacité avec laquelle votre porc transforme l'aliment en viande : IC = kilos d'aliment consommés ÷ kilos de poids vif gagné. Exemple : un porc qui mange 280 kg d'aliment pour passer de 30 kg à 110 kg gagne 80 kg — son IC est de 280 ÷ 80 = 3,5. Repères : 2,8 à 3,2 pour une race améliorée bien conduite, 4 à 5 pour le porc local.",
 "Pesez chaque semaine un échantillon représentatif de 5 à 10 porcs à l'engrais — toujours le même jour, à jeun de préférence. Le gain moyen quotidien (GMQ) = gain de poids (kg) ÷ nombre de jours. Un porc amélioré en bonne conduite gagne 600 à 800 g par jour. En dessous de 500 g, quelque chose ne va pas : chaleur, aliment déséquilibré, maladie, ou porc hors de sa fenêtre optimale d'engraissement.",
 "L'IC se dégrade inexorablement après 110–120 kg : le porc continue à manger autant mais engraisse davantage en graisse qu'en muscle. La valeur commerciale par kilo chute. Vendez entre 90 et 110 kg pour maximiser la marge. Tenez un tableau de suivi hebdomadaire dans CuniSmart Finances : entrez le coût de l'aliment et le poids des porcs, et vous connaissez votre coût de production réel à la semaine."],
 qz:[{q:"L'indice de consommation (IC) se calcule par…",o:["Nombre de porcs ÷ surface de la porcherie","Kilos d'aliment consommés ÷ kilos de poids vif gagné","Prix de l'aliment × nombre de porcs"],b:1},
     {q:"Un IC de 3,5 pour un porc local est…",o:["Excellent","Acceptable pour un porc local","Catastrophique"],b:1},
     {q:"Le gain moyen quotidien (GMQ) attendu pour un porc amélioré en bonne conduite est…",o:["100–200 g/jour","600–800 g/jour","2 kg/jour"],b:1},
     {q:"Après 110–120 kg, l'IC du porc se dégrade car…",o:["Il mange moins","Il engraisse en graisse plutôt qu'en muscle","Il tombe systématiquement malade"],b:1},
     {q:"Pour calculer l'IC hebdomadaire, il faut obligatoirement…",o:["Observer le comportement du porc","Peser régulièrement un échantillon de porcs","Compter le nombre de repas par jour"],b:1}]},
 en:{ti:"Managing by feed conversion ratio (FCR)",tx:[
 "Feed conversion ratio (FCR) is the most important performance indicator in pig fattening. It measures how efficiently your pig turns feed into meat: FCR = kg of feed consumed ÷ kg of live weight gained. Example: a pig eating 280 kg of feed to go from 30 kg to 110 kg gains 80 kg — its FCR is 280 ÷ 80 = 3.5. Benchmarks: 2.8 to 3.2 for a well-managed improved breed, 4–5 for the local pig.",
 "Weigh a representative sample of 5–10 fattening pigs weekly — always the same day, preferably fasted. Average daily gain (ADG) = weight gain (kg) ÷ number of days. A well-managed improved pig gains 600–800 g per day. Below 500 g, something is wrong: heat, unbalanced feed, disease, or pig outside its optimal fattening window.",
 "FCR deteriorates inexorably above 110–120 kg: the pig keeps eating as much but lays down fat rather than muscle. Commercial value per kg drops. Sell between 90 and 110 kg to maximise margin. Keep a weekly tracking table in CuniSmart Finances: enter feed cost and pig weight, and you know your real production cost week by week."],
 qz:[{q:"Feed conversion ratio (FCR) is calculated as…",o:["Number of pigs ÷ house floor area","Kg feed consumed ÷ kg live weight gained","Feed price × number of pigs"],b:1},
     {q:"An FCR of 3.5 for a local pig is…",o:["Excellent","Acceptable for a local pig","Catastrophic"],b:1},
     {q:"Expected average daily gain (ADG) for a well-managed improved pig is…",o:["100–200 g/day","600–800 g/day","2 kg/day"],b:1},
     {q:"Above 110–120 kg, FCR deteriorates because…",o:["The pig eats less","It lays down fat rather than muscle","It systematically falls sick"],b:1},
     {q:"To calculate weekly FCR, you must…",o:["Observe pig behaviour","Weigh a regular sample of pigs","Count the number of meals per day"],b:1}]}},
{fr:{ti:"Biosécurité avancée et protocole PPA",tx:[
 "Une porcherie sécurisée fonctionne en zones distinctes : zone sale (extérieur, véhicules, accès public), zone de transition (vestiaire avec bottes et blouses dédiées, pédiluve à désinfectant renouvelé), zone propre (bâtiments d'élevage), zone ultra-protégée (maternité). Aucun animal, aucun véhicule, aucun visiteur ne doit passer d'une zone à l'autre sans le protocole de transition.",
 "Le registre des visiteurs est obligatoire et vital en zone d'endémie PPA : notez nom, date, dernier élevage visité. Un visiteur venant d'un autre élevage porcin dans les 72 heures ne doit pas entrer dans votre porcherie. Les cadavres de porcs ne doivent jamais être abandonnés — enterrement profond (1,5 m) ou incinération immédiate. Les chiens et charognards peuvent transporter le virus sur plusieurs kilomètres. L'aliment est aussi un vecteur : stockez les sacs à l'abri des rongeurs (vecteurs de tiques), ne mélangez jamais les aliments provenant de fermes différentes sans source vérifiée.",
 "Plan de crise PPA : affichez dans votre porcherie le numéro du vétérinaire de zone et celui de l'autorité sanitaire. Formez vos employés aux signes cliniques et à la procédure d'isolement. En cas de foyer, l'abattage précipité pour la vente accélère la propagation — c'est une tentation économique compréhensible mais désastreuse. En Afrique centrale, la déclaration rapide aux autorités peut déclencher des mesures de soutien. Un éleveur préparé perd moins, même en cas de crise."],
 qz:[{q:"Un visiteur venant d'un autre élevage porcin ne doit pas entrer dans votre porcherie pendant…",o:["1 heure","72 heures","30 jours"],b:1},
     {q:"Un cadavre de porc doit être…",o:["Abandonné à l'extérieur","Enterré à 1,5 m de profondeur ou incinéré immédiatement","Donné aux chiens de la ferme"],b:1},
     {q:"Le pédiluve à l'entrée de la porcherie doit être…",o:["Rempli d'eau simple","Rempli de désinfectant renouvelé régulièrement","Optionnel selon le budget"],b:1},
     {q:"En cas de suspicion PPA, abattre les porcs pour les vendre immédiatement est…",o:["La meilleure solution économique","Désastreux car cela accélère la propagation du virus","Obligatoire selon la réglementation"],b:1},
     {q:"Les rongeurs dans la porcherie sont dangereux car…",o:["Ils mangent l'aliment uniquement","Ils peuvent être porteurs de tiques vectrices de la PPA","Ils font peur aux porcs"],b:1}]},
 en:{ti:"Advanced biosecurity and ASF protocol",tx:[
 "A secure pig house operates in distinct zones: dirty zone (outside, vehicles, public access), transition zone (changing room with dedicated boots and overalls, regularly renewed disinfectant footbath), clean zone (housing buildings), ultra-protected zone (farrowing unit). No animal, vehicle or visitor should pass from one zone to another without the transition protocol.",
 "A visitor log is mandatory and vital in ASF-endemic areas: record name, date, last farm visited. A visitor who has been to another pig farm in the previous 72 hours must not enter your pig house. Pig carcasses must never be left unattended — deep burial (1.5 m) or immediate incineration. Dogs and scavengers can carry the virus over several kilometres. Feed is also a vector: store bags away from rodents (tick vectors), never mix feeds from different farms without a verified source.",
 "ASF crisis plan: post in your pig house the phone number of the area vet and the animal health authority. Train your staff on clinical signs and the isolation procedure. In a crisis, hasty slaughter for sale accelerates spread — it is an understandable economic temptation but a disastrous one. In Central Africa, rapid reporting to authorities can trigger support measures. A prepared farmer loses less, even in a crisis."],
 qz:[{q:"A visitor from another pig farm must not enter your pig house for…",o:["1 hour","72 hours","30 days"],b:1},
     {q:"A dead pig must be…",o:["Left outside","Buried at 1.5 m depth or immediately incinerated","Given to farm dogs"],b:1},
     {q:"The footbath at the entrance to the pig house must be…",o:["Filled with plain water","Filled with regularly renewed disinfectant","Optional depending on budget"],b:1},
     {q:"In a suspected ASF case, slaughtering pigs to sell them immediately is…",o:["The best economic solution","Disastrous as it accelerates virus spread","Mandatory by regulation"],b:1},
     {q:"Rodents in the pig house are dangerous because…",o:["They eat feed only","They may carry ticks that vector ASF","They scare the pigs"],b:1}]}},

{fr:{ti:"Pilotage économique du lot",tx:[
 "L'élevage porcin est un cycle long comparé à d'autres spéculations : saillie → gestation 114 jours → lactation 28 jours → post-sevrage 60 jours → engraissement 90 à 150 jours selon la race. De la saillie à la vente du porc charcutier, il s'écoule environ 8 à 10 mois. Ce cycle long exige une planification de trésorerie rigoureuse : les charges (aliment, soins) courent sans interruption pendant que les recettes n'arrivent que par pics (vente de porcelets, vente de porcs à l'engrais, vente de truies de réforme).",
 "Calculez votre coût de production par kilo de porc vif : aliment (65–70 %), porcelet (10–15 %), santé (5–8 %), amortissement bâtiment, main-d'œuvre. Vendez au bon poids : entre 90 et 110 kg pour les races améliorées selon votre marché. Après 110–120 kg, l'IC se dégrade, le porc engraisse trop en graisse plutôt qu'en muscle, et la marge par kilo chute brutalement. Pesez chaque semaine sur un échantillon de 5 porcs et calculez le gain moyen quotidien (GMQ) — il vous dit quand vendre.",
 "Deux recettes souvent sous-estimées : la vente des truies de réforme (viande à prix honorable selon le marché) et le lisier (engrais organique très recherché par les maraîchers). Le lisier de porc est l'un des fumiers les plus riches en azote — valorisez-le en le vendant aux cultures voisines, cela compense une partie des coûts de gestion des déchets. Tenez vos registres de finances dans CuniSmart à chaque opération : la marge réelle par porc vendu est la seule vérité qui compte."],
 qz:[{q:"Le poids de vente optimal du porc charcutier en race améliorée est généralement…",o:["50–60 kg","90–110 kg","150–180 kg"],b:1},
     {q:"Après 110–120 kg, l'IC du porc se dégrade car…",o:["Le porc mange moins","Il engraisse en graisse plutôt qu'en muscle, rendement chute","Il tombe malade"],b:1},
     {q:"Quelle est la part de l'aliment dans le coût de production du porc ?",o:["10–20 %","65–70 %","90 %"],b:1},
     {q:"Le lisier de porc est valorisable car…",o:["Il sert de litière","C'est un engrais organique riche en azote recherché par les maraîchers","Il n'a aucune valeur"],b:1},
     {q:"Pour décider du bon moment de vente, l'indicateur à suivre est…",o:["L'âge en mois uniquement","Le GMQ (gain moyen quotidien) calculé par pesée hebdomadaire","La couleur de la peau"],b:1}]},
 en:{ti:"Economic management of the fattening batch",tx:[
 "Pig farming is a long cycle compared to other species: mating → 114-day gestation → 28-day lactation → 60-day post-weaning → 90–150-day fattening depending on breed. From mating to selling the baconer, about 8–10 months elapse. This long cycle demands rigorous cash-flow planning: costs (feed, health) run without interruption while income comes only in peaks (piglet sales, sale of fatteners, sale of cull sows).",
 "Calculate your production cost per kg of live pig: feed (65–70%), piglet (10–15%), health (5–8%), building depreciation, labour. Sell at the right weight: 90–110 kg for improved breeds depending on your market. Above 110–120 kg, FCR deteriorates, the pig lays down fat rather than muscle, and margin per kg drops sharply. Weigh weekly on a sample of 5 pigs and compute average daily gain (ADG) — it tells you when to sell.",
 "Two often underestimated income sources: sale of cull sows (meat at an honourable price depending on the market) and slurry (organic fertiliser highly sought by market gardeners). Pig slurry is one of the richest manures in nitrogen — valorise it by selling it to neighbouring crop farmers, which offsets part of waste management costs. Record every financial operation in CuniSmart: the real margin per pig sold is the only truth that counts."],
 qz:[{q:"Optimal selling weight for an improved-breed baconer is generally…",o:["50–60 kg","90–110 kg","150–180 kg"],b:1},
     {q:"Above 110–120 kg, FCR deteriorates because…",o:["The pig eats less","It lays down fat rather than muscle, yield drops","It falls sick"],b:1},
     {q:"What share of pig production cost is feed?",o:["10–20%","65–70%","90%"],b:1},
     {q:"Pig slurry is worth valorising because…",o:["It serves as bedding","It is nitrogen-rich organic fertiliser sought by market gardeners","It has no value"],b:1},
     {q:"To decide the right moment to sell, the indicator to track is…",o:["Age in months only","ADG (average daily gain) computed by weekly weighing","Skin colour"],b:1}]}},

{fr:{ti:"Marchés, valorisation et circuits de vente",tx:[
 "Le porc en Afrique centrale et de l'Ouest connaît une demande urbaine en forte croissance, mais le marché est très saisonnier : les prix montent fortement en période de fêtes (Noël, Pâques, fêtes nationales) et chutent hors saison. Un éleveur qui planifie ses mises bas pour avoir des porcs à vendre au bon moment peut améliorer sa marge de 20 à 40 % sur l'année. Notez dans CuniSmart la date de chaque saillie : vous verrez 8 à 9 mois à l'avance si vos animaux seront prêts pour le pic de demande.",
 "Ne vendez jamais au même circuit de vente. Les vendeurs au bord de la route subissent les prix les plus bas. Les circuits à forte valeur ajoutée sont : les abattoirs (prix fixe et régulier), les bouchers de marché (prix de gros), les restaurateurs et hôtels (prix unitaire élevé mais petit volume, paiement parfois lent), la transformation artisanale (saucisses, viande fumée, chipolatas — valorisation jusqu'à 2–3 fois le prix du porc vif si vous maîtrisez la technique).",
 "La traçabilité est un argument de vente croissant en milieu urbain africain, surtout depuis que la PPA a rendu les consommateurs méfiants sur l'origine du porc. Un éleveur qui peut montrer un registre propre, des vaccinations à jour, et un élevage fermé à la faune sauvage, peut demander un prix supérieur. CuniSmart Traçabilité génère un QR code par lot : scannez-le avec votre acheteur pour montrer votre sérieux."],
 qz:[{q:"Quand les prix du porc sont-ils généralement les plus hauts en Afrique centrale ?",o:["En pleine saison des pluies","Pendant les fêtes (Noël, Pâques, fêtes nationales)","En juillet–août"],b:1},
     {q:"Le circuit de vente qui valorise le mieux le porc est généralement…",o:["La vente au bord de la route","La transformation artisanale (saucisses, viande fumée)","Le don aux voisins"],b:1},
     {q:"La traçabilité CuniSmart peut vous permettre de…",o:["Réduire le coût de l'aliment","Demander un prix supérieur en prouvant votre sérieux à l'acheteur","Éviter de vacciner"],b:1},
     {q:"Planifier les saillies par rapport aux pics de demande permet d'améliorer la marge de…",o:["1–2 %","20–40 %","200 %"],b:1},
     {q:"Quel document CuniSmart permet à l'acheteur de vérifier l'origine et les pratiques d'élevage ?",o:["Le bilan financier","Le QR code de traçabilité par lot","Le registre des vaccinations uniquement"],b:1}]},
 en:{ti:"Markets, value and sales channels",tx:[
 "Pig farming in Central and West Africa faces strong growing urban demand, but the market is highly seasonal: prices rise sharply during festive periods (Christmas, Easter, national holidays) and fall off-season. A farmer who plans farrowings to have pigs ready at the right time can improve margin by 20–40% over the year. Record every mating date in CuniSmart: you will see 8–9 months in advance whether your animals will be ready for the demand peak.",
 "Never sell through just one channel. Roadside sellers get the lowest prices. High-value channels are: abattoirs (fixed regular price), market butchers (wholesale price), restaurants and hotels (high unit price but small volume, sometimes slow payment), artisan processing (sausages, smoked meat, chipolatas — valorisation up to 2–3 times live pig price if you master the technique).",
 "Traceability is a growing sales argument in urban Africa, especially since ASF has made consumers wary of pork origin. A farmer who can show clean records, up-to-date vaccinations and a farm closed to wildlife can ask a premium price. CuniSmart Traceability generates a QR code per batch: scan it with your buyer to show your professionalism."],
 qz:[{q:"When are pig prices generally highest in Central Africa?",o:["In peak rainy season","During festivals (Christmas, Easter, national holidays)","In July–August"],b:1},
     {q:"The sales channel that best valorises pig is generally…",o:["Roadside selling","Artisan processing (sausages, smoked meat)","Giving to neighbours"],b:1},
     {q:"CuniSmart traceability can allow you to…",o:["Reduce feed cost","Ask a premium price by proving your professionalism to the buyer","Avoid vaccinating"],b:1},
     {q:"Planning farrowings around demand peaks can improve margin by…",o:["1–2%","20–40%","200%"],b:1},
     {q:"Which CuniSmart document lets a buyer verify the origin and farming practices?",o:["The financial report","The batch traceability QR code","The vaccination record only"],b:1}]}},

{fr:{ti:"Construire un élevage durable sur 5 ans",tx:[
 "Le plus grand risque de l'éleveur porcin africain n'est pas la PPA ni la chaleur — c'est le découragement après la première crise. Un plan à 5 ans, réaliste et progressif, est la meilleure assurance contre l'abandon. Démarrez petit : 3 à 5 truies, un verrat, une infrastructure simple mais bien conçue. L'autofinancement se dessine généralement entre 18 et 24 mois si la conduite est rigoureuse. Réinvestissez les bénéfices des 2 premières années dans l'infrastructure (maternité correcte, clôture complète, forage ou citerner) plutôt que dans l'agrandissement précipité.",
 "Sélectionnez sur votre propre descendance : conservez comme futures truies les femelles des meilleures portées — celles des truies avec le plus de nés vivants, les meilleurs poids de sevrage, et une bonne valeur laitière (poids de la portée à 21 jours). Cette sélection progressive améliore silencieusement les performances sans investissement supplémentaire. Pour le verrat, renouveler tous les 2 ans avec un animal d'une lignée différente de la vôtre pour conserver la vigueur hybride.",
 "Restez connecté au réseau local : coopérative d'éleveurs, vétérinaire de zone, délégation MINEPIA (Cameroun) ou structure équivalente dans votre pays. Un éleveur isolé est vulnérable à la PPA parce qu'il est le dernier à être averti. Un réseau vous donne l'alerte précoce, le groupement d'achat d'aliment et de vaccins, et l'accès aux marchés collectifs. La règle d'or finale : notez tout dans CuniSmart — chaque saillie, chaque mise bas, chaque dépense, chaque vente. Vos données sont votre capital invisible."],
 qz:[{q:"Quand l'autofinancement d'un élevage porcin bien conduit devient-il généralement visible ?",o:["Dès le premier mois","Entre 18 et 24 mois","Après 10 ans seulement"],b:1},
     {q:"Les bénéfices des 2 premières années doivent être reinvestis en priorité dans…",o:["L'agrandissement immédiat du cheptel","L'infrastructure (maternité, clôture, eau)","La décoration de la porcherie"],b:1},
     {q:"La sélection sur descendance vise à…",o:["Changer toutes les truies chaque année","Conserver les femelles des meilleures portées pour améliorer progressivement le troupeau","Acheter les races les plus chères"],b:1},
     {q:"Pourquoi renouveler le verrat tous les 2 ans avec une lignée différente ?",o:["Par obligation légale","Pour éviter la consanguinité et conserver la vigueur hybride","Parce que les verrats vieillissent vite"],b:1},
     {q:"L'appartenance à un réseau d'éleveurs (coopérative, vétérinaire de zone) protège surtout contre…",o:["La chaleur","L'isolement et le manque d'alerte précoce en cas de PPA","Les dépenses vétérinaires"],b:1}]},
 en:{ti:"Building a sustainable farm over 5 years",tx:[
 "The greatest risk for the African pig farmer is not ASF or heat — it is discouragement after the first crisis. A realistic, progressive 5-year plan is the best insurance against giving up. Start small: 3–5 sows, one boar, simple but well-designed infrastructure. Break-even usually appears between 18 and 24 months with rigorous management. Reinvest the first two years' profits in infrastructure (proper farrowing unit, complete fencing, borehole or water tank) rather than hasty expansion.",
 "Select on your own progeny: keep as future sows the females from the best litters — daughters of sows with the most born alive, best weaning weights and good milking ability (litter weight at 21 days). This gradual selection silently improves performance without extra investment. For the boar, renew every 2 years with an animal from a different line than yours to maintain hybrid vigour.",
 "Stay connected to the local network: farmer cooperative, area vet, MINEPIA delegation (Cameroon) or equivalent body in your country. An isolated farmer is the most vulnerable to ASF because they are the last to be warned. A network gives you early warning, group purchase of feed and vaccines, and access to collective markets. Final golden rule: record everything in CuniSmart — every mating, every farrowing, every expense, every sale. Your data is your invisible capital."],
 qz:[{q:"When does a well-run pig farm generally reach break-even?",o:["From the first month","Between 18 and 24 months","Only after 10 years"],b:1},
     {q:"Profits from the first 2 years should be reinvested mainly in…",o:["Immediate herd expansion","Infrastructure (farrowing unit, fencing, water)","Decorating the pig house"],b:1},
     {q:"Selecting on progeny aims to…",o:["Replace all sows every year","Keep females from the best litters to gradually improve the herd","Buy the most expensive breeds"],b:1},
     {q:"Why renew the boar every 2 years with a different line?",o:["By legal obligation","To avoid inbreeding and maintain hybrid vigour","Because boars age quickly"],b:1},
     {q:"Belonging to a farmer network (cooperative, area vet) mainly protects against…",o:["Heat","Isolation and lack of early warning in case of ASF","Veterinary expenses"],b:1}]}}
];
