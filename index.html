{fr:{ti:"Piloter par l'indice de consommation (IC)",tx:[
 "L'indice de consommation (IC) est l'indicateur de performance le plus important en engraissement porcin. Il mesure l'efficacité avec laquelle votre porc transforme l'aliment en viande : IC = kilos d'aliment consommés ÷ kilos de poids vif gagné. Exemple : un porc qui mange 280 kg d'aliment pour passer de 30 kg à 110 kg gagne 80 kg — son IC est de 280 ÷ 80 = 3,5. Repères : 2,8 à 3,2 pour une race améliorée bien conduite, 4 à 5 pour le porc local.",
 "Pesez chaque semaine un échantillon représentatif de 5 à 10 porcs à l'engrais — toujours le même jour, à jeun de préférence. Le gain moyen quotidien (GMQ) = gain de poids (kg) ÷ nombre de jours. Un porc amélioré en bonne conduite gagne 600 à 800 g par jour. En dessous de 500 g, quelque chose ne va pas : chaleur, aliment déséquilibré, maladie, ou porc hors de sa fenêtre optimale d'engraissement.",
 "L'IC se dégrade inexorablement après 110–120 kg : le porc continue à manger autant mais engraisse davantage en graisse qu'en muscle. La valeur commerciale par kilo chute. Vendez entre 90 et 110 kg pour maximiser la marge. Tenez un tableau de suivi hebdomadaire dans CuniSmart Finances : entrez le coût de l'aliment et le poids des porcs, et vous connaissez votre coût de production réel à la semaine."],
 qz:[{q:"L'indice de consommation (IC) se calcule par…",o:["Nombre de porcs ÷ surface de la porcherie","Kilos d'aliment consommés ÷ kilos de poids vif gagné","Prix de l'aliment × nombre de porcs"],b:1},
     {q:"Un IC de 3,5 pour un porc local est…",o:["Excellent","Acceptable pour un porc local","Catastrophique"],b:1},
     {q:"Le gain moyen quotidien (GMQ) attendu pour un porc amélioré en bonne conduite est…",o:["100–200 g/jour","600–800 g/jour","2 kg/jour"],b:1},
     {q:"Après 110–120 kg, l'IC du porc se dégrade car…",o:["Il mange moins","Il engraisse en graisse plutôt qu'en muscle","Il tombe systématiquement malade"],b:1},
     {q:"Pour calculer l'IC hebdomadaire, il faut obligatoirement…",o:["Observer le comportement du porc","Peser régulièrement un échantillon de porcs","Compter le nombre de repas par jour"],b:1}]},
 en:{ti:"Managing by feed conversion ratio (FCR)",tx:[
 "Feed conversion ratio (FCR) is the most important performance indicator in pig fattening. It measures how efficiently your pig turns feed into meat: FCR = kg of feed consumed ÷ kg of live weight gained. Example: a pig eating 280 kg of feed to go from 30 kg to 110 kg gains 80 kg — its FCR is 280 ÷ 80 = 3.5. Benchmarks: 2.8 to 3.2 for a well-managed improved breed, 4–5 for the local pig.",
 "Weigh a representative sample of 5–10 fattening pigs weekly — always the same day, preferably fasted. Average daily gain (ADG) = weight gain (kg) ÷ number of days. A well-managed improved pig gains 600–800 g per day. Below 500 g, something is wrong: heat, unbalanced feed, disease, or pig outside its optimal fattening window.",
 "FCR deteriorates inexorably above 110–120 kg: the pig keeps eating as much but lays down fat rather than muscle. Commercial value per kg drops. Sell between 90 and 110 kg to maximise margin. Keep a weekly tracking table in CuniSmart Finances: enter feed cost and pig weight, and you know your real production cost week by week."],
 qz:[{q:"Feed conversion ratio (FCR) is calculated as…",o:["Number of pigs ÷ house floor area","Kg feed consumed ÷ kg live weight gained","Feed price × number of pigs"],b:1},
     {q:"An FCR of 3.5 for a local pig is…",o:["Excellent","Acceptable for a local pig","Catastrophic"],b:1},
     {q:"Expected average daily gain (ADG) for a well-managed improved pig is…",o:["100–200 g/day","600–800 g/day","2 kg/day"],b:1},
     {q:"Above 110–120 kg, FCR deteriorates because…",o:["The pig eats less","It lays down fat rather than muscle","It systematically falls sick"],b:1},
     {q:"To calculate weekly FCR, you must…",o:["Observe pig behaviour","Weigh a regular sample of pigs","Count the number of meals per day"],b:1}]}},
{fr:{ti:"Biosécurité avancée et protocole PPA",tx:[
 "Une porcherie sécurisée fonctionne en zones distinctes : zone sale (extérieur, véhicules, accès public), zone de transition (vestiaire avec bottes et blouses dédiées, pédiluve à désinfectant renouvelé), zone propre (bâtiments d'élevage), zone ultra-protégée (maternité). Aucun animal, aucun véhicule, aucun visiteur ne doit passer d'une zone à l'autre sans le protocole de transition.",
 "Le registre des visiteurs est obligatoire et vital en zone d'endémie PPA : notez nom, date, dernier élevage visité. Un visiteur venant d'un autre élevage porcin dans les 72 heures ne doit pas entrer dans votre porcherie. Les cadavres de porcs ne doivent jamais être abandonnés — enterrement profond (1,5 m) ou incinération immédiate. Les chiens et charognards peuvent transporter le virus sur plusieurs kilomètres. L'aliment est aussi un vecteur : stockez les sacs à l'abri des rongeurs (vecteurs de tiques), ne mélangez jamais les aliments provenant de fermes différentes sans source vérifiée.",
 "Plan de crise PPA : affichez dans votre porcherie le numéro du vétérinaire de zone et celui de l'autorité sanitaire. Formez vos employés aux signes cliniques et à la procédure d'isolement. En cas de foyer, l'abattage précipité pour la vente accélère la propagation — c'est une tentation économique compréhensible mais désastreuse. En Afrique centrale, la déclaration rapide aux autorités peut déclencher des mesures de soutien. Un éleveur préparé perd moins, même en cas de crise."],
 qz:[{q:"Un visiteur venant d'un autre élevage porcin ne doit pas entrer dans votre porcherie pendant…",o:["1 heure","72 heures","30 jours"],b:1},
     {q:"Un cadavre de porc doit être…",o:["Abandonné à l'extérieur","Enterré à 1,5 m de profondeur ou incinéré immédiatement","Donné aux chiens de la ferme"],b:1},
     {q:"Le pédiluve à l'entrée de la porcherie doit être…",o:["Rempli d'eau simple","Rempli de désinfectant renouvelé régulièrement","Optionnel selon le budget"],b:1},
     {q:"En cas de suspicion PPA, abattre les porcs pour les vendre immédiatement est…",o:["La meilleure solution économique","Désastreux car cela accélère la propagation du virus","Obligatoire selon la réglementation"],b:1},
     {q:"Les rongeurs dans la porcherie sont dangereux car…",o:["Ils mangent l'aliment uniquement","Ils peuvent être porteurs de tiques vectrices de la PPA","Ils font peur aux porcs"],b:1}]},
 en:{ti:"Advanced biosecurity and ASF protocol",tx:[
 "A secure pig house operates in distinct zones: dirty zone (outside, vehicles, public access), transition zone (changing room with dedicated boots and overalls, regularly renewed disinfectant footbath), clean zone (housing buildings), ultra-protected zone (farrowing unit). No animal, vehicle or visitor should pass from one zone to another without the transition protocol.",
 "A visitor log is mandatory and vital in ASF-endemic areas: record name, date, last farm visited. A visitor who has been to another pig farm in the previous 72 hours must not enter your pig house. Pig carcasses must never be left unattended — deep burial (1.5 m) or immediate incineration. Dogs and scavengers can carry the virus over several kilometres. Feed is also a vector: store bags away from rodents (tick vectors), never mix feeds from different farms without a verified source.",
 "ASF crisis plan: post in your pig house the phone number of the area vet and the animal health authority. Train your staff on clinical signs and the isolation procedure. In a crisis, hasty slaughter for sale accelerates spread — it is an understandable economic temptation but a disastrous one. In Central Africa, rapid reporting to authorities can trigger support measures. A prepared farmer loses less, even in a crisis."],
 qz:[{q:"A visitor from another pig farm must not enter your pig house for…",o:["1 hour","72 hours","30 days"],b:1},
     {q:"A dead pig must be…",o:["Left outside","Buried at 1.5 m depth or immediately incinerated","Given to farm dogs"],b:1},
     {q:"The footbath at the entrance to the pig house must be…",o:["Filled with plain water","Filled with regularly renewed disinfectant","Optional depending on budget"],b:1},
     {q:"In a suspected ASF case, slaughtering pigs to sell them immediately is…",o:["The best economic solution","Disastrous as it accelerates virus spread","Mandatory by regulation"],b:1},
     {q:"Rodents in the pig house are dangerous because…",o:["They eat feed only","They may carry ticks that vector ASF","They scare the pigs"],b:1}]}},

{fr:{ti:"Pilotage économique du lot",tx:[
 "L'élevage porcin est un cycle long comparé à d'autres spéculations : saillie → gestation 114 jours → lactation 28 jours → post-sevrage 60 jours → engraissement 90 à 150 jours selon la race. De la saillie à la vente du porc charcutier, il s'écoule environ 8 à 10 mois. Ce cycle long exige une planification de trésorerie rigoureuse : les charges (aliment, soins) courent sans interruption pendant que les recettes n'arrivent que par pics (vente de porcelets, vente de porcs à l'engrais, vente de truies de réforme).",
 "Calculez votre coût de production par kilo de porc vif : aliment (65–70 %), porcelet (10–15 %), santé (5–8 %), amortissement bâtiment, main-d'œuvre. Vendez au bon poids : entre 90 et 110 kg pour les races améliorées selon votre marché. Après 110–120 kg, l'IC se dégrade, le porc engraisse trop en graisse plutôt qu'en muscle, et la marge par kilo chute brutalement. Pesez chaque semaine sur un échantillon de 5 porcs et calculez le gain moyen quotidien (GMQ) — il vous dit quand vendre.",

const memoire = {};

const store = {
  async get(k){
    try{ if(window.storage){ const r = await window.storage.get(k); return r ? r.value : null; } }catch(e){}
    try{ return localStorage.getItem(k); }catch(e){ return memoire[k] ?? null; }
  },
  async set(k, v){
    try{ if(window.storage){ await window.storage.set(k, v); return; } }catch(e){}
    try{ localStorage.setItem(k, v); }catch(e){ memoire[k] = v; }
  }
};

/* ---- SAUVEGARDE CLOUD AUTOMATIQUE ----
   Avant, il fallait penser à cliquer « Sauvegarder ». Personne ne le faisait,
   et les données restaient prisonnières du téléphone. Maintenant chaque
   modification part toute seule, 4 secondes après la dernière action (pour ne
   pas envoyer 30 requêtes quand on saisit une portée). Hors-ligne, la
   sauvegarde est simplement reportée à la reconnexion. */
let backupTimer = null;
let backupEnAttente = false;

function planifierBackup(){
  if(!etat.compte || !etat.compte.ok) return;   // pas de compte cloud : rien à faire
  backupEnAttente = true;
  clearTimeout(backupTimer);
  backupTimer = setTimeout(cloudBackupAuto, 4000);
}

async function cloudBackupAuto(){
  if(!etat.compte || !etat.compte.ok) return;
  if(typeof navigator !== 'undefined' && navigator.onLine === false) return; // on réessaiera
  const copie = Object.assign({}, etat); delete copie.compte;
  try{
    const { status, data } = await apiCompte('backup', {
      phone: etat.compte.phone, code: etat.compte.code, data: copie
    });
    if(status === 200 && data.ok) backupEnAttente = false;
  }catch(e){ /* hors-ligne : on garde backupEnAttente = true */ }
}

/* Dès que le réseau revient, on renvoie ce qui n'est pas parti. */
if(typeof window !== 'undefined'){
  window.addEventListener('online', () => { if(backupEnAttente) cloudBackupAuto(); });
}

const auj = () => new Date().toISOString().slice(0,10);
const ajJours = (d,n) => { const x=new Date(d+'T00:00:00'); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); };
const diffJours = (a,b) => Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);
const fdate = d => d ? new Date(d+'T00:00:00').toLocaleDateString(locale(),{day:'numeric',month:'short',year:'numeric'}) : '—';
const fcfa = n => n.toLocaleString(locale()) + ' FCFA';
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const lapin = id => etat.lapins.find(l => l.id === id);
const nom = id => { const l = lapin(id); return l ? esc(l.nom) : '(?)'; };

const pct = (num, den) => den > 0 ? Math.round(num / den * 100) : null;

/* ================= ALERTES ================= */
function calculerAlertes(){
  const a = [];
  etat.saillies.forEach(s => {
    if(s.statut === 'attente'){
      const jp = diffJours(auj(), ajJours(s.date, espSaillie(s).palpation));
      if(jp <= 0) a.push({t:'warn', txt: fmt(t('al_palp'), {f:nom(s.femelle), d:fdate(s.date)})});
      const jmb = diffJours(auj(), ajJours(s.date, espSaillie(s).gestation));
      if(jmb <= 3 && jmb >= 0) a.push({t:'urgent', txt: fmt(t('al_soon'), {f:nom(s.femelle), d:fdate(ajJours(s.date,espSaillie(s).gestation)), n:jmb})});
      if(jmb < 0) a.push({t:'urgent', txt: fmt(t('al_over'), {f:nom(s.femelle), d:fdate(ajJours(s.date,espSaillie(s).gestation))})});
    }
    if(s.statut === 'misebas' && !s.sevre){
      const js = diffJours(auj(), ajJours(s.dateMiseBas, espSaillie(s).sevrage));
      if(js <= 2){
        const q = js >= 0 ? fmt(t('al_wean_on'), {d:fdate(ajJours(s.dateMiseBas,espSaillie(s).sevrage))}) : t('al_wean_now');
        a.push({t:'info', txt: fmt(t('al_wean'), {f:nom(s.femelle), q, n:s.vivants})});
      }
    }
  });
  return a;
}

/* ================= INDICATEURS DU BILAN ================= */
function calculerKPI(){
  const terminees = etat.saillies.filter(s => s.statut === 'misebas' || s.statut === 'echec');
  const reussies = etat.saillies.filter(s => s.statut === 'misebas');
  const fert = pct(reussies.length, terminees.length);
  const totVivants = reussies.reduce((x,s)=>x+(s.vivants||0),0);
  const totMorts = reussies.reduce((x,s)=>x+(s.morts||0),0);
  const prol = reussies.length ? Math.round(totVivants / reussies.length * 10) / 10 : null;
  const still = pct(totMorts, totVivants + totMorts);
  const ventes = etat.transactions.filter(x=>x.type==='vente').reduce((x,y)=>x+y.montant,0);
  const dep = etat.transactions.filter(x=>x.type==='depense').reduce((x,y)=>x+y.montant,0);
  return { fert, prol, still, ventes, dep, marge: ventes - dep, nbPortees: reussies.length, nbTerminees: terminees.length };
}
function calculerDiagnostic(k){
  const c = [];
  if(k.fert !== null && k.fert < 70) c.push(fmt(t('d_fert'), {v:k.fert}));
  if(k.prol !== null && k.prol < 6) c.push(fmt(t('d_prol'), {v:k.prol}));
  if(k.still !== null && k.still > 10) c.push(fmt(t('d_still'), {v:k.still}));
  if(etat.transactions.length && k.marge < 0) c.push(t('d_margin'));
  if(!c.length && (k.nbTerminees > 0 || etat.transactions.length > 0)) c.push(t('d_ok'));
  return c;
}

const EV_ICON = { palp:'🔍', mb:'🍼', sev:'🌾' };
function agendaRepro(){
  const ev = [];
  etat.saillies.forEach(s=>{
    if(s.statut === 'attente'){
      const E = espSaillie(s);
      if(E.palpation>0) ev.push({ d: ajJours(s.date, E.palpation), type:'palp', s:s });
      ev.push({ d: ajJours(s.date, E.gestation), type:'mb',   s:s });
    } else if(s.statut === 'misebas' && !s.sevre && espSaillie(s).sevrage>0){
      ev.push({ d: ajJours(s.dateMiseBas, espSaillie(s).sevrage), type:'sev', s:s });
    }
  });
  ev.forEach(e=> e.j = diffJours(auj(), e.d));
  ev.sort((a,b)=> a.d < b.d ? -1 : a.d > b.d ? 1 : 0);
  return ev;
}
function evLabel(type){ return type==='palp'?t('ev_palp'):type==='mb'?t('ev_mb'):t('ev_sev'); }
function evBadge(j){
  if(j < 0)  return '<span class="tag" style="background:#fdeceb;color:#C0392B">'+fmt(t('ev_late'),{n:Math.abs(j)})+'</span>';
  if(j === 0) return '<span class="tag" style="background:#fdeceb;color:#C0392B">'+t('ev_today')+'</span>';
  const soon = j <= 3;
  return '<span class="tag" style="background:'+(soon?'#fdf3d9':'#eef2e7')+';color:'+(soon?'#8A6400':'#4a5a44')+'">'+fmt(t('ev_in'),{n:j})+'</span>';
}
function evActions(e){
  if(e.type==='mb') return '<button class="btn mini" onclick="formMiseBas(\''+e.s.id+'\')">'+t('btn_kindle')+'</button>';
  if(e.type==='sev') return '<button class="btn mini sec" onclick="sevrer(\''+e.s.id+'\')">'+t('btn_wean')+'</button>';
  return '';
}
function evRow(e, withAction){
  return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--creme-2)">'+
    '<span style="font-size:1.2rem;flex:none">'+(EV_ICON[e.type]||'•')+'</span>'+
    '<div style="flex:1;min-width:0">'+
      '<div style="font-weight:600">'+nom(e.s.femelle)+' — '+evLabel(e.type)+'</div>'+
      '<div style="font-size:.8rem;color:var(--gris)">'+fdate(e.d)+'</div>'+
    '</div>'+
    evBadge(e.j)+
    (withAction && evActions(e) ? '<span style="margin-left:6px;flex:none">'+evActions(e)+'</span>' : '')+
  '</div>';
}
function blocAgenda(){
  const ev = agendaRepro();
  const maintenant = ev.filter(e=> e.j <= 0);
  const avenir = ev.filter(e=> e.j > 0);
  const cToDo = '<div class="card" style="margin-bottom:16px">'+
    '<h3>'+t('repro_todo')+'</h3>'+
    (maintenant.length ? maintenant.map(e=>evRow(e,true)).join('') : '<p class="vide">'+t('repro_todo_empty')+'</p>')+
  '</div>';
  const cCal = '<div class="card" style="margin-bottom:16px">'+
    '<h3>'+t('repro_cal')+'</h3>'+
    (avenir.length ? avenir.map(e=>evRow(e,false)).join('') : '<p class="vide">'+t('repro_cal_empty')+'</p>')+
  '</div>';
  return cToDo + cCal;
}


/* ===== MODULE CONSANGUINITÉ & GÉNÉALOGIE ===== */

// ─── 1. ENREGISTRER PÈRE/MÈRE À LA NAISSANCE ───────────────────────────────
// On ajoute deux champs optionnels dans le formulaire cheptel : père et mère.
// Ils pointent vers les IDs d'animaux enregistrés — ou restent vides si inconnus.
// Les saillies servent aussi d'ancêtres : quand une mise bas est enregistrée,
// on peut lier automatiquement les lapereaux aux parents (femelle + mâle de la saillie).

function parentOptions(sexe){
  // Liste des animaux (actifs + inactifs) du bon sexe pour le menu déroulant
  const L=(fr,en)=>langue==='fr'?fr:en;
  const tous=etat.lapins.filter(l=>l.sexe===sexe && espDe(l)===espActive());
  return '<option value="">'+L('— Inconnu —','— Unknown —')+'</option>'+
    tous.map(l=>`<option value="${l.id}">${esc(l.nom)}</option>`).join('');
}

// ─── 2. COEFFICIENT DE CONSANGUINITÉ (Wright simplifié, 3 générations) ───────
function ancetres(id, gen, memo={}){
  // Retourne un Map { ancestorId -> [list of paths length] }
  if(gen<0 || !id) return;
  if(!memo[id]) memo[id]=[];
  memo[id].push(gen);
  const l=lapin(id); if(!l) return memo;
  ancetres(l.pere||null, gen-1, memo);
  ancetres(l.mere||null, gen-1, memo);
  return memo;
}

function coefConsanguinite(idFemelle, idMale){
  // Calcule F (coefficient de Wright) pour le produit potentiel de ces deux parents.
  // F = Σ (1/2)^(n1+n2+1) pour chaque ancêtre commun, sur 3 générations.
  if(!idFemelle || !idMale) return 0;
  const anceF = ancetres(idFemelle, 3, {});
  const anceM = ancetres(idMale, 3, {});
  let F = 0;
  for(const id in anceF){
    if(anceM[id]){
      // Ancêtre commun trouvé : combinaison des chemins
      for(const gF of anceF[id]){
        for(const gM of anceM[id]){
          F += Math.pow(0.5, gF + gM + 1);
        }
      }
    }
  }
  return Math.round(F * 10000) / 100; // en %
}

function riskLabel(F){
  const L=(fr,en)=>langue==='fr'?fr:en;
  if(F===0) return {lbl:L('Aucun risque','No risk'),cls:'ok',icon:'✅'};
  if(F<=3.125) return {lbl:L('Très faible ('+F+'%)','Very low ('+F+'%)'),cls:'ok',icon:'✅'};
  if(F<=6.25)  return {lbl:L('Faible ('+F+'%)','Low ('+F+'%)'),cls:'gest',icon:'🟡'};
  if(F<=12.5)  return {lbl:L('Attention ('+F+'%)','Caution ('+F+'%)'),cls:'amber',icon:'⚠️'};
  if(F<=25)    return {lbl:L('Élevé — déconseillé ('+F+'%)','High — not advised ('+F+'%)'),cls:'dep',icon:'🔴'};
  return       {lbl:L('Critique — ne pas croiser ('+F+'%)','Critical — do not mate ('+F+'%)'),cls:'dep',icon:'🛑'};
}

// ─── 3. VUE PRINCIPALE ───────────────────────────────────────────────────────
function vueConsanguinite(){
  const L=(fr,en)=>langue==='fr'?fr:en;
  const femelles=etat.lapins.filter(l=>l.sexe==='F'&&l.statut==='actif'&&espDe(l)===espActive());
  const males   =etat.lapins.filter(l=>l.sexe==='M'&&l.statut==='actif'&&espDe(l)===espActive());

  if(!femelles.length||!males.length){
    return `<div class="card" style="text-align:center;padding:28px">
      <div style="font-size:2.2rem;margin-bottom:8px">🧬</div>
      <h3 style="color:var(--vert-foret)">${L('Suivi de consanguinité','Inbreeding tracker')}</h3>
      <p style="color:var(--gris)">${L('Enregistrez au moins une femelle et un mâle actifs pour utiliser cet outil.','Register at least one active female and one active male to use this tool.')}</p>
    </div>`;
  }

  // Tableau de toutes les combinaisons
  let rows='';
  for(const f of femelles){
    for(const m of males){
      const F=coefConsanguinite(f.id,m.id);
      const r=riskLabel(F);
      // ancêtres communs pour l'affichage
      const anceF=ancetres(f.id,3,{});
      const anceM=ancetres(m.id,3,{});
      const communs=Object.keys(anceF).filter(id=>anceM[id]&&id!==f.id&&id!==m.id)
        .map(id=>lapin(id)).filter(Boolean).map(a=>esc(a.nom)).join(', ')||'—';
      rows+=`<tr>
        <td><b>${esc(f.nom)}</b></td>
        <td><b>${esc(m.nom)}</b></td>
        <td><span class="tag ${r.cls}">${r.icon} ${r.lbl}</span></td>
        <td style="font-size:.82rem;color:var(--gris)">${communs}</td>
        <td><button class="btn mini" onclick="planifierSaillie('${f.id}','${m.id}')">${L('Planifier','Plan')}</button></td>
      </tr>`;
    }
  }

  // Recommandations prioritaires
  const bons=[];
  for(const f of femelles){
    let bestF=Infinity,bestM=null;
    for(const m of males){
      const F=coefConsanguinite(f.id,m.id);
      if(F<bestF){bestF=F;bestM=m;}
    }
    if(bestM) bons.push({f,m:bestM,F:bestF});
  }
  const recos=bons.sort((a,b)=>a.F-b.F).slice(0,3).map(x=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--ligne,#E6E0D0)">
      <span style="font-size:1.3rem">💑</span>
      <div style="flex:1">
        <b>${esc(x.f.nom)}</b> × <b>${esc(x.m.nom)}</b>
        <span class="tag ${riskLabel(x.F).cls}" style="margin-left:6px">${riskLabel(x.F).icon} ${x.F===0?L('Aucun risque','No risk'):x.F+'%'}</span>
      </div>
      <button class="btn mini sec" onclick="planifierSaillie('${x.f.id}','${x.m.id}')">${L('Choisir','Select')}</button>
    </div>`).join('');

  return `
    <h2 class="page-title">🧬 ${L('Suivi de consanguinité','Inbreeding tracker')}</h2>
    <p class="page-sub">${L('Évitez les croisements à risque. Coefficient de Wright calculé sur 3 générations.','Avoid risky matings. Wright coefficient calculated over 3 generations.')}</p>

    <div class="card" style="margin-bottom:16px;border-left:4px solid var(--feuille,#F4B41A)">
      <h3 style="margin-bottom:10px">⭐ ${L('Croisements recommandés','Recommended matings')}</h3>
      ${recos||`<p class="vide">${L('Ajoutez les pères et mères dans la fiche de chaque animal pour afficher les recommandations.','Add parents to each animal\'s record to display recommendations.')}</p>`}
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px">📊 ${L('Matrice de consanguinité — toutes les combinaisons','Inbreeding matrix — all combinations')}</h3>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>${L('Femelle','Female')}</th>
            <th>${L('Mâle','Male')}</th>
            <th>${L('Risque','Risk')}</th>
            <th>${L('Ancêtres communs','Common ancestors')}</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <p class="vide" style="margin-top:12px;font-style:normal">
        ${L('Les risques ne sont calculés que si les père et mère ont été renseignés dans la fiche de chaque animal (menu Cheptel → fiche de l\'animal → Modifier).','Risks are only calculated if the sire and dam have been filled in each animal\'s record (Herd menu → animal record → Edit).')}
      </p>
    </div>

    <div class="card" style="margin-top:16px;background:var(--creme,#FBF3E0)">
      <h3>📖 ${L('Comprendre le coefficient (F)','Understanding the coefficient (F)')}</h3>
      <table style="margin-top:10px">
        <tbody>
          <tr><td><span class="tag ok">✅ F = 0 %</span></td><td style="padding-left:10px">${L('Aucun ancêtre commun — idéal','No common ancestor — ideal')}</td></tr>
          <tr><td><span class="tag ok">✅ F ≤ 3,1 %</span></td><td style="padding-left:10px">${L('Très faible — cousins éloignés','Very low — distant cousins')}</td></tr>
          <tr><td><span class="tag gest">🟡 F ≤ 6,25 %</span></td><td style="padding-left:10px">${L('Acceptable — à surveiller','Acceptable — monitor carefully')}</td></tr>

function planifierSaillie(idF, idM){
  naviguer('reproduction');
  setTimeout(()=>{
    const sf=document.getElementById('s-fem');
    const sm=document.getElementById('s-mal');
    if(sf) sf.value=idF;

function vueRepro(){
  const femelles = etat.lapins.filter(l=>l.sexe==='F' && l.statut==='actif' && espDe(l)===espActive());
  const males = etat.lapins.filter(l=>l.sexe==='M' && l.statut==='actif' && espDe(l)===espActive());
  const occupees = new Set(etat.saillies.filter(s=>s.statut==='attente').map(s=>s.femelle));
  const femDispo = femelles.filter(f=>!occupees.has(f.id));

  const lignes = etat.saillies.filter(s=>espSaillie(s)===espDef()).slice().reverse().map(s => {
    let etape = '', actions = '';
    if(s.statut === 'attente'){
      etape = `<span class="tag gest">${t('tag_gest')}</span><br><small>${t('palp_lbl')} : ${fdate(ajJours(s.date,espSaillie(s).palpation))}<br>${t('due_lbl')} : <b>${fdate(ajJours(s.date,espSaillie(s).gestation))}</b></small>`;
      actions = `<button class="btn mini" onclick="formMiseBas('${s.id}')">${t('btn_kindle')}</button>
                 <button class="btn mini danger" onclick="echecSaillie('${s.id}')">${t('btn_fail')}</button>`;
    } else if(s.statut === 'misebas'){
      etape = `<span class="tag ok">${t('tag_kindled')} ${fdate(s.dateMiseBas)}</span><br>
        <small>${fmt(t('born_line'),{v:s.vivants,m:s.morts})}${s.sevre ? ' · <b>'+t('weaned_lbl')+'</b>' : ' · '+t('wean_due_lbl')+' : <b>'+fdate(ajJours(s.dateMiseBas,espSaillie(s).sevrage))+'</b>'}</small>`;
      if(!s.sevre) actions = `<button class="btn mini sec" onclick="sevrer('${s.id}')">${t('btn_wean')}</button>`;
    } else {
      etape = `<span class="tag fin">${t('tag_fail')}</span>`;
    }
    return `<tr><td><b>${nom(s.femelle)}</b> × ${nom(s.male)}</td><td>${fdate(s.date)}</td><td>${etape}</td><td style="text-align:right">${actions}</td></tr>`;
  }).join('');

  return `
    <h2 class="page-title">${t('repro_title')}</h2>
    <p class="page-sub">${fmt(t('repro_sub'),{g:espDef().gestation,s:espDef().sevrage})}</p>
    ${selecteurEspece()}
    ${blocAgenda()}
    <div class="card" style="margin-bottom:16px">
      <h3>${t('repro_add')}</h3>
      ${femDispo.length && males.length ? `
      <form class="ligne" onsubmit="ajouterSaillie(event)">
        <div class="champ"><label>${t('f_doe')}</label><select id="s-fem">${femDispo.map(f=>`<option value="${f.id}">${esc(f.nom)}</option>`).join('')}</select></div>
        <div class="champ"><label>${t('f_buck')}</label><select id="s-mal">${males.map(m=>`<option value="${m.id}">${esc(m.nom)}</option>`).join('')}</select></div>
        <div class="champ"><label>${t('f_matedate')}</label><input type="date" id="s-date" value="${auj()}" required></div>
        <button class="btn">${t('btn_save')}</button>
      </form>
      <p class="vide" style="font-style:normal">${fmt(t('repro_note'),{p:espDef().palpation,g:espDef().gestation})}</p>`
      : `<p class="vide">${t('repro_need')}</p>`}
      ${etat.saillies.length ? `<table><thead><tr><th>${t('th_pair')}</th><th>${t('th_mating')}</th><th>${t('th_track')}</th><th></th></tr></thead><tbody>${lignes}</tbody></table>` : ''}
    </div>
    <div id="zone-misebas"></div>`;
}

function hygItems(){ return CHECKLIST_HYG[langue]||CHECKLIST_HYG.fr; }
function scoreHyg(ctrl){
  const items=hygItems(); if(!items.length) return 0;
  return Math.round(ctrl.filter(Boolean).length/items.length*100);
}
function vueHygiene(){
  const L=(fr,en)=>langue==='fr'?fr:en;
  if(!etat.hygiene) etat.hygiene=[];
  // contrôle du jour
  const jourl = etat.hygiene.find(h=>h.date===auj());
  const ctrl = jourl ? jourl.ctrl : Array(hygItems().length).fill(false);
  const score = jourl ? scoreHyg(jourl.ctrl) : null;
  // historique 7 derniers jours
  const hist = etat.hygiene.slice().reverse().slice(0,7);
  const coulScore=(s)=> s>=80?'var(--feuille-fonce,#1C4025)':s>=50?'var(--ambre)':'var(--rouge)';
  const badgeScore=(s)=>`<span style="font-weight:800;color:${coulScore(s)}">${s}%</span>`;
  const histHtml = hist.length
    ? `<table><thead><tr><th>${L('Date','Date')}</th><th>${L('Points','Points')}</th><th>${L('Score','Score')}</th><th>${L('Signé par','Signed by')}</th></tr></thead><tbody>`
      + hist.map(h=>`<tr>
          <td>${fdate(h.date)}</td>
          <td>${h.ctrl.filter(Boolean).length}/${hygItems().length}</td>
          <td>${badgeScore(scoreHyg(h.ctrl))}</td>
          <td><b>${esc(h.agent||'—')}</b></td>
        </tr>`).join('')+'</tbody></table>'
    : `<p class="vide">${L('Aucun contrôle enregistré.','No check recorded yet.')}</p>`;
  const items=hygItems();
  const checkboxes=items.map((itm,i)=>`
    <label style="display:flex;gap:12px;align-items:flex-start;padding:10px 12px;
      background:${(jourl&&jourl.ctrl[i])?'#EDF7ED':'#fff'};
      border:1.5px solid ${(jourl&&jourl.ctrl[i])?'#81C784':'#E6E0D0'};
      border-radius:10px;cursor:pointer;transition:background .15s">
      <input type="checkbox" id="hyg${i}" ${(jourl&&jourl.ctrl[i])?'checked':''} onchange="majHyg(${i},this.checked)"
        style="margin-top:3px;accent-color:var(--vert-foret);width:18px;height:18px;flex:none">
      <span>
        <span style="font-size:1.2rem">${itm[2]}</span>
        <b style="margin-left:6px">${esc(itm[0])}</b>
        <br><span style="font-size:.85rem;color:var(--gris)">${esc(itm[1])}</span>
      </span>
    </label>`).join('');
  return `<div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <h3 style="margin:0">🧹 ${L('Hygiène & propreté du jour','Daily hygiene & cleanliness')} — ${fdate(auj())}</h3>
      ${score!==null?`<span style="font-size:1.5rem;font-weight:800;color:${coulScore(score)}">${score}%</span>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">${checkboxes}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input id="hyg-agent" placeholder="${L('Votre nom / agent','Your name / agent')}"
        style="border:1.5px solid #E6E0D0;border-radius:9px;padding:8px 12px;font-size:.92rem;flex:1;min-width:150px"
        value="${jourl?esc(jourl.agent||''):''}">
      <button class="btn" onclick="validerHyg()">${L('✅ Valider & signer','✅ Submit & sign')}</button>
    </div>
    <p class="vide" style="margin-top:8px">${L('Le superviseur voit le score et la signature dans l\'historique ci-dessous.','The supervisor sees the score and signature in the history below.')}</p>
  </div>
  <div class="card">
    <h3>📋 ${L('Historique des contrôles (7 derniers jours)','Hygiene check history (last 7 days)')}</h3>
    ${histHtml}
  </div>`;
}
function majHyg(i, val){
  if(!etat.hygiene) etat.hygiene=[];
  let h=etat.hygiene.find(x=>x.date===auj());
  if(!h){ h={id:uid(),date:auj(),ctrl:Array(hygItems().length).fill(false),agent:''}; etat.hygiene.push(h); }
  h.ctrl[i]=val; sauver();
  // mettre à jour le score affiché sans re-rendre toute la page
  const score=scoreHyg(h.ctrl);
  const sp=document.querySelector('[data-hygsc]');
  if(sp) sp.textContent=score+'%';
}
function validerHyg(){
  const L=(fr,en)=>langue==='fr'?fr:en;
  if(!etat.hygiene) etat.hygiene=[];
  let h=etat.hygiene.find(x=>x.date===auj());
  const agent=(document.getElementById('hyg-agent')||{}).value||'';
  if(!h){ h={id:uid(),date:auj(),ctrl:Array(hygItems().length).fill(false),agent:''}; etat.hygiene.push(h); }
  h.agent=agent.trim()||L('Inconnu','Unknown');
  const score=scoreHyg(h.ctrl);
  sauver(); rendre();
  alert('✅ '+L('Contrôle enregistré','Check recorded')+' — '
    +L('Score du jour :','Today\'s score:')+' '+score+'%'
    +' — '+L('Signé :','Signed:')+' '+h.agent
    +(score<80?'\n⚠️ '+L('Score insuffisant — rappeler l\'agent et faire un nouveau contrôle.','Insufficient score — remind the agent and do a new check.'):''));
}

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="rapportFinancier()">🏦 ${t('rf_btn')}</button>

function partagerBilan(){
  const k = calculerKPI();
  const conseils = calculerDiagnostic(k);
  const actifs = etat.lapins.filter(l => l.statut === 'actif');
  const fem = actifs.filter(l=>l.sexe==='F').length, mal = actifs.filter(l=>l.sexe==='M').length;
  const kits = etat.saillies.filter(s=>s.statut==='misebas' && !s.sevre).reduce((x,s)=>x+(s.vivants||0),0);
  const v = x => x === null ? '—' : x;
  const lignes = [
    t('wa_report_title') + ' — ' + fdate(auj()),
    t('wa_herd') + ' : ' + fem + ' ♀ · ' + mal + ' ♂ · ' + kits + ' 🐇',
    t('kpi_fert') + ' : ' + v(k.fert) + (k.fert!==null?' %':''),
    t('kpi_prol') + ' : ' + v(k.prol),
    t('kpi_still') + ' : ' + v(k.still) + (k.still!==null?' %':''),
    t('st_sales') + ' : ' + fcfa(k.ventes),
    t('st_exp') + ' : ' + fcfa(k.dep),
    '*' + t('kpi_margin') + ' : ' + fcfa(k.marge) + '*'
  ];
  if(conseils.length) lignes.push(t('wa_advice') + ' : ' + conseils[0]);
  lignes.push('— CuniSmart 🐇');
  partagerWhatsApp(lignes.join('\n'));
}


/* ================= RAPPORT FINANCIER (OHADA / banques) ================= */
function rapportFinancier(){
  const L = (fr,en) => langue==='fr' ? fr : en;
  const tx = etat.transactions.slice();
  const ventes = tx.filter(x=>x.type==='vente');
  const depenses = tx.filter(x=>x.type==='depense');
  const totV = ventes.reduce((s,x)=>s+(x.montant||0),0);
  const totD = depenses.reduce((s,x)=>s+(x.montant||0),0);
  const resultat = totV - totD;
  const dates = tx.map(x=>x.date).filter(Boolean).sort();
  const periode = dates.length ? (fdate(dates[0]) + '  →  ' + fdate(dates[dates.length-1])) : L('Toutes opérations','All records');
  const nb = etat.lapins.filter(l=>l.statut==='actif').length;
  const parEsp = ORDRE_ESP.map(k=>{
    const n = etat.lapins.filter(l=>l.statut==='actif' && espDe(l)===k).length;
    return n>0 ? (ESPECES[k].icon+' '+espLbl(k)+' : '+n) : null;
  }).filter(Boolean).join('  ·  ');
  const nom = (etat.ecole && etat.ecole.nom) ? esc(etat.ecole.nom) : L('(à compléter)','(to complete)');

  const rows = arr => arr.length
    ? arr.slice().sort((a,b)=>(a.date||'')<(b.date||'')?-1:1)
        .map(x=>`<tr><td>${fdate(x.date)}</td><td>${esc(x.desc||'—')}</td><td class="rf-r">${fcfa(x.montant||0)}</td></tr>`).join('')
    : `<tr><td colspan="3" style="color:#999;font-style:italic">${L('Aucune opération enregistrée.','No record yet.')}</td></tr>`;

  const doc =
   `<div class="rf-actions rf-noprint">
      <button class="btn" onclick="window.print()">🖨️ ${L('Imprimer / Enregistrer en PDF','Print / Save as PDF')}</button>
      <button class="btn sec" onclick="naviguer('bilan')">← ${L('Retour','Back')}</button>
    </div>
    <div class="rf-doc card">
      <div class="rf-head">
        <div><div class="rf-mark">CuniSmart</div><div class="rf-sub">SCOOPS CAPAO · Cameroun · cunismart.com</div></div>
        <div class="rf-logo">${L('Logo','Logo')}</div>
      </div>
      <h1>${L('ÉTAT DE RÉSULTAT SIMPLIFIÉ','SIMPLIFIED INCOME STATEMENT')}</h1>
      <div class="rf-meta">
        ${L('Exploitation','Farm')} : <b>${nom}</b><br>
        ${L('Période','Period')} : ${periode} &nbsp;·&nbsp; ${L('Édité le','Issued on')} : ${fdate(auj())}<br>
        ${L('Cheptel actif','Active herd')} : <b>${nb}</b> ${L('animaux','animals')}${parEsp?(' &nbsp;('+parEsp+')'):''} &nbsp;·&nbsp; ${L('Devise','Currency')} : FCFA
      </div>
      <table class="rf-table">
        <tr class="rf-section"><td colspan="3">${L('PRODUITS (Recettes)','INCOME (Revenue)')}</td></tr>
        ${rows(ventes)}
        <tr class="rf-total"><td colspan="2">${L('Total des produits','Total income')}</td><td class="rf-r">${fcfa(totV)}</td></tr>
        <tr class="rf-section"><td colspan="3">${L('CHARGES (Dépenses)','EXPENSES')}</td></tr>
        ${rows(depenses)}
        <tr class="rf-total"><td colspan="2">${L('Total des charges','Total expenses')}</td><td class="rf-r">${fcfa(totD)}</td></tr>
        <tr class="rf-result"><td colspan="2">${L('RÉSULTAT NET','NET RESULT')}</td><td class="rf-r" style="color:${resultat>=0?'#1C4025':'#C0392B'}">${fcfa(resultat)}</td></tr>
      </table>
      <div class="rf-sign">${L('Fait le','Done on')} ${fdate(auj())} &nbsp;—&nbsp; ${L('Signature','Signature')} : ______________________</div>
      <div class="rf-foot">${L(
        'Document généré par CuniSmart. État simplifié des recettes et dépenses (trésorerie), présentation inspirée du référentiel SYSCOHADA. Ne constitue pas un bilan comptable audité.',
        'Generated by CuniSmart. Simplified cash-based income/expense statement, presentation inspired by the SYSCOHADA framework. Not an audited financial statement.')}</div>
    </div>`;
  document.getElementById('contenu').innerHTML = doc;
  window.scrollTo(0,0);
}

function majSac(v){
  sacKg = Math.max(1, Math.min(1000, parseFloat(v)||50));
  rendre();
  const i = document.getElementById('nut-kg'); if(i){ i.value = sacKg; i.focus(); }
}
async function demanderPro(){
  const code = prompt(t('pro_ask_code'));
  if(code === null) return;               // annulé
  const v = code.trim();
  if(v === ''){ window.location.href = 'payer.html'; return; }  // vide -> page d'abonnement
  await activerAbo(v, 'pro');
}

/* Activation d'un abonnement par code, vérifié CÔTÉ SERVEUR.
   Le code n'est plus dans l'application : il vit dans la base, il est unique,
   à usage unique, et sa durée est décidée par le serveur (duration_days). */
/* Rend la saisie du code tolérante. « sup208694 », « SUP 208694 »,
   « sup-208694 » et « SUP-208694 » désignent le même code.
   Recopier un tiret depuis WhatsApp sur un clavier de téléphone est
   une source d'échec garantie — autant l'absorber ici. */
function normCode(v){
  const brut = String(v == null ? '' : v).trim().toUpperCase();
  const c = brut.replace(/[^A-Z0-9]/g, '');       // enlève tirets, espaces, points
  const m = c.match(/^(PRO|SUP)([A-Z0-9]{6})$/);
  return m ? (m[1] + '-' + m[2]) : brut;
}

async function activerAbo(v, type){
  v = normCode(v);
  const phone = (etat.compte && etat.compte.phone) || null;
  const bad = (type === 'superpro') ? 'sp_bad' : 'pro_bad';
  let res;
  try{
    /* On n'envoie PLUS le type : c'est la base qui sait ce qu'est un code.
       Deviner d'après le préfixe faisait échouer toute clé venue d'un
       revendeur (Chariow génère « 5XAK-MENK-… », pas « SUP-… »). */
    res = await apiCompte('activate', { code: v, phone: phone });
  }catch(e){
    alert(langue === 'fr'
      ? "Pas de connexion. L'activation d'un code nécessite Internet — réessayez une fois connecté."
      : "No connection. Activating a code requires the Internet — try again once online.");
    return;
  }
  const d = res.data || {};
  if(res.status === 429){
    alert(langue === 'fr'
      ? "Trop de tentatives. Patientez quelques minutes avant de réessayer."
      : "Too many attempts. Please wait a few minutes before trying again.");
    return;
  }
  /* Un problème de base de données n'est PAS un code invalide. Les confondre
     nous a fait perdre une soirée : on croyait le code faux alors que le
     serveur ne pouvait même pas lire la table. */
  if(d.error === 'db_error'){
    alert((langue === 'fr'
      ? "⚠️ Problème technique côté serveur — votre code n'est pas en cause et n'a pas été consommé.\n\nDétail : "
      : "⚠️ Server-side technical problem — your code is fine and was not used.\n\nDetail: ") + (d.detail || '?'));
    return;
  }
  if(d.error === 'cloud_non_configure'){
    alert(langue === 'fr' ? "Le service d'activation n'est pas configuré." : "Activation service not configured.");
    return;
  }
  if(!d.ok || !d.exp){ alert(t(bad)); return; }

  // Le type vient du serveur, qui l'a lu en base. Lui seul fait foi.
  if(d.type === 'superpro'){
    etat.superpro = true; etat.pro = true; etat.spDepuis = auj(); etat.spExp = d.exp;
    sauver(); alert(t('sp_ok')); rendre();
  } else {
    etat.pro = true; etat.proDepuis = auj(); etat.proExp = d.exp;
    sauver(); alert(t('pro_ok')); rendre();
  }
}
function partagerRecette(type){
  const r = recettesEsp()[type][langue];
  const lignes = [ (type==='pro'?'⭐ ':'🌱 ') + r.nom + ' — ' + sacKg + ' kg', '' ];
  r.ing.forEach(([n,role,pc])=> lignes.push('• ' + n + ' : ' + (Math.round(pc/100*sacKg*100)/100) + ' kg'));
  lignes.push('', '— CuniSmart 🐇');
  partagerWhatsApp(lignes.join('\n'));
}

function niveauValide(idxNiveau){
  const nv = NIVEAUX[idxNiveau];
  for(let i = nv.deb; i < nv.fin; i++) if(!etat.ecole.validees.includes(i)) return false;
  return true;
}
function niveauAccessible(ni){
  if(ni === 0) return true;              /* Niveau 1 Débutant = gratuit */
  if(etat.pro !== true) return false;    /* Niveaux 2 et 3 = Pro */
  if(ni === 2 && !niveauValide(1)) return false; /* progression dans le Pro */
  return true;
}

function ouvrirFiche(k,i){ ficheOuverte = {esp:k, i:i}; rendre(); window.scrollTo(0,0); }
function fermerFiche(){ ficheOuverte = null; rendre(); window.scrollTo(0,0); }
function validerQuizFiche(k,i){
  const sel = document.querySelector('input[name="qf"]:checked');
  const res = document.getElementById('qf-res');
  const L = (fr,en)=> langue==='fr'?fr:en;
  if(!sel){ if(res) res.innerHTML = '<span style="color:var(--rouge)">'+L('Choisissez une réponse.','Pick an answer.')+'</span>'; return; }
  const qz = QUIZ_ESP[k][langue][i];
  if(parseInt(sel.value) === qz.b){
    if(!etat.ecole.valideesEsp) etat.ecole.valideesEsp = {};
    if(!etat.ecole.valideesEsp[k]) etat.ecole.valideesEsp[k] = [];
    if(!etat.ecole.valideesEsp[k].includes(i)) etat.ecole.valideesEsp[k].push(i);
    sauver();
    if(res) res.innerHTML = '<span style="color:var(--feuille-fonce);font-weight:700">✓ '+L('Bonne réponse ! Fiche validée.','Correct! Card completed.')+'</span>';
    setTimeout(()=>{ ficheOuverte = null; rendre(); window.scrollTo(0,0); }, 900);
  } else {
    if(res) res.innerHTML = '<span style="color:var(--rouge)">✗ '+L('Pas tout à fait — relisez la fiche et réessayez.','Not quite — re-read the card and try again.')+'</span>';
  }
}
function partagerCertifEsp(k){
  const L = (fr,en)=> langue==='fr'?fr:en;
  const num = (etat.ecole.numEsp && etat.ecole.numEsp[k]) ? ('N° '+etat.ecole.numEsp[k]) : '';
  const txt = [ '🎓 '+L('Certificat CuniMaster','CuniMaster Certificate')+' — '+espLbl(k),
    (etat.ecole.nom||'—'),
    L('Parcours essentiel validé.','Essential path completed.'), num, '— CuniSmart' ].filter(Boolean);
  partagerWhatsApp(txt.join('\n'));
}

function reessayerQuiz(i){ quizResultat = null; rendre(); }

function corrigerQuiz(i){
  const qz = LECONS[i][langue].qz;
  let bonnes = 0;
  qz.forEach((q,qi)=>{
    const sel = document.querySelector(`input[name="q${qi}"]:checked`);
    const rep = sel ? parseInt(sel.value) : -1;
    if(rep === q.b) bonnes++;
    document.querySelectorAll(`.quiz-q[data-q="${qi}"] .quiz-opt`).forEach(opt=>{
      const oi = parseInt(opt.dataset.o);
      if(oi === q.b) opt.classList.add('bonne');
      else if(oi === rep) opt.classList.add('fausse');
      opt.querySelector('input').disabled = true;
    });
  });
  quizResultat = bonnes >= 4 ? 'ok' : 'ko';
  if(quizResultat === 'ok' && !etat.ecole.validees.includes(i)){
    etat.ecole.validees.push(i); sauver();
  }
  /* Réafficher uniquement le feedback sans re-rendre le quiz (pour garder les couleurs) */
  const zone = document.getElementById('quiz-zone');
  const bloc = zone.parentElement;
  const btn = bloc.querySelector('button.btn:not(.mini)');
  if(btn) btn.remove();
  const div = document.createElement('div');
  div.innerHTML = quizResultat === 'ok'
    ? `<div class="alerte info" style="margin-top:12px">🎉 <span><b>${t('quiz_pass')}</b></span></div>
       <button class="btn sec" style="margin-top:8px" onclick="fermerLecon()">${t('btn_back')}</button>`
    : `<div class="alerte urgent" style="margin-top:12px">✋ <span>${t('quiz_fail')}</span></div>
       <button class="btn" style="margin-top:8px" onclick="reessayerQuiz(${i})">${t('btn_retry')}</button>`;
  bloc.appendChild(div);
}

function lotOrigineOptions(){

function lotPayload(lot){
  const data = { v:1, i:lot.id, n:lot.nom, ty:lot.type, q:lot.qte, pw:lot.poids,
    b:lot.date, o:lot.origine||'', rc:lot.race||'', al:lot.alim||'',
    sa:lot.sante||'', hyg:lot.hygGrade||'', hygsc:lot.hygScore||'',
    s:lot.note||'', ach:lot.acheteur||'',
    e:lot.producteur||'SCOOPS CAPAO', esp:lot.espece||'lapin', d:lot.cree };
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}
function lienTrace(lot){
  const p = lotPayload(lot);
  return location.origin + '/trace.html#' + p + (lot.sig ? '.' + lot.sig : '');
}
function qrSvg(lot){
  try{ const qr = qrcode(0,'M'); qr.addData(lienTrace(lot)); qr.make();
    return qr.createSvgTag({cellSize:4, margin:2, scalable:true}); }
  catch(e){ return '<div class="vide">QR ✕</div>'; }
}

function exportFichier(){
  try{

    const blob = new Blob([JSON.stringify(copie)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);

    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
  }catch(e){ alert(t('cpt_err')); }
}
function importFichier(input){
  const f = input.files && input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      if(!d || typeof d !== 'object' || !Array.isArray(d.lapins)) throw 0;
      if(!confirm(t('cpt_import_confirm'))) return;
      Object.assign(etat, d);
      if(!etat.lots) etat.lots = [];
      sauver(); alert(t('cpt_import_ok')); naviguer('tableau');
    }catch(e){ alert(t('cpt_import_bad')); }
  };
  r.readAsText(f);
}

/* ---- Compte CLOUD (Supabase via nos fonctions serveur) ---- */
async function apiCompte(path, body){
  const r = await fetch('/api/account/'+path, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  let data = {}; try{ data = await r.json(); }catch(e){}
  return { status:r.status, data };
}
/* Normalisation côté client : même règle que lib/phone.js sur le serveur.
   « 696603209 », « 237696603209 » et « +237 696 603 209 » = UN SEUL compte. */
function normPhone(input){
  const brut = String(input == null ? '' : input).trim();
  if(!brut) return null;
  // Cameroun / Bénin : normalisation stricte (un seul compte quel que soit le format)
  let d = brut.replace(/\D/g,'').replace(/^00/, '');
  if(/^237[0-9]{9}$/.test(d))  return d;
  if(/^229[0-9]{10}$/.test(d)) return d;
  if(/^229[0-9]{8}$/.test(d))  return '22901' + d.slice(3);
  if(/^6[0-9]{8}$/.test(d))    return '237' + d;
  if(/^01[0-9]{8}$/.test(d))   return '229' + d;
  // Autres pays : identifiant libre (numéro complet avec indicatif, ou pseudo).
  const libre = brut.toLowerCase().replace(/\s+/g,' ').trim();
  const utile = libre.replace(/[^a-z0-9]/g,'');
  if(utile.length < 4 || libre.length > 40) return null;
  return libre;
}

function appVide(){
  return (etat.lapins||[]).length === 0
      && (etat.saillies||[]).length === 0
      && (etat.transactions||[]).length === 0
      && (etat.soins||[]).length === 0
      && (etat.lots||[]).length === 0;
}

function compteLogin(){
  const brut = (document.getElementById('cpt-phone').value||'').trim();
  const code = (document.getElementById('cpt-code').value||'').trim();
  const phone = normPhone(brut);
  if(!phone){
    alert(langue==='fr'
      ? "Identifiant trop court.\n\nUtilisez votre numéro de téléphone AVEC l'indicatif pays (ex. 221771234567 pour le Sénégal), ou un identifiant d'au moins 4 caractères."
      : "Identifier too short.\n\nUse your phone number WITH the country code (e.g. 221771234567 for Senegal), or an identifier of at least 4 characters.");
    return;
  }
  if(code.length < 4){ alert(t('cpt_bad_code')); return; }
  apiCompte('login', {phone, code}).then(async ({status,data})=>{
    if(status===200 && data.ok){
      const p = data.phone || phone;      // on stocke la forme canonique du serveur
      etat.compte = { phone: p, code, ok:true };
      refLier(p);
      if(data.pro === true) etat.pro = true;
      await sauver();

      /* Restauration automatique. Avant, « Connecté ! » n'allait chercher aucune
         donnée : l'éleveur voyait son app vide et croyait tout avoir perdu. */
      if(data.created !== true && data.aDesDonnees === true){
        if(appVide()){
          await cloudRestoreAuto();       // rien en local : on restaure sans rien demander
          return;
        }
        if(confirm(langue==='fr'
          ? "Une sauvegarde existe sur le cloud pour ce numéro.\n\nLa récupérer ? Vos données actuelles sur ce téléphone seront remplacées."
          : "A cloud backup exists for this number.\n\nRestore it? Your current data on this phone will be replaced.")){
          await cloudRestoreAuto();
          return;
        }
      }
      alert(t('cpt_login_ok')); rendre();
    } else { alert(data.error || t('cpt_login_bad')); }
  }).catch(()=> alert(t('cpt_net')));
}

async function cloudRestoreAuto(){
  const sess = { phone: etat.compte.phone, code: etat.compte.code, ok:true };
  try{
    const { status, data } = await apiCompte('restore', {phone:sess.phone, code:sess.code});
    if(status===200 && data.ok && data.data){
      Object.assign(etat, data.data);
      etat.compte = sess;
      if(data.pro === true) etat.pro = true;
      if(!etat.lots) etat.lots = [];
      await sauver();
      alert(t('cpt_restored')); naviguer('tableau'); return;
    }
  }catch(e){}
  alert(t('cpt_login_ok')); rendre();
}
function cloudBackup(){
  if(!etat.compte || !etat.compte.ok) return;
  const copie = Object.assign({}, etat); delete copie.compte;
  apiCompte('backup', {phone:etat.compte.phone, code:etat.compte.code, data:copie}).then(({status,data})=>{
    alert(status===200 && data.ok ? t('cpt_saved') : (data.error||t('cpt_err')));
  }).catch(()=> alert(t('cpt_net')));
}
function cloudRestore(){
  if(!etat.compte || !etat.compte.ok) return;
  if(!confirm(t('cpt_restore_confirm'))) return;
  const sess = { phone: etat.compte.phone, code: etat.compte.code, ok:true };

    if(status===200 && data.ok && data.data){

      if(data.pro === true) etat.pro = true;
      if(!etat.lots) etat.lots = [];
      sauver(); alert(t('cpt_restored')); naviguer('tableau');

  }).catch(()=> alert(t('cpt_net')));
}

/* ---- CARTE ABONNEMENT ----
   Avant, le SEUL moyen de saisir son code d'activation était de tomber par
   hasard sur un écran verrouillé (Nutrition, Finances, Bilan, Traçabilité).
   « Mon compte » — l'endroit où tout le monde cherche — n'avait rien.
   Cette carte y est toujours visible, avec un vrai champ (pas un prompt()). */
function carteAbo(){
  const fr = (langue === 'fr');

  /* Bandeau d'état : ce à quoi l'éleveur a droit aujourd'hui, et jusqu'à quand. */
  let statut = '';
  if(etat.superpro === true){
    statut = '<p style="margin:6px 0 12px;color:var(--gris)">✅ <b>Super PRO</b> — '+
      (fr?'multi-élevage actif jusqu\'au ':'multi-species active until ')+
      '<b>'+fdate(etat.spExp)+'</b></p>';
  } else if(etat.pro === true){
    statut = '<p style="margin:6px 0 12px;color:var(--gris)">✅ <b>CuniSmart Pro</b> — '+
      (fr?'actif jusqu\'au ':'active until ')+'<b>'+fdate(etat.proExp)+'</b></p>';
  }

  /* Le champ reste TOUJOURS visible, même pour un abonné actif.
     Sans ça, impossible de saisir le code de renouvellement à l'échéance
     des 182 jours — le modèle de réactivation serait mort. */
  const abonne = (etat.pro === true || etat.superpro === true);
  const titre = abonne
    ? (fr?'⭐ Mon abonnement':'⭐ My subscription')
    : (fr?'⭐ Activer mon abonnement':'⭐ Activate my subscription');
  const invite = abonne
    ? (fr?'Code de renouvellement ou de mise à niveau reçu par WhatsApp ? Saisissez-le ici.'
         :'Received a renewal or upgrade code by WhatsApp? Enter it here.')
    : (fr?'Vous avez reçu un code par WhatsApp après votre paiement ? Saisissez-le ici.'
         :'Received a code by WhatsApp after paying? Enter it here.');

  return '<div class="card" style="margin-bottom:16px;border:2px solid var(--vert-moyen);background:linear-gradient(160deg,#FFF9EE,#FCF3E2)">'+
    '<h3 style="color:#6B2409">'+titre+'</h3>'+
    statut+
    '<p style="color:var(--gris);margin:6px 0 12px;font-size:14px">'+invite+'</p>'+
    '<form class="ligne" onsubmit="event.preventDefault();activerDepuisChamp()">'+
      '<div class="champ"><label>'+(fr?'Code d\'activation':'Activation code')+'</label>'+
        '<input id="abo-code" placeholder="PRO-XXXXXX" autocomplete="off" '+
        'style="text-transform:uppercase;letter-spacing:.05em;font-weight:600"></div>'+
      '<button class="btn">'+(fr?'Activer':'Activate')+'</button>'+
    '</form>'+
    '<p style="color:var(--gris);font-size:13px;margin:12px 0 0">'+
      (fr?'Pas encore de code ? ':'No code yet? ')+
      '<a href="payer.html" style="color:var(--vert-foret);font-weight:600">'+
      (fr?'Voir les tarifs et payer':'See pricing and pay')+'</a></p>'+
    '</div>';
}

/* Le préfixe du code décide de la formule : PRO- ou SUP-.
   L'éleveur n'a rien à choisir — une case de moins où se tromper. */
async function activerDepuisChamp(){
  const el = document.getElementById('abo-code');
  const v = ((el && el.value) || '').trim().toUpperCase();
  if(v.length < 4){

  // Plus de devinette sur le préfixe : n'importe quel format de clé passe.

}

        '<div class="champ"><label>'+t('tr_race')+'</label><input id="lot-race" placeholder="'+t('tr_race_ph')+'"></div>'+
        '<div class="champ"><label>'+t('tr_feed')+'</label><input id="lot-alim" placeholder="'+t('tr_feed_ph')+'"></div>'+
        '<div class="champ"><label>'+t('tr_sante')+'</label><input id="lot-sante" placeholder="'+t('tr_sante_ph')+'"></div>'+
        '<div class="champ"><label>'+t('tr_hyg')+'</label><select id="lot-hyg">'+
          '<option value="">'+t('tr_hyg_ph')+'</option>'+
          ['A','B','C'].map(g=>`<option value="${g}">${g}</option>`).join('')+'</select></div>'+
        '<div class="champ"><label>'+t('tr_acheteur')+'</label><input id="lot-acheteur" placeholder="'+t('tr_acheteur_ph')+'"></div>'+
        '<div class="champ"><label>'+t('tr_note')+'</label><input id="lot-note" placeholder="'+t('tr_note_ph')+'"></div>'+
        '<button class="btn">'+t('tr_create')+'</button>'+
      '</form>'+
      (etat.lots.length ? cartes : '<p class="vide">'+t('tr_empty')+'</p>')+
    '</div>';
}

function creerLot(e){
  e.preventDefault();
  const g = id => document.getElementById(id);
  let origine = g('lot-origine').value.trim();
  const pid = g('lot-portee').value;
  if(pid && !origine){
    const s = etat.saillies.find(x=>x.id===pid);
    if(s) origine = fmt(t('tr_born_from'), {p: nom(s.femelle)+' × '+nom(s.male), d: fdate(s.dateMiseBas)});
  }
  // score d'hygiène du dernier contrôle
  let hygScore=''; if(etat.hygiene && etat.hygiene.length){
    const h=etat.hygiene.slice().sort((a,b)=>b.date.localeCompare(a.date))[0];
    const it=hygItems(); if(it.length) hygScore=Math.round(h.ctrl.filter(Boolean).length/it.length*100)+'%';
  }
  const gradeHyg = g('lot-hyg').value;
  const lot = { id: uid(), nom: g('lot-nom').value.trim(), type: g('lot-type').value,
    qte: g('lot-qte').value ? parseInt(g('lot-qte').value,10) : null,
    poids: g('lot-poids').value.trim(),
    date: g('lot-date').value || auj(), origine,
    race: g('lot-race').value.trim(),
    alim: g('lot-alim').value.trim(),
    sante: g('lot-sante').value.trim(),
    hygGrade: gradeHyg, hygScore: hygScore,
    acheteur: g('lot-acheteur').value.trim(),
    note: g('lot-note').value.trim(), cree: auj(),
    producteur: (etat.ecole&&etat.ecole.nom)||'SCOOPS CAPAO',
    espece: espActive() };
  etat.lots.push(lot); sauver(); naviguer('tracabilite');
  signerLot(lot); // signature en arrière-plan, sans bloquer la création
}
function supprimerLot(id){
  if(!confirm(t('tr_confirm'))) return;
  etat.lots = etat.lots.filter(l=>l.id!==id); sauver(); rendre();
}

async function signerLot(lot){
  try{
    const r = await fetch('/api/sign-lot', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ payload: lotPayload(lot) })
    });
    const data = await r.json();
    if(data && data.ok && data.sig){
      lot.sig = data.sig;
      sauver(); rendre();
    }
  }catch(e){
    /* Hors-ligne : le lot existe mais reste non signé. */
  }
}

async function resignerLotsEnAttente(){
  const nonSignes = (etat.lots||[]).filter(l => !l.sig);
  for(const lot of nonSignes){ await signerLot(lot); }
}
function telechargerQR(id){
  const lot = etat.lots.find(l=>l.id===id); if(!lot) return;
  try{
    const qr = qrcode(0,'M'); qr.addData(lienTrace(lot)); qr.make();
    const a = document.createElement('a');
    a.href = qr.createDataURL(6,2);
    a.download = 'QR-'+(lot.nom||'lot').replace(/[^a-z0-9]+/gi,'-')+'.gif';
    document.body.appendChild(a); a.click(); a.remove();
  }catch(e){ alert('QR ✕'); }
}

</script>
