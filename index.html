<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#9A3412">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png?v=3">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CuniSmart">
<title>CuniSmart — Gestion d'élevage cunicole · Rabbit farm manager</title>
<style>
  :root{
    --vert-foret:#9A3412; --vert-fonce:#6B2409; --vert-moyen:#E2711D;
    --feuille:#F4B41A; --feuille-fonce:#0E7A46;
    --creme:#FBF3E0; --creme-2:#FDF8EC; --encre:#2A1C10; --gris:#7A6A55;
    --rouge:#C0392B; --ambre:#D98E04; --or:#D4A017;
    --lime:#F4B41A; --cyan:#22D3EE;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--creme-2);color:var(--encre);}

  .app{display:flex;min-height:100vh;}
  .sidebar{width:230px;background:linear-gradient(160deg,var(--vert-moyen),var(--vert-fonce));color:var(--creme);
    padding:22px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:12px;padding:4px 8px 18px;border-bottom:1px solid rgba(243,238,223,.18);margin-bottom:12px;}
  .brand h1{font-size:1.25rem;letter-spacing:.5px;}
  .brand h1 span{color:var(--feuille);}
  .brand small{display:block;font-size:.62rem;letter-spacing:2.5px;color:rgba(243,238,223,.65);font-weight:500;}
  .nav-btn{display:flex;align-items:center;gap:10px;background:none;border:none;color:rgba(243,238,223,.82);
    font-size:.93rem;padding:10px 14px;border-radius:10px;cursor:pointer;text-align:left;width:100%;transition:.15s;}
  .nav-btn:hover{background:rgba(243,238,223,.08);}
  .nav-btn.active{background:var(--creme);color:var(--vert-foret);font-weight:600;}
  .nav-btn .ico{width:20px;text-align:center;}
  .lang-btn{margin-top:8px;background:rgba(243,238,223,.12);border:1px solid rgba(243,238,223,.3);
    color:var(--creme);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:.85rem;font-weight:600;}
  .lang-btn:hover{background:rgba(243,238,223,.22);}
  .sidebar .foot{margin-top:auto;font-size:.7rem;color:rgba(243,238,223,.5);padding:0 8px;}

  main{flex:1;padding:28px 34px;max-width:1100px;}
  .page-title{font-size:1.5rem;color:var(--vert-foret);margin-bottom:4px;}
  .page-sub{color:var(--gris);font-size:.9rem;margin-bottom:22px;}

  .grid{display:grid;gap:16px;}
  .grid.stats{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:22px;}
  .card{background:#fff;border:1px solid #E6E0D0;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(42,28,16,.05);}
  .stat{text-align:center;background:linear-gradient(180deg,#fff,#FCFAF4);transition:transform .12s ease,box-shadow .12s ease;}
  .stat:hover{transform:translateY(-2px);box-shadow:0 7px 18px rgba(42,28,16,.10);}
  .stat .ico{font-size:1.55rem;line-height:1;margin-bottom:5px;}
  .stat .val{font-size:1.95rem;font-weight:800;color:var(--vert-foret);}
  .stat .lab{font-size:.72rem;color:var(--gris);letter-spacing:.6px;text-transform:uppercase;margin-top:2px;}
  .stat.leaf{border-top:4px solid var(--lime);}
  .stat.amber{border-top:4px solid var(--ambre);}
  .stat.red{border-top:4px solid var(--rouge);}
  .empty-state{text-align:center;padding:26px 18px;}
  .empty-state .em-ic{font-size:2.6rem;margin-bottom:8px;}
  .empty-state h3{color:var(--vert-foret);margin-bottom:5px;}
  .empty-state p{color:var(--gris);font-size:.9rem;margin:0 auto 14px;max-width:46ch;}
  .esp-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .esp-tab{background:#fff;border:1.5px solid #E0D8C6;color:var(--gris);padding:8px 14px;border-radius:11px;
    font-weight:700;font-size:.86rem;cursor:pointer;box-shadow:0 2px 0 #E0D8C6;transition:transform .08s,filter .12s;}
  .esp-tab:hover{filter:brightness(.97);}
  .esp-tab:active{transform:translateY(2px);box-shadow:0 0 0 #E0D8C6;}
  .esp-tab.on{background:linear-gradient(180deg,var(--vert-moyen),var(--vert-foret));color:var(--creme);
    border-color:var(--vert-fonce);box-shadow:0 2px 0 var(--vert-fonce);}
  .rf-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .rf-doc{max-width:720px;margin:0 auto;color:#1a1a1a;}
  .rf-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--vert-foret);padding-bottom:10px;margin-bottom:14px;}
  .rf-mark{font-weight:800;font-size:1.35rem;color:var(--vert-foret);}
  .rf-sub{font-size:.78rem;color:var(--gris);}
  .rf-logo{width:64px;height:64px;border:1px dashed #bbb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#aaa;flex:none;}
  .rf-doc h1{font-size:1.15rem;color:var(--vert-foret);margin:6px 0 10px;letter-spacing:.5px;}
  .rf-meta{font-size:.86rem;color:#333;margin-bottom:14px;line-height:1.55;}
  .rf-table{width:100%;border-collapse:collapse;font-size:.9rem;}
  .rf-table td{padding:7px 9px;border-bottom:1px solid #eee;}
  .rf-r{text-align:right;white-space:nowrap;}
  .rf-section td{background:#F3EFE6;font-weight:800;color:var(--vert-foret);text-transform:uppercase;font-size:.78rem;letter-spacing:.5px;}
  .rf-total td{font-weight:700;border-top:1px solid #ccc;}
  .rf-result td{font-weight:800;font-size:1.05rem;background:#FBF3E0;border-top:2px solid var(--vert-foret);}
  .rf-sign{margin-top:20px;font-size:.85rem;color:#333;}
  .rf-foot{margin-top:14px;font-size:.72rem;color:var(--gris);line-height:1.5;border-top:1px solid #eee;padding-top:8px;}
  @media print{
    .sidebar{display:none !important;}
    .rf-noprint{display:none !important;}
    .app{display:block !important;}
    #contenu{padding:0 !important;}
    .card{box-shadow:none !important;border:none !important;}
  }
  .card h3{color:var(--vert-foret);font-size:1.02rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

  .alerte{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:10px;margin-bottom:8px;font-size:.9rem;}
  .alerte.warn{background:#FCF3E2;border:1px solid #EAD2A4;}
  .alerte.urgent{background:#F9E9E4;border:1px solid #E3B7A9;}
  .alerte.info{background:#EAF3EA;border:1px solid #C7E0C6;}
  .alerte b{color:var(--vert-foret);}
  .vide{color:var(--gris);font-size:.9rem;font-style:italic;padding:8px 0;}

  form.ligne{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:18px;}
  .champ{display:flex;flex-direction:column;gap:4px;}
  .champ label{font-size:.72rem;letter-spacing:.5px;color:var(--gris);text-transform:uppercase;font-weight:600;}
  .champ input,.champ select{padding:9px 12px;border:1.5px solid #D8D1BE;border-radius:9px;background:#fff;
    font-size:.92rem;min-width:130px;color:var(--encre);}
  .champ input:focus,.champ select:focus{outline:2px solid var(--feuille);border-color:var(--feuille-fonce);}
  .btn{background:linear-gradient(180deg,var(--vert-moyen),var(--vert-foret));color:var(--creme);border:none;
    padding:11px 22px;border-radius:11px;font-size:.92rem;font-weight:700;cursor:pointer;
    box-shadow:0 3px 0 var(--vert-fonce),0 5px 13px rgba(0,0,0,.18);
    transition:transform .08s ease,box-shadow .08s ease,filter .15s ease;}
  .btn:hover{filter:brightness(1.07);}
  .btn:active{transform:translateY(3px);box-shadow:0 0 0 var(--vert-fonce),0 2px 6px rgba(0,0,0,.15);}
  .btn.sec{background:linear-gradient(180deg,var(--feuille),var(--ambre));color:var(--vert-fonce);
    box-shadow:0 3px 0 #A96C08,0 5px 13px rgba(0,0,0,.15);}
  .btn.sec:active{box-shadow:0 0 0 #A96C08,0 2px 6px rgba(0,0,0,.12);}
  .btn.mini{padding:6px 13px;font-size:.8rem;border-radius:8px;
    box-shadow:0 2px 0 var(--vert-fonce),0 3px 7px rgba(0,0,0,.14);}
  .btn.mini.sec{box-shadow:0 2px 0 #A96C08,0 3px 7px rgba(0,0,0,.12);}
  .btn.mini:active{transform:translateY(2px);box-shadow:0 0 0 var(--vert-fonce),0 1px 4px rgba(0,0,0,.12);}
  .btn.danger{background:#fff;color:var(--rouge);border:1.6px solid var(--rouge);
    box-shadow:0 2px 0 rgba(192,57,43,.35),0 3px 7px rgba(0,0,0,.08);}
  .btn.danger:hover{background:var(--rouge);color:#fff;filter:none;}
  .btn.danger:active{transform:translateY(2px);box-shadow:0 0 0 rgba(192,57,43,.35),0 1px 4px rgba(0,0,0,.08);}
  .btn.wa{background:linear-gradient(180deg,#2BE479,#25D366);color:#fff;
    box-shadow:0 3px 0 #1AA34C,0 5px 13px rgba(0,0,0,.15);}
  .btn.wa:active{box-shadow:0 0 0 #1AA34C,0 2px 6px rgba(0,0,0,.12);}

  table{width:100%;border-collapse:collapse;font-size:.9rem;}
  th{text-align:left;padding:9px 10px;color:var(--gris);font-size:.72rem;letter-spacing:.8px;
    text-transform:uppercase;border-bottom:2px solid #E6E0D0;}
  td{padding:10px;border-bottom:1px solid #EFEADB;}
  tr:last-child td{border-bottom:none;}
  .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;}
  .tag.f{background:#F3E4EC;color:#8A4A6B;}
  .tag.m{background:#E2ECF5;color:#3A5E82;}
  .tag.ok{background:#EAF3EA;color:var(--feuille-fonce);}
  .tag.gest{background:#FCF3E2;color:var(--ambre);}
  .tag.fin{background:#EEEBE2;color:var(--gris);}
  .tag.vente{background:#EAF3EA;color:var(--feuille-fonce);}
  .tag.dep{background:#F9E9E4;color:var(--rouge);}
  .solde-pos{color:var(--feuille-fonce);} .solde-neg{color:var(--rouge);}

  /* ===== École ===== */
  .lecon-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid #E6E0D0;
    border-radius:12px;margin-bottom:10px;cursor:pointer;background:#fff;transition:.15s;}
  .lecon-item:hover{border-color:var(--feuille-fonce);}
  .lecon-num{width:34px;height:34px;border-radius:50%;background:var(--creme);color:var(--vert-foret);
    display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
  .lecon-item.done .lecon-num{background:var(--feuille);color:var(--vert-fonce);}
  .lecon-titre{flex:1;font-weight:600;color:var(--vert-foret);}
  .lecon-texte p{margin-bottom:10px;line-height:1.6;font-size:.93rem;}
  .quiz-q{margin:14px 0;padding:13px;border:1.5px solid #E6E0D0;border-radius:12px;background:#FDFCF7;}
  .quiz-q p{font-weight:600;margin-bottom:8px;color:var(--vert-foret);}
  .quiz-opt{display:flex;gap:8px;align-items:center;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:.92rem;}
  .quiz-opt:hover{background:#F2EFE4;}
  .quiz-opt.bonne{background:#EAF3EA;border:1px solid var(--feuille-fonce);}
  .quiz-opt.fausse{background:#F9E9E4;border:1px solid var(--rouge);}
  .progress-bar{height:10px;background:#E6E0D0;border-radius:6px;overflow:hidden;margin:8px 0 4px;}
  .progress-bar div{height:100%;background:linear-gradient(90deg,var(--lime),var(--feuille-fonce));transition:.4s;}

  /* ===== Certificat ===== */
  .certif{background:linear-gradient(135deg,#FDF6E3,#F5E7C1);border:3px double var(--or);border-radius:16px;
    padding:26px;text-align:center;margin-bottom:18px;}
  .certif h3{justify-content:center;color:var(--or);letter-spacing:1px;}
  .certif .grand-nom{font-size:1.5rem;font-weight:700;color:var(--vert-foret);margin:10px 0;}  .certif p{font-size:.9rem;color:var(--gris);}
  .pro-feat{background:#fff;border:1px solid #EBDFC7;border-radius:10px;padding:11px 14px;font-size:.95rem;color:var(--encre);}
  .certif input{margin:10px auto;display:block;text-align:center;padding:9px 14px;border:1.5px solid var(--or);
    border-radius:9px;font-size:1rem;max-width:280px;width:100%;}

  /* ===== Bilan / diagnostic ===== */
  .kpi-note{font-size:.75rem;color:var(--gris);margin-top:3px;}
  .diag{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:10px;margin-bottom:8px;
    font-size:.9rem;background:#F4F8F2;border:1px solid #D7E6D4;}

  @media(max-width:900px){
    .app{flex-direction:column;}
    .sidebar{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center;padding:12px;}
    .brand{border:none;padding:4px 10px;margin:0;}
    .nav-btn{width:auto;padding:8px 11px;font-size:.83rem;}
    .lang-btn{margin-top:0;}
    .sidebar .foot{display:none;}
    main{padding:18px;}
    .champ input,.champ select{min-width:110px;}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <svg width="46" height="46" viewBox="0 0 512 512">
        <rect width="512" height="512" rx="116" fill="#FBF3E0"/>
        <path d="M352.4 141.1 A150 150 0 1 0 352.4 370.9" fill="none" stroke="#9A3412" stroke-width="56" stroke-linecap="round"/>
        <circle cx="356" cy="136" r="34" fill="#9A3412"/>
        <g transform="translate(336,74) rotate(-18)"><ellipse rx="15" ry="50" fill="#9A3412"/></g>
        <g transform="translate(380,70) rotate(12)"><ellipse rx="15" ry="52" fill="#9A3412"/><ellipse rx="7" ry="34" fill="#F4B41A"/></g>
        <circle cx="368" cy="132" r="6" fill="#FBF3E0"/>
        <circle cx="352" cy="371" r="34" fill="#9A3412"/>
      </svg>
      <div>
        <h1>Cuni<span>Smart</span></h1>
        <small id="brand-tag">ÉLEVAGE CUNICOLE INTELLIGENT</small>
      </div>
    </div>
    <button class="nav-btn active" data-vue="tableau" onclick="naviguer('tableau')"><span class="ico">◫</span> <span data-i18n="nav_dash"></span></button>
    <button class="nav-btn" data-vue="cheptel" onclick="naviguer('cheptel')"><span class="ico">🐇</span> <span data-i18n="nav_herd"></span></button>
    <button class="nav-btn" data-vue="repro" onclick="naviguer('repro')"><span class="ico">✿</span> <span data-i18n="nav_repro"></span></button>
    <button class="nav-btn" data-vue="sante" onclick="naviguer('sante')"><span class="ico">✚</span> <span data-i18n="nav_health"></span></button>
    <button class="nav-btn" data-vue="finances" onclick="naviguer('finances')"><span class="ico">₣</span> <span data-i18n="nav_fin"></span></button>
    <button class="nav-btn" data-vue="bilan" onclick="naviguer('bilan')"><span class="ico">📊</span> <span data-i18n="nav_report"></span></button>
    <button class="nav-btn" data-vue="nutrition" onclick="naviguer('nutrition')"><span class="ico">🥣</span> <span data-i18n="nav_nutri"></span></button>
    <button class="nav-btn" data-vue="ecole" onclick="naviguer('ecole')"><span class="ico">🎓</span> <span data-i18n="nav_school"></span></button>
    <button class="nav-btn" data-vue="tracabilite" onclick="naviguer('tracabilite')"><span class="ico">🔖</span> <span data-i18n="nav_trace"></span></button>
    <button class="nav-btn" data-vue="consanguinite" onclick="naviguer('consanguinite')"><span class="ico">🧬</span> <span data-i18n="nav_consang"></span></button>
    <button class="nav-btn" data-vue="compte" onclick="naviguer('compte')"><span class="ico">☁️</span> <span data-i18n="nav_compte"></span></button>
    <button class="lang-btn" onclick="basculerLangue()" id="lang-btn">🌍 English</button>
    <div class="foot">CuniSmart v2.0<br>
      <a href="cgu.html" style="color:inherit;text-decoration:underline">CGU/CGV</a> ·
      <a href="confidentialite.html" style="color:inherit;text-decoration:underline">Confidentialité</a></div>
  </aside>

  <main id="contenu"></main>
</div>

 {fr:{ti:"Habitat en climat chaud et humide",tx:[

 {fr:{ti:"Eau, hygiène et gestes quotidiens",tx:[
   "La propreté prévient 80 % des maladies. Chaque jour : grattez les déjections sous les cages, vérifiez et remplissez les abreuvoirs (nettoyés pour éviter les algues et bactéries qui prolifèrent sous la chaleur), observez chaque animal quelques secondes. Chaque semaine : nettoyage complet et désinfection des cages.",
   "L’observation est votre meilleur outil de diagnostic : un lapin prostré dans un coin, qui ne mange pas, au poil hérissé, est déjà malade — isolez-le immédiatement. Repérer un problème tôt, c’est souvent sauver l’animal et protéger tout l’élevage.",
   "La quarantaine est une règle d’or : tout nouvel animal acheté passe 2 semaines à l’écart avant de rejoindre le cheptel. Lavez-vous les mains entre les cages, surtout après avoir manipulé un animal malade, pour ne pas propager les infections."],
  qz:[{q:"La propreté prévient environ…",o:["10 % des maladies","80 % des maladies","Aucune maladie"],b:1},
      {q:"Un lapin prostré, poil hérissé, qui ne mange pas…",o:["Est en pleine forme","Est probablement malade, à isoler","Doit être nourri de force"],b:1},
      {q:"Un nouvel animal acheté doit d’abord…",o:["Rejoindre le cheptel aussitôt","Passer 2 semaines en quarantaine","Être vendu"],b:1},
      {q:"Les abreuvoirs doivent être…",o:["Nettoyés régulièrement","Jamais nettoyés","Remplis une fois par mois"],b:0},
      {q:"Entre deux cages, surtout après un malade, il faut…",o:["Se laver les mains","Ne rien faire","Changer de vêtements chaque fois"],b:0}]},
  en:{ti:"Water, hygiene and daily routines",tx:[
   "Cleanliness prevents 80% of diseases. Every day: scrape droppings under the cages, check and refill drinkers (cleaned to avoid algae and bacteria that thrive in heat), observe each animal for a few seconds. Every week: full cleaning and disinfection of cages.",
   "Observation is your best diagnostic tool: a rabbit huddled in a corner, not eating, with ruffled fur, is already sick — isolate it immediately. Spotting a problem early often saves the animal and protects the whole farm.",
   "Quarantine is a golden rule: any newly bought animal spends 2 weeks apart before joining the herd. Wash your hands between cages, especially after handling a sick animal, to avoid spreading infections."],
  qz:[{q:"Cleanliness prevents about…",o:["10% of diseases","80% of diseases","No disease"],b:1},
      {q:"A rabbit huddled, ruffled fur, not eating…",o:["Is perfectly healthy","Is probably sick, isolate it","Must be force-fed"],b:1},
      {q:"A newly bought animal must first…",o:["Join the herd at once","Spend 2 weeks in quarantine","Be sold"],b:1},
      {q:"Drinkers must be…",o:["Cleaned regularly","Never cleaned","Filled once a month"],b:0},
      {q:"Between two cages, especially after a sick one, you must…",o:["Wash your hands","Do nothing","Change clothes each time"],b:0}]}},
  {fr:{ti:"Les bases de la ration",tx:[
   "L’alimentation représente 60 à 70 % de vos dépenses : c’est ici que se joue la rentabilité. Base : 100 à 150 g de provende par jour pour un adulte, complétée par du fourrage fané. Le lapin est nocturne : donnez environ 70 % de la ration en fin d’après-midi ou le soir, car en journée, sous la chaleur, il mange peu.",
   "Tout changement d’aliment (nouvelle provende, nouveau fourrage) se fait progressivement sur 5 à 7 jours : un changement brutal détruit la flore intestinale et provoque des diarrhées mortelles. Une femelle allaitante mange et boit presque le double d’un adulte normal — sa mangeoire et son abreuvoir ne doivent JAMAIS être vides.",
   "L’eau est le premier aliment : un lapin sans eau ne mange plus. Propre, à volonté, renouvelée au moins 2 fois par jour. Astuce de terrain : en forte chaleur, ajoutez une infusion légère de citronnelle refroidie dans l’eau 1 à 2 fois par semaine — elle apaise les animaux et stimule l’appétit."],
  qz:[{q:"L’alimentation représente … de vos dépenses.",o:["10 à 20 %","60 à 70 %","5 %"],b:1},
      {q:"Le lapin étant nocturne, on donne ~70 % de la ration…",o:["À midi","En fin d’après-midi ou le soir","À l’aube uniquement"],b:1},
      {q:"Un changement d’aliment se fait…",o:["Progressivement sur 5 à 7 jours","D’un seul coup","En une nuit"],b:0},
      {q:"Une femelle allaitante consomme…",o:["Deux fois moins qu’un adulte","Presque le double d’un adulte","La même chose"],b:1},
      {q:"En forte chaleur, on peut ajouter à l’eau…",o:["Du sucre","Une infusion de citronnelle refroidie","De l’huile"],b:1}]},
  en:{ti:"Ration basics",tx:[
   "Feed accounts for 60 to 70% of your costs: this is where profitability is decided. Base: 100 to 150 g of feed per day for an adult, plus wilted forage. The rabbit is nocturnal: give about 70% of the ration in late afternoon or evening, as it eats little during the heat of the day.",
   "Any feed change (new feed, new forage) is gradual over 5 to 7 days: an abrupt change destroys the gut flora and causes deadly diarrhoea. A nursing doe eats and drinks nearly twice as much as a normal adult — her feeder and drinker must NEVER be empty.",
   "Water is the first feed: a rabbit with no water stops eating. Clean, at will, renewed at least twice a day. Field tip: in strong heat, add a light cooled lemongrass infusion to the water 1-2 times a week — it calms the animals and stimulates appetite."],
  qz:[{q:"Feed accounts for … of your costs.",o:["10 to 20%","60 to 70%","5%"],b:1},
      {q:"As the rabbit is nocturnal, ~70% of the ration is given…",o:["At noon","In late afternoon or evening","Only at dawn"],b:1},
      {q:"A feed change is done…",o:["Gradually over 5 to 7 days","All at once","Overnight"],b:0},
      {q:"A nursing doe consumes…",o:["Half as much as an adult","Nearly twice an adult","The same"],b:1},
      {q:"In strong heat, you can add to the water…",o:["Sugar","A cooled lemongrass infusion","Oil"],b:1}]}},
 {fr:{ti:"Reproduction maîtrisée",tx:[
   "La lapine n’a pas de cycle fixe : l’ovulation est provoquée par la saillie elle-même. Elle est prête vers 5-6 mois. Règle d’or : on amène TOUJOURS la femelle dans la cage du mâle, jamais l’inverse — sur son territoire la femelle attaque le mâle. Laissez 2-3 saillies, puis retirez la femelle.",
   "La gestation dure environ 31 jours. La palpation du ventre à J+12, entre les mains d’un éleveur exercé, permet de sentir les embryons (taille d’une olive) et de confirmer la gestation : une femelle vide est re-saillie sans attendre, ce qui évite de perdre un mois.",
   "En tropical, évitez de saillir aux heures les plus chaudes (préférez tôt le matin ou en soirée) car la chaleur réduit la fécondité. Une femelle bien conduite produit 6 à 8 portées par an. CuniSmart calcule pour vous palpation, mise bas et sevrage à partir de la date de saillie."],
  qz:[{q:"Chez la lapine, l’ovulation est provoquée par…",o:["La pleine lune","La saillie elle-même","L’alimentation"],b:1},
      {q:"Pour la saillie, on amène…",o:["Le mâle chez la femelle","La femelle chez le mâle","Les deux dans une cage neuve"],b:1},
      {q:"La gestation dure environ…",o:["15 jours","31 jours","60 jours"],b:1},
      {q:"La palpation à J+12 permet de…",o:["Nourrir la femelle","Confirmer la gestation","Sevrer les petits"],b:1},
      {q:"En tropical, mieux vaut saillir…",o:["Aux heures les plus chaudes","Tôt le matin ou en soirée","À midi"],b:1}]},
  en:{ti:"Mastering reproduction",tx:[
   "The doe has no fixed cycle: ovulation is triggered by mating itself. She is ready around 5-6 months. Golden rule: ALWAYS bring the doe to the buck’s cage, never the opposite — on her territory the doe attacks the buck. Allow 2-3 matings, then remove the doe.",
   "Pregnancy lasts about 31 days. Belly palpation at D+12, by a trained farmer, lets you feel the embryos (olive-sized) and confirm pregnancy: an empty doe is re-mated without delay, avoiding a lost month.",
   "In the tropics, avoid mating during the hottest hours (prefer early morning or evening) as heat reduces fertility. A well-managed doe produces 6 to 8 litters a year. CuniSmart computes palpation, kindling and weaning from the mating date."],
  qz:[{q:"In the doe, ovulation is triggered by…",o:["The full moon","Mating itself","Feeding"],b:1},
      {q:"For mating, you bring…",o:["The buck to the doe","The doe to the buck","Both to a new cage"],b:1},
      {q:"Pregnancy lasts about…",o:["15 days","31 days","60 days"],b:1},
      {q:"Palpation at D+12 allows you to…",o:["Feed the doe","Confirm pregnancy","Wean the kits"],b:1},
      {q:"In the tropics, it is better to mate…",o:["During the hottest hours","Early morning or evening","At noon"],b:1}]}},
 {fr:{ti:"De la mise bas au sevrage",tx:[
   "Placez la boîte à nid garnie de paille propre vers J+28 ; la lapine y ajoutera ses poils. La mise bas a lieu souvent la nuit et dure peu. Le lendemain, contrôlez le nid mains propres : retirez les mort-nés et la paille souillée, comptez les vivants. Une portée compte 4 à 12 lapereaux (6-8 en moyenne).",
   "Ne vous inquiétez pas de ne jamais voir la mère au nid : la lapine n’allaite que 1 à 2 fois par jour, quelques minutes, souvent à l’aube. Un ventre rond et une peau bien tendue chez les lapereaux prouvent qu’ils tètent bien. Les petits naissent nus et aveugles, ouvrent les yeux vers 10 jours, sortent du nid vers 18-21 jours.",
   "Le sevrage se fait entre 28 et 35 jours. Séparez ensuite mâles et femelles vers 2,5-3 mois pour éviter les saillies incontrôlées et les bagarres. En tropical, surveillez le nid contre les fourmis et la chaleur excessive qui peuvent décimer une portée."],
  qz:[{q:"La boîte à nid se place vers…",o:["Le jour de la saillie","Le 28e jour de gestation","Après le sevrage"],b:1},
      {q:"La lapine allaite ses petits…",o:["En continu","1 à 2 fois par jour","Jamais"],b:1},
      {q:"Les lapereaux ouvrent les yeux vers…",o:["10 jours","1 jour","1 mois"],b:0},
      {q:"Le sevrage se fait entre…",o:["10 et 15 jours","28 et 35 jours","3 et 4 mois"],b:1},
      {q:"En tropical, le nid doit être surveillé contre…",o:["Les fourmis et la chaleur","Le vent uniquement","Rien de particulier"],b:0}]},
  en:{ti:"From kindling to weaning",tx:[
   "Place the nest box with clean straw around D+28; the doe adds her fur. Kindling often happens at night and is quick. Next day, check the nest with clean hands: remove stillborn kits and soiled straw, count the live ones. A litter has 4 to 12 kits (6-8 on average).",
   "Don’t worry if you never see the mother in the nest: the doe nurses only 1-2 times a day, for a few minutes, often at dawn. Round bellies and tight skin on the kits prove they suckle well. Kits are born naked and blind, open their eyes around day 10, leave the nest around day 18-21.",
   "Weaning happens between 28 and 35 days. Then separate males and females around 2.5-3 months to avoid uncontrolled matings and fights. In the tropics, watch the nest against ants and excessive heat that can wipe out a litter."],
  qz:[{q:"The nest box is placed around…",o:["Mating day","Day 28 of pregnancy","After weaning"],b:1},
      {q:"The doe nurses her kits…",o:["Continuously","1 to 2 times a day","Never"],b:1},
      {q:"Kits open their eyes around…",o:["10 days","1 day","1 month"],b:0},
      {q:"Weaning happens between…",o:["10 and 15 days","28 and 35 days","3 and 4 months"],b:1},
      {q:"In the tropics, the nest must be watched against…",o:["Ants and heat","Only wind","Nothing special"],b:0}]}},
 {fr:{ti:"Maladies tropicales du lapin",tx:[
   "La coccidiose est la maladie n°1 sous les tropiques, favorisée par la chaleur et l’humidité : diarrhée, ventre gonflé, amaigrissement, surtout chez les jeunes au sevrage. Prévention par une hygiène stricte (cages propres et sèches, éviter que les crottes tombent dans l’aliment) et traitement à l’anticoccidien vétérinaire.",
   "La gale des oreilles (croûtes brunes dans l’oreille, tête penchée, grattage) se traite à l’ivermectine ; isolez l’animal car elle est très contagieuse. La pasteurellose (écoulement nasal, éternuements, ‘coryza’) est favorisée par l’ammoniac d’un clapier mal ventilé — d’où l’importance de l’aération.",
   "Règle d’or : à la moindre diarrhée, isolez immédiatement l’animal, car en tropical une épidémie se propage en quelques jours. Consultez un vétérinaire ou un technicien pour le bon médicament et la bonne dose, et notez chaque traitement dans le carnet sanitaire de CuniSmart."],
  qz:[{q:"La maladie n°1 sous les tropiques est…",o:["La coccidiose","La grippe","Rien"],b:0},
      {q:"La coccidiose est favorisée par…",o:["Le froid sec","La chaleur et l’humidité + saleté","Le silence"],b:1},
      {q:"La gale des oreilles se traite à…",o:["L’eau salée","L’ivermectine","L’aspirine"],b:1},
      {q:"Le coryza (écoulement nasal) est favorisé par…",o:["Un clapier bien aéré","L’ammoniac d’un clapier mal ventilé","Trop d’eau"],b:1},
      {q:"À la moindre diarrhée, il faut…",o:["Attendre une semaine","Isoler immédiatement l’animal","Donner plus d’herbe fraîche"],b:1}]},
  en:{ti:"Tropical rabbit diseases",tx:[
   "Coccidiosis is disease no. 1 in the tropics, favoured by heat and humidity: diarrhoea, swollen belly, weight loss, especially in young at weaning. Prevention through strict hygiene (clean dry cages, keeping droppings out of the feed) and treatment with a veterinary anticoccidial.",
   "Ear mange (brown crusts in the ear, tilted head, scratching) is treated with ivermectin; isolate the animal as it is very contagious. Pasteurellosis (nasal discharge, sneezing, ‘snuffles’) is favoured by ammonia in a poorly ventilated hutch — hence the importance of airflow.",
   "Golden rule: at the slightest diarrhoea, isolate the animal immediately, because in the tropics an outbreak spreads within days. Consult a vet or technician for the right drug and dose, and record every treatment in the CuniSmart health record."],
  qz:[{q:"The no. 1 disease in the tropics is…",o:["Coccidiosis","The flu","Nothing"],b:0},
      {q:"Coccidiosis is favoured by…",o:["Dry cold","Heat, humidity + dirt","Silence"],b:1},
      {q:"Ear mange is treated with…",o:["Salt water","Ivermectin","Aspirin"],b:1},
      {q:"Snuffles (nasal discharge) is favoured by…",o:["A well-aired hutch","Ammonia in a poorly ventilated hutch","Too much water"],b:1},
      {q:"At the slightest diarrhoea, you must…",o:["Wait a week","Isolate the animal immediately","Give more fresh grass"],b:1}]}},
 {fr:{ti:"Vaincre le stress thermique",tx:[
   "Le stress thermique est LE défi de la cuniculture tropicale. Signes : le lapin s’allonge de tout son long, halète, oreilles très rouges (il évacue la chaleur par les oreilles), boit beaucoup, mange peu. Non maîtrisé, il cause infertilité, avortements, chute de croissance et morts subites aux heures les plus chaudes.",
   "Les parades : ombre totale et ventilation maximale, eau fraîche renouvelée plusieurs fois par jour, bouteilles d’eau congelée ou carreaux de céramique frais dans les cages, brumisation légère et arrosage du sol, toiture isolante. Nourrissez aux heures fraîches (tôt le matin, tard le soir) quand l’appétit revient.",
   "Adaptez la conduite : réduisez la densité en saison chaude, décalez les saillies vers les périodes plus fraîches de l’année, sélectionnez sur le long terme les sujets qui supportent le mieux la chaleur. Un élevage tropical prospère est d’abord un élevage qui a gagné la bataille contre la chaleur."],
  qz:[{q:"Un signe de stress thermique :",o:["Le lapin se met en boule","Il s’allonge, halète, oreilles très rouges","Il mange beaucoup"],b:1},
      {q:"Le lapin évacue la chaleur surtout par…",o:["La queue","Les oreilles","Les pattes"],b:1},
      {q:"Pour rafraîchir, on peut utiliser…",o:["Bouteilles d’eau congelée, arrosage du sol","Une couverture","Un chauffage"],b:0},
      {q:"On nourrit de préférence…",o:["À midi","Aux heures fraîches (matin/soir)","La nuit uniquement"],b:1},
      {q:"En saison chaude, il vaut mieux…",o:["Augmenter la densité","Réduire la densité et décaler les saillies","Ne rien changer"],b:1}]},
  en:{ti:"Overcoming heat stress",tx:[
   "Heat stress is THE challenge of tropical rabbit farming. Signs: the rabbit lies fully stretched out, pants, ears very red (it sheds heat through the ears), drinks a lot, eats little. Uncontrolled, it causes infertility, abortions, growth drop and sudden deaths during the hottest hours.",
   "The remedies: full shade and maximum ventilation, fresh water renewed several times a day, frozen water bottles or cool ceramic tiles in the cages, light misting and floor watering, insulating roof. Feed during cool hours (early morning, late evening) when appetite returns.",
   "Adapt management: reduce density in the hot season, shift matings to the cooler periods of the year, select over the long term the animals that best tolerate heat. A thriving tropical farm is first a farm that won the battle against heat."],
  qz:[{q:"A sign of heat stress:",o:["The rabbit curls up","It stretches out, pants, ears very red","It eats a lot"],b:1},
      {q:"The rabbit sheds heat mainly through…",o:["The tail","The ears","The paws"],b:1},
      {q:"To cool down, you can use…",o:["Frozen water bottles, floor watering","A blanket","A heater"],b:0},
      {q:"Feeding is best done…",o:["At noon","During cool hours (morning/evening)","Only at night"],b:1},
      {q:"In the hot season, it is better to…",o:["Increase density","Reduce density and shift matings","Change nothing"],b:1}]}},
  {fr:{ti:"Fourrages et plantes locales",tx:[
   "La règle d’or : ne donnez JAMAIS de fourrage mouillé (pluie ou rosée). Récoltez le matin, laissez faner à l’ombre 12 à 24 h. Diversité gratuite : Tridax, feuilles et fanes de patate douce, Stylosanthes, feuilles de manioc — mais celles-ci doivent impérativement sécher 48 h pour éliminer le cyanure, sinon elles sont toxiques.",
   "Le Moringa est l’or vert : très riche en protéines, excellent pour les mères allaitantes et les lapereaux, mais donné modérément et toujours fané, car sa richesse provoque des diarrhées en excès. L’Artemisia est le bouclier naturel contre la coccidiose, premier tueur en zone humide : incorporez des branches fanées au fourrage 1 à 2 fois par semaine en prévention.",
   "Les feuilles de papayer fanées facilitent la digestion et agissent comme un vermifuge naturel léger. Enfin, la dictature des fibres : le système digestif du lapin a besoin d’éléments durs et longs pour « pousser » les aliments. Une alimentation 100 % farine, sans fibres, bloque le transit — le fourrage est indispensable, pas optionnel."],
  qz:[{q:"Les feuilles de manioc doivent sécher … avant d’être données.",o:["1 heure","48 heures (pour éliminer le cyanure)","Elles se donnent fraîches"],b:1},
      {q:"Le Moringa est surtout précieux pour…",o:["Les mâles âgés","Les mères allaitantes et lapereaux","Personne"],b:1},
      {q:"Contre la coccidiose en zone humide, on utilise…",o:["L’Artemisia fanée","Du sucre","De l’eau de javel"],b:0},
      {q:"Les feuilles de papayer fanées agissent comme…",o:["Un poison","Un vermifuge naturel léger","Un engrais"],b:1},
      {q:"Une alimentation 100 % farine sans fibres…",o:["Est idéale","Bloque le transit intestinal","Accélère la croissance"],b:1}]},
  en:{ti:"Forages and local plants",tx:[
   "Golden rule: NEVER give wet forage (rain or dew). Harvest in the morning, wilt in the shade for 12 to 24 h. Free diversity: Tridax, sweet-potato leaves and tops, Stylosanthes, cassava leaves — but cassava must dry for 48 h to remove the cyanide, otherwise it is toxic.",
   "Moringa is green gold: very rich in protein, excellent for nursing does and kits, but fed moderately and always wilted, as its richness causes diarrhoea in excess. Artemisia is the natural shield against coccidiosis, the top killer in humid zones: add wilted branches to the forage 1-2 times a week as prevention.",
   "Wilted papaya leaves aid digestion and act as a mild natural dewormer. Finally, the dictatorship of fibre: the rabbit’s gut needs hard, long material to ‘push’ food along. An all-mash diet with no fibre blocks the transit — forage is indispensable, not optional."],
  qz:[{q:"Cassava leaves must dry … before feeding.",o:["1 hour","48 hours (to remove cyanide)","They are fed fresh"],b:1},
      {q:"Moringa is most valuable for…",o:["Old bucks","Nursing does and kits","Nobody"],b:1},
      {q:"Against coccidiosis in humid zones, you use…",o:["Wilted Artemisia","Sugar","Bleach"],b:0},
      {q:"Wilted papaya leaves act as…",o:["A poison","A mild natural dewormer","A fertiliser"],b:1},
      {q:"An all-mash diet with no fibre…",o:["Is ideal","Blocks the gut transit","Speeds up growth"],b:1}]}},
 {fr:{ti:"Génétique et sélection",tx:[
   "Améliorer son cheptel, c’est choisir ses reproducteurs sur des critères mesurables, pas sur l’apparence. Chez la lapine, sélectionnez d’abord la prolificité (nés vivants), les qualités maternelles (elle couvre le nid, allaite, ne mange pas ses petits) et la croissance de sa descendance. En tropical, ajoutez un critère décisif : la tolérance à la chaleur.",
   "Évitez absolument la consanguinité : ne faites jamais reproduire un mâle avec sa mère, sa fille ou sa sœur, sous peine de portées fragiles et de malformations. Tenez la filiation à jour dans le registre pour repérer les liens de parenté, et renouvelez vos mâles par achat ou échange avec un autre éleveur sérieux.",
   "Réformez sans état d’âme une femelle qui enchaîne deux mauvaises portées ou qui supporte mal la chaleur : garder une improductive coûte de l’aliment pour rien. En quelques générations, une sélection rigoureuse transforme un cheptel ordinaire en un troupeau performant et adapté à votre région."],
  qz:[{q:"On sélectionne une lapine d’abord sur…",o:["Sa couleur","Prolificité et qualités maternelles","Son nom"],b:1},
      {q:"En tropical, un critère de sélection décisif est…",o:["La tolérance à la chaleur","La longueur des oreilles","La couleur des yeux"],b:0},
      {q:"La consanguinité (père × fille) provoque…",o:["De meilleures portées","Portées fragiles et malformations","Aucun effet"],b:1},
      {q:"Pour apporter du sang neuf, on…",o:["Garde toujours le même mâle","Renouvelle les mâles (achat/échange)","Supprime le registre"],b:1},
      {q:"Une femelle à deux mauvaises portées de suite doit être…",o:["Gardée des années","Réformée","Nourrie deux fois plus"],b:1}]},
  en:{ti:"Genetics and selection",tx:[
   "Improving your herd means choosing breeders on measurable criteria, not looks. In the doe, first select prolificacy (kits born alive), mothering ability (she covers the nest, nurses, doesn’t eat her young) and the growth of her offspring. In the tropics, add a decisive criterion: heat tolerance.",
   "Absolutely avoid inbreeding: never breed a buck with his mother, daughter or sister, or you risk weak litters and malformations. Keep parentage up to date in the register to spot relationships, and renew your bucks by buying or swapping with another serious farmer.",
   "Cull without hesitation a doe with two poor litters in a row or one that tolerates heat badly: keeping an unproductive one wastes feed. Within a few generations, rigorous selection turns an ordinary herd into a high-performing flock adapted to your region."],
  qz:[{q:"You select a doe first on…",o:["Her colour","Prolificacy and mothering ability","Her name"],b:1},
      {q:"In the tropics, a decisive selection criterion is…",o:["Heat tolerance","Ear length","Eye colour"],b:0},
      {q:"Inbreeding (father × daughter) causes…",o:["Better litters","Weak litters and malformations","No effect"],b:1},
      {q:"To bring fresh blood, you…",o:["Always keep the same buck","Renew bucks (buy/swap)","Delete the register"],b:1},
      {q:"A doe with two poor litters in a row should be…",o:["Kept for years","Culled","Fed twice as much"],b:1}]}},
 {fr:{ti:"Autonomie fourragère et formulation",tx:[
   "L’aliment pèse ~70 % des coûts : produire une partie de son fourrage fait basculer un élevage du rouge au vert. Créez une parcelle fourragère avec des espèces tropicales riches en protéines : Stylosanthes, Mucuna, Leucaena, patate douce, arachide fourragère. Récoltez, fanez à l’ombre, stockez au sec à l’abri des moisissures.",
   "Une ration équilibrée combine une source d’énergie (son de maïs, de riz), une source de protéines (tourteau, fourrages de légumineuses), des fibres (foin, fanes) et des minéraux (pierre à lécher, coquilles). Adaptez les quantités : une lapine gestante ou allaitante a besoin de plus de protéines qu’un adulte au repos.",
   "Le ‘flushing’ — renforcer l’alimentation d’une femelle une semaine avant la saillie — améliore sensiblement la prolificité. Testez, pesez, notez : c’est en mesurant la croissance et la consommation que vous ajusterez la formule la plus rentable pour votre contexte."],
  qz:[{q:"L’aliment représente environ…",o:["10 % des coûts","70 % des coûts","30 % des coûts"],b:1},
      {q:"Des fourrages tropicaux riches en protéines :",o:["Stylosanthes, Mucuna, Leucaena","Sable et cailloux","Papier"],b:0},
      {q:"Le fourrage récolté doit être…",o:["Donné mouillé","Fané et stocké au sec","Laissé pourrir"],b:1},
      {q:"Le ‘flushing’ consiste à…",o:["Renforcer l’alimentation avant la saillie","Priver la femelle d’eau","Réduire la ration"],b:0},
      {q:"Une lapine allaitante a besoin de…",o:["Moins de protéines","Plus de protéines qu’un adulte au repos","Aucun aliment"],b:1}]},
  en:{ti:"Forage self-sufficiency and formulation",tx:[
   "Feed is ~70% of costs: producing part of your forage shifts a farm from red to green. Create a forage plot with protein-rich tropical species: Stylosanthes, Mucuna, Leucaena, sweet potato, forage groundnut. Harvest, wilt in the shade, store dry away from mould.",
   "A balanced ration combines an energy source (maize, rice bran), a protein source (oil cake, legume forages), fibre (hay, tops) and minerals (lick block, shells). Adjust quantities: a pregnant or nursing doe needs more protein than a resting adult.",
   "‘Flushing’ — boosting a doe’s feeding one week before mating — noticeably improves prolificacy. Test, weigh, record: by measuring growth and intake you will tune the most profitable formula for your context."],
  qz:[{q:"Feed represents about…",o:["10% of costs","70% of costs","30% of costs"],b:1},
      {q:"Protein-rich tropical forages:",o:["Stylosanthes, Mucuna, Leucaena","Sand and stones","Paper"],b:0},
      {q:"Harvested forage must be…",o:["Fed wet","Wilted and stored dry","Left to rot"],b:1},
      {q:"‘Flushing’ means…",o:["Boosting feeding before mating","Depriving the doe of water","Cutting the ration"],b:0},
      {q:"A nursing doe needs…",o:["Less protein","More protein than a resting adult","No feed"],b:1}]}},
 {fr:{ti:"Rentabilité et calcul des coûts",tx:[
   "La rentabilité se calcule, elle ne se devine pas. Le coût de production d’un lapin = part d’aliment consommé + part des frais (soins, eau, amortissement des cages) rapportée au nombre de lapins vendus. Si un lapin coûte 2 000 FCFA à produire et se vend 3 500 FCFA, la marge est de 1 500 FCFA — multipliée par le nombre de lapins, c’est votre revenu réel.",
   "Suivez les bons indicateurs : le taux de fertilité (saillies réussies), la prolificité (nés vivants par portée), la mortinatalité et le taux de croissance. Une femelle doit produire assez de portées par an pour rembourser sa propre alimentation et dégager du bénéfice ; sinon elle est réformée.",
   "Le module Bilan de CuniSmart calcule ces indicateurs automatiquement à partir de vos saisies, et vous donne des conseils personnalisés. Consultez-le chaque mois : on ne gère bien que ce que l’on mesure, et c’est la mesure régulière qui distingue l’éleveur amateur du professionnel rentable."],
  qz:[{q:"Si un lapin coûte 2 000 et se vend 3 500 FCFA, la marge est…",o:["1 500 FCFA","3 500 FCFA","5 500 FCFA"],b:0},
      {q:"Un bon indicateur technique à suivre :",o:["La couleur du pelage","La prolificité (nés vivants/portée)","Le nom des lapins"],b:1},
      {q:"Une femelle qui ne rembourse pas son aliment doit être…",o:["Gardée à vie","Réformée","Nourrie davantage"],b:1},
      {q:"Le module Bilan de CuniSmart…",o:["Calcule les indicateurs automatiquement","Ne sert à rien","Vend les lapins"],b:0},
      {q:"On ne gère bien que…",o:["Ce que l’on mesure","Ce que l’on devine","Ce que disent les voisins"],b:0}]},
  en:{ti:"Profitability and cost accounting",tx:[
   "Profitability is calculated, not guessed. The production cost of a rabbit = share of feed eaten + share of costs (care, water, cage depreciation) per rabbit sold. If a rabbit costs 2,000 FCFA to produce and sells for 3,500 FCFA, the margin is 1,500 FCFA — times the number of rabbits, that’s your real income.",
   "Track the right indicators: fertility rate (successful matings), prolificacy (kits born alive per litter), stillbirth rate and growth rate. A doe must produce enough litters a year to repay her own feed and yield a profit; otherwise she is culled.",
   "CuniSmart’s Report module computes these indicators automatically from your entries and gives you personalised advice. Check it every month: you only manage well what you measure, and regular measurement is what separates the amateur from the profitable professional."],
  qz:[{q:"If a rabbit costs 2,000 and sells for 3,500 FCFA, the margin is…",o:["1,500 FCFA","3,500 FCFA","5,500 FCFA"],b:0},
      {q:"A good technical indicator to track:",o:["Coat colour","Prolificacy (kits born alive/litter)","The rabbits’ names"],b:1},
      {q:"A doe that doesn’t repay her feed should be…",o:["Kept for life","Culled","Fed more"],b:1},
      {q:"CuniSmart’s Report module…",o:["Computes indicators automatically","Is useless","Sells the rabbits"],b:0},
      {q:"You only manage well…",o:["What you measure","What you guess","What neighbours say"],b:0}]}},
 {fr:{ti:"Commercialisation et développement",tx:[
   "Le lapin de chair se vend vers 2-2,5 kg vifs, atteints en 70-90 jours avec une bonne conduite. Planifiez vos saillies en fonction des pics de demande (fêtes de fin d’année, cérémonies, Ramadan, rentrée) : comptez ~90 jours à rebours pour saillir au bon moment et vendre quand les prix montent.",
   "Diversifiez vos revenus : lapin de chair (volume), reproducteurs sélectionnés (marge élevée), fumier de lapin (excellent engrais très recherché par les maraîchers) et peaux. Structurer plusieurs sources de revenus sécurise l’élevage face aux aléas d’un seul marché.",
   "Professionnalisez la relation client : tenez vos engagements de livraison, offrez une qualité régulière, gardez le contact par WhatsApp. Un client satisfait en amène trois. La coopérative et la vente groupée donnent accès à de plus gros acheteurs — hôtels, restaurants, grandes surfaces — et à un meilleur pouvoir de négociation."],
  qz:[{q:"Le lapin de chair se vend couramment à…",o:["1 kg","2 à 2,5 kg","5 kg"],b:1},
      {q:"Pour vendre plus cher, on planifie les saillies selon…",o:["Le hasard","Les pics de demande","La couleur du ciel"],b:1},
      {q:"Le fumier de lapin est…",o:["Un déchet inutile","Un engrais recherché par les maraîchers","Toxique"],b:1},
      {q:"Diversifier ses revenus permet de…",o:["Fragiliser l’élevage","Sécuriser face aux aléas d’un seul marché","Perdre du temps"],b:1},
      {q:"La vente groupée en coopérative donne accès à…",o:["Moins de clients","De plus gros acheteurs (hôtels, restaurants)","Rien"],b:1}]},
  en:{ti:"Marketing and business growth",tx:[
   "Meat rabbits sell at 2-2.5 kg live weight, reached in 70-90 days with good management. Plan your matings around demand peaks (end-of-year celebrations, ceremonies, Ramadan, back-to-school): count back ~90 days to mate at the right time and sell when prices rise.",
   "Diversify your income: meat rabbits (volume), selected breeders (high margin), rabbit manure (an excellent fertiliser much sought by market gardeners) and skins. Structuring several income sources secures the farm against the ups and downs of a single market.",
   "Professionalise the customer relationship: keep your delivery commitments, offer consistent quality, stay in touch via WhatsApp. One happy customer brings three. Cooperatives and group selling open access to bigger buyers — hotels, restaurants, supermarkets — and better bargaining power."],
  qz:[{q:"Meat rabbits commonly sell at…",o:["1 kg","2 to 2.5 kg","5 kg"],b:1},
      {q:"To sell at higher prices, plan matings around…",o:["Chance","Demand peaks","The colour of the sky"],b:1},
      {q:"Rabbit manure is…",o:["Useless waste","A fertiliser sought by market gardeners","Toxic"],b:1},
      {q:"Diversifying income helps to…",o:["Weaken the farm","Secure against a single market’s swings","Waste time"],b:1},
      {q:"Group selling through a cooperative gives access to…",o:["Fewer customers","Bigger buyers (hotels, restaurants)","Nothing"],b:1}]}},

 {fr:{ti:"Formuler sa provende locale",tx:[
   "Une bonne provende équilibre trois piliers : l’énergie (maïs broyé, ~40 % maximum pour éviter l’engraissement), les protéines (tourteau de soja ou d’arachide, farine de Moringa et de fanes séchées) et surtout les fibres (son de blé ou de maïs) indispensables au transit. On complète avec du calcium (coquilles d’huîtres broyées, poudre d’os), un prémix vitaminé et une pincée de sel.",
   "En climat chaud et humide, la provende moisit vite et une provende moisie produit des mycotoxines mortelles : stockez les sacs sur des palettes en bois, jamais à même le sol ni collés au mur, et nettoyez les mangeoires chaque jour car un reste humide fermente à la chaleur. Si vous ne pouvez pas granuler, servez en « barbotine » (à peine humidifiée) pour éviter que la poudre n’entre dans les narines.",
   "Votre vrai tableau de bord, ce sont les crottes : petites et dures = manque d’eau ; molles, collantes et malodorantes = danger digestif — stoppez la provende, ne donnez que de l’eau et du fourrage sec ou de l’Artemisia. Le formulateur de CuniSmart calcule pour vous les quantités exactes à partir de vos cultures locales."],
  qz:[{q:"Les trois piliers d’une provende sont…",o:["Énergie, protéines, fibres","Eau, sel, sucre","Maïs seulement"],b:0},
      {q:"En climat humide, on stocke les sacs…",o:["À même le sol","Sur des palettes en bois","Collés au mur"],b:1},
      {q:"Une provende moisie produit…",o:["Des vitamines","Des mycotoxines mortelles","Rien"],b:1},
      {q:"Des crottes molles et malodorantes signalent…",o:["Un manque d’eau","Un danger digestif","Une bonne santé"],b:1},
      {q:"Le maïs broyé ne doit pas dépasser … de la ration.",o:["~40 %","90 %","5 %"],b:0}]},
  en:{ti:"Formulating local feed",tx:[
   "A good feed balances three pillars: energy (ground maize, ~40% max to avoid over-fattening), protein (soybean or groundnut cake, Moringa and dried-tops meal) and above all fibre (wheat or maize bran) essential for transit. Complete with calcium (crushed oyster shells, bone meal), a vitamin premix and a pinch of salt.",
   "In a hot, humid climate, feed moulds fast and mouldy feed produces deadly mycotoxins: store bags on wooden pallets, never on the ground or against the wall, and clean feeders daily as a damp leftover ferments in the heat. If you can’t pellet, serve as a lightly moistened mash to keep powder out of the nostrils.",
   "Your real dashboard is the droppings: small and hard = lack of water; soft, sticky and smelly = digestive danger — stop the feed, give only water and dry forage or Artemisia. CuniSmart’s formulator computes the exact quantities for you from your local crops."],
  qz:[{q:"The three pillars of a feed are…",o:["Energy, protein, fibre","Water, salt, sugar","Maize only"],b:0},
      {q:"In a humid climate, store bags…",o:["On the ground","On wooden pallets","Against the wall"],b:1},
      {q:"Mouldy feed produces…",o:["Vitamins","Deadly mycotoxins","Nothing"],b:1},
      {q:"Soft, smelly droppings signal…",o:["Lack of water","Digestive danger","Good health"],b:1},
      {q:"Ground maize must not exceed … of the ration.",o:["~40%","90%","5%"],b:0}]}},
 {fr:{ti:"La VHD : vacciner pour survivre",tx:[
   "La VHD (Maladie Virale Hémorragique), causée par un Calicivirus, est l’une des menaces les plus redoutables pour un élevage. Ultra-contagieuse et quasi toujours mortelle, elle détruit le foie et provoque des hémorragies internes massives ; on retrouve souvent les lapins morts subitement, parfois avec un peu de sang au nez, sans signe préalable.",
   "Le virus est extrêmement résistant : il survit plusieurs mois hors de l’animal et se transmet non seulement par contact direct, mais aussi indirectement par le foin, l’aliment, les cages, les vêtements, les mains et les insectes. Une seule introduction peut décimer tout un cheptel en quelques jours. Bonne nouvelle : la VHD ne touche que les lapins et lièvres, elle est sans danger pour l’humain.",
   "Il n’existe AUCUN remède une fois la maladie déclarée : le seul moyen de protéger son élevage est la VACCINATION régulière (renseignez-vous auprès de votre vétérinaire sur le vaccin RHDV disponible dans votre région et le rythme de rappel), combinée à une hygiène et une quarantaine strictes. Notez chaque vaccination dans le carnet sanitaire de CuniSmart."],
  qz:[{q:"Quel organe est principalement attaqué par le virus de la VHD ?",o:["Les poumons","Le foie","Le cœur"],b:1},
      {q:"Comment ce virus se transmet-il principalement entre lapins ?",o:["Uniquement par contact direct nez à nez","Par les câlins et le toilettage","Par contact direct, mais aussi indirect (foin, vêtements, insectes)"],b:2},
      {q:"La VHD est-elle dangereuse pour l’humain ?",o:["Oui, c’est une zoonose très grave","Non, elle touche exclusivement les lapins et lièvres","Oui, mais uniquement les immunodéprimés"],b:1},
      {q:"Quelle est la particularité alarmante de ce virus dans l’environnement ?",o:["Il meurt en 2 heures à l’air libre","Il ne résiste pas au gel","Il est ultra-résistant et survit plusieurs mois hors d’un organisme"],b:2},
      {q:"Quel est le seul moyen médical de protéger son lapin contre la VHD ?",o:["Des antibiotiques tous les mois","Le vacciner régulièrement (et le protéger)","Une alimentation riche en vitamines"],b:1}]},
  en:{ti:"VHD: vaccinate to survive",tx:[
   "VHD (Viral Haemorrhagic Disease), caused by a Calicivirus, is one of the most fearsome threats to a rabbitry. Ultra-contagious and almost always fatal, it destroys the liver and causes massive internal haemorrhage; rabbits are often found suddenly dead, sometimes with a little blood at the nose, with no prior sign.",
   "The virus is extremely resistant: it survives several months outside the animal and spreads not only by direct contact but also indirectly through hay, feed, cages, clothes, hands and insects. A single introduction can wipe out a whole herd in days. Good news: VHD only affects rabbits and hares — it is harmless to humans.",
   "There is NO cure once the disease appears: the only way to protect your farm is regular VACCINATION (ask your vet about the RHDV vaccine available in your region and the booster schedule), combined with strict hygiene and quarantine. Record every vaccination in the CuniSmart health record."],
  qz:[{q:"Which organ is mainly attacked by the VHD virus?",o:["The lungs","The liver","The heart"],b:1},
      {q:"How does this virus mainly spread between rabbits?",o:["Only by direct nose-to-nose contact","Through cuddling and grooming","By direct contact, but also indirectly (hay, clothes, insects)"],b:2},
      {q:"Is VHD dangerous to humans?",o:["Yes, it is a very serious zoonosis","No, it affects only rabbits and hares","Yes, but only the immunocompromised"],b:1},
      {q:"What is the alarming feature of this virus in the environment?",o:["It dies within 2 hours in open air","It does not survive frost","It is ultra-resistant and survives months outside a host"],b:2},
      {q:"What is the only medical way to protect your rabbit against VHD?",o:["Antibiotics every month","Vaccinate it regularly (and protect it)","A vitamin-rich diet"],b:1}]}}
];

/* ===== ÉCOLE D'AVICULTURE — 16 leçons pondeuse ===== */
const LECONS_PONDEUSE = [
/* --- NIVEAU 1 · DÉBUTANT (0-5) --- */
{fr:{ti:"Comprendre la pondeuse vs le poulet de chair",tx:[
 "La poule pondeuse et le poulet de chair sont deux animaux différents, deux métiers différents. Le poulet de chair est abattu à 6 semaines : cycle court, lot après lot. La pondeuse produit des œufs sur un cycle unique de 18 à 20 mois, puis est réformée. Pas les mêmes poussins, pas le même aliment, pas le même bâtiment. L'erreur la plus fréquente : acheter des poussins de chair en croyant faire de la ponte.",
 "Pour la ponte, les souches améliorées sont indispensables : ISA Brown, Lohmann Brown, Hy-Line Brown, Novogen, Brown Nick. Elles sont sélectionnées pour produire 94 à 96 % de taux de ponte au pic, contre 60 à 70 % pour des poules locales. L'œuf roux (brun) se vend mieux que le blanc sur la plupart des marchés d'Afrique centrale et de l'Ouest.",
 "Avant d'acheter vos poussins, téléchargez le guide d'élevage officiel de la souche choisie : il contient la courbe de poids, la courbe de ponte, le programme lumineux et les besoins nutritionnels. C'est votre vrai manuel. Un éleveur qui n'a pas ce guide travaille à l'aveugle."],
 qz:[{q:"Quelle est la différence fondamentale entre une pondeuse et un poulet de chair ?",o:["Leur couleur","Leur cycle : la pondeuse produit des œufs sur 18–20 mois, le chair est abattu à 6 semaines","Leur taille uniquement"],b:1},
     {q:"L'œuf le plus demandé sur la plupart des marchés d'Afrique centrale et de l'Ouest est…",o:["L'œuf blanc","L'œuf roux (brun)","L'œuf vert"],b:1},
     {q:"Avant l'arrivée des poussins, il faut d'abord…",o:["Acheter l'aliment","Télécharger le guide d'élevage officiel de la souche","Peindre le bâtiment"],b:1},
     {q:"Le taux de ponte au pic d'une souche améliorée est d'environ…",o:["40–50 %","70–75 %","94–96 %"],b:2},
     {q:"Acheter une poulette démarrée de 16–17 semaines plutôt qu'un poussin d'un jour…",o:["Coûte moins cher à l'achat","Réduit le risque technique et raccourcit le délai avant les premiers œufs","Donne de moins bons œufs"],b:1}]},
 en:{ti:"Understanding layers vs. broilers",tx:[
 "A layer and a broiler are different animals and different trades. A broiler is slaughtered at 6 weeks: short cycle, batch after batch. A layer produces eggs over a single 18–20 month cycle, then is depleted. Different chicks, different feed, different housing. The most common mistake: buying broiler chicks thinking you are starting a laying flock.",
 "For laying, improved strains are essential: ISA Brown, Lohmann Brown, Hy-Line Brown, Novogen, Brown Nick. They are selected to reach 94–96% peak lay rate, vs 60–70% for local hens. Brown eggs sell better than white in most Central and West African markets.",
 "Before buying chicks, download the official management guide for your chosen strain: it contains body weight and lay curves, the lighting programme and nutrient specs. That is your real manual. A farmer without this guide is working blind."],
 qz:[{q:"What is the fundamental difference between a layer and a broiler?",o:["Their colour","Their cycle: the layer produces eggs over 18–20 months, the broiler is slaughtered at 6 weeks","Their size only"],b:1},
     {q:"The most demanded egg in most Central and West African markets is…",o:["White","Brown","Green"],b:1},
     {q:"Before the chicks arrive, the first step is to…",o:["Buy the feed","Download the official breed management guide","Paint the house"],b:1},
     {q:"Peak lay rate of an improved strain is about…",o:["40–50%","70–75%","94–96%"],b:2},
     {q:"Buying a 16–17-week started pullet rather than a day-old chick…",o:["Costs less to buy","Cuts technical risk and shortens time to first egg","Gives worse eggs"],b:1}]}},

{fr:{ti:"Préparer la poussinière",tx:[
 "La poussinière est la pièce la plus critique du cycle pondeuse. Le poussin d'un jour ne régule pas sa température : s'il a froid, il brûle ses réserves pour se réchauffer au lieu de grandir. Un démarrage raté ne se rattrape jamais complètement. Préchauffez la poussinière 24 à 48 heures avant l'arrivée : air à 34–36 °C, litière au sol à 32 °C environ.",
 "Lisez le comportement des poussins : entassés sous la source de chaleur = ils ont froid, augmentez ; écartés aux parois, bec ouvert = trop chaud, réduisez et ventilez ; groupés d'un seul côté = courant d'air, repérez et bouchez ; répartis partout, actifs = température parfaite. Baissez d'environ 3 °C par semaine jusqu'à la température ambiante vers 4–5 semaines.",
 "Eau propre et aliment démarrage doivent être en place AVANT que les poussins n'entrent. 24 heures après l'arrivée, vérifiez le jabot de la majorité des poussins : il doit être plein et souple. C'est le meilleur contrôle de démarrage qui existe. Ne mettez jamais 24 h de lumière : 22 h maximum les 3 premiers jours, avec une période d'obscurité obligatoire."],
 qz:[{q:"La température de l'air à l'arrivée des poussins doit être d'environ…",o:["20 °C","34–36 °C","45 °C"],b:1},
     {q:"Les poussins sont tous entassés sous la lampe. Cela signifie…",o:["Ils ont trop chaud","Ils ont froid — augmentez la chaleur","Ils jouent"],b:1},
     {q:"Pourquoi ne jamais mettre 24 h de lumière les premiers jours ?",o:["Cela coûte trop cher","La lumière continue stresse les poussins et détruit l'uniformité du lot","Ce n'est pas vrai, 24 h est recommandé"],b:1},
     {q:"Le meilleur contrôle de démarrage 24 h après l'arrivée est…",o:["Peser les poussins","Vérifier que la majorité a le jabot plein et souple","Compter les poussins"],b:1},
     {q:"Un démarrage raté en poussinière…",o:["Se rattrape facilement à l'entrée en ponte","Ne se rattrape jamais complètement","N'a aucun effet sur la production"],b:1}]},
 en:{ti:"Setting up the brooder",tx:[
 "The brooder is the most critical part of the layer cycle. A day-old chick cannot regulate its temperature: if it is cold, it burns reserves to warm itself instead of growing. A poor brooding start is never fully recovered. Preheat 24–48 hours before arrival: air at 34–36 °C, floor litter at about 32 °C.",
 "Read chick behaviour: huddled under the heat source = cold, increase heat; spread to walls, panting = too hot, reduce and ventilate; bunched on one side = draught, find and block it; evenly spread and active = perfect temperature. Reduce by about 3 °C per week until ambient at 4–5 weeks.",
 "Clean water and starter feed must be in place BEFORE chicks enter. 24 hours after arrival, check the crops of most chicks: they should be full and soft. This is the best brooding check there is. Never use 24-hour light: 22 h maximum the first 3 days, with a mandatory dark period."],
 qz:[{q:"Air temperature on chick arrival should be about…",o:["20 °C","34–36 °C","45 °C"],b:1},
     {q:"Chicks are all huddled under the lamp. This means…",o:["They are too hot","They are cold — increase heat","They are playing"],b:1},
     {q:"Why never use 24-hour light in the first days?",o:["It costs too much","Continuous light stresses chicks and destroys flock uniformity","It is untrue, 24 h is recommended"],b:1},
     {q:"The best brooding check 24 hours after arrival is…",o:["Weighing the chicks","Checking most have a full, soft crop","Counting the chicks"],b:1},
     {q:"A poor brooding start…",o:["Is easily recovered at onset of lay","Is never fully recovered","Has no effect on production"],b:1}]}},

{fr:{ti:"Conduite de la poulette (6–16 semaines)",tx:[
 "Entre 6 et 16 semaines, la poulette ne produit rien. Beaucoup d'éleveurs relâchent leur attention — c'est la faute la plus coûteuse du cycle. Une poulette mal élevée ne fera jamais un bon pic de ponte, quoi qu'on fasse ensuite. Pesez un échantillon du lot chaque semaine, même jour, même heure. Objectif à 19 semaines : environ 1,6 kg pour une souche brune améliorée.",
 "L'uniformité est aussi importante que le poids moyen : visez plus de 80 % des sujets dans ± 10 % du poids moyen. Un lot uniforme donne un pic plus haut, plus rapide et une meilleure persistance. Règle d'or : ne jamais réduire la durée d'éclairage si le poids cible n'est pas atteint.",
 "Au Cameroun et au Bénin (entre 20° Nord et 20° Sud), la durée du jour varie peu. En bâtiment ouvert, impossible de descendre sous la durée du jour naturel : calculez votre plateau lumineux à partir de ce que le lot percevra vers 16 semaines. Dès 4 semaines, ménagez un vide de mangeoire en milieu de journée : la poulette ne trie plus les particules et développe son appétit."],
 qz:[{q:"Pourquoi la phase 6–16 semaines est-elle décisive pour la ponte ?",o:["Parce que les poules pondent déjà","Parce que la performance future s'y construit et ne se rattrape pas ensuite","Parce que c'est la phase la moins chère"],b:1},
     {q:"L'uniformité du lot visée est de…",o:["Environ 50 %","Plus de 80 %","100 % obligatoirement"],b:1},
     {q:"Le lot est en retard de poids. Que faire de la durée d'éclairage ?",o:["La réduire comme prévu","Ne pas la réduire tant que le poids cible n'est pas atteint","Passer à 24 h de lumière"],b:1},
     {q:"Peser le lot se fait…",o:["Une seule fois à 16 semaines","Chaque semaine, même jour et même heure","Une fois par mois"],b:1},
     {q:"Le vide de mangeoire en milieu de journée sert à…",o:["Économiser l'aliment","Éviter le tri des particules et développer l'appétit","Faire maigrir les poulettes"],b:1}]},
 en:{ti:"Pullet rearing (6–16 weeks)",tx:[
 "Between 6 and 16 weeks, the pullet produces nothing. Many farmers ease off — this is the most costly mistake of the cycle. A poorly reared pullet will never peak well, whatever you do afterwards. Weigh a sample of the flock weekly, same day, same time. Target at 19 weeks: about 1.6 kg for an improved brown strain.",
 "Uniformity is as important as average weight: target over 80% of birds within ±10% of average. A uniform flock peaks higher, faster and persists better. Golden rule: never reduce day length if target body weight is not reached.",
 "In Cameroon and Benin (between 20° N and 20° S), day length varies little. In open-sided housing you cannot go below natural day length: set your lighting plateau from what the flock will perceive at around 16 weeks. From 4 weeks, allow a midday empty-feeder period: the pullet stops sorting particles and builds its appetite."],
 qz:[{q:"Why is the 6–16 week phase decisive for laying?",o:["Because hens are already laying","Because future performance is built then and cannot be recovered later","Because it is the cheapest phase"],b:1},
     {q:"Target flock uniformity is…",o:["About 50%","Over 80%","Necessarily 100%"],b:1},
     {q:"The flock is underweight. What do you do with day length?",o:["Reduce it as planned","Do not reduce until target body weight is reached","Switch to 24-hour light"],b:1},
     {q:"Weighing the flock is done…",o:["Once only at 16 weeks","Weekly, same day and time","Once a month"],b:1},
     {q:"The midday empty-feeder period serves to…",o:["Save feed","Stop particle sorting and build appetite","Slim the pullets"],b:1}]}},

{fr:{ti:"Transfert et entrée en ponte",tx:[
 "Le transfert du bâtiment d'élevage au bâtiment de ponte se fait entre 16 et 17 semaines, avant l'entrée en ponte, aux heures fraîches. Une perte de poids de 10 à 12 % après le transfert est normale — liée à la baisse de consommation d'eau — et doit se rattraper rapidement. Ne cumulez jamais le transfert et une vaccination le même jour.",
 "La stimulation lumineuse (augmentation de la durée d'éclairage) déclenche la maturité sexuelle et l'entrée en ponte. Elle ne se fait que si le poids cible est atteint. Stimuler un lot trop léger donne de petits œufs, des prolapsus et une carrière écourtée. Passez à l'aliment pré-ponte à partir de 15 semaines, et arrêtez-le dès le premier œuf : il ne contient pas assez de calcium pour la production.",
 "Installez les pondoirs AVANT l'entrée en ponte : obscurs, propres, accessibles. Un œuf pondu au sol est sale, souvent cassé, parfois invendable. L'âge à 50 % de production se situe autour de 20 à 22 semaines pour une souche améliorée. Ramassez les œufs au sol fréquemment les premiers jours pour ne pas installer l'habitude."],
 qz:[{q:"La stimulation lumineuse doit être déclenchée…",o:["Dès 12 semaines quelle que soit la taille","Quand le poids cible est atteint","Après le premier œuf"],b:1},
     {q:"Une perte de poids de 10–12 % après le transfert est…",o:["Le signe d'une maladie grave","Normale, due à la baisse de consommation d'eau","Impossible"],b:1},
     {q:"L'aliment pré-ponte doit être arrêté…",o:["À 30 semaines","Dès le premier œuf","Jamais"],b:1},
     {q:"L'âge à 50 % de production d'une souche améliorée se situe autour de…",o:["12 semaines","20 à 22 semaines","35 semaines"],b:1},
     {q:"Pour éviter la ponte au sol, il faut…",o:["Installer les pondoirs après les premiers œufs","Installer les pondoirs avant l'entrée en ponte","Laisser les poules choisir"],b:1}]},
 en:{ti:"Transfer and onset of lay",tx:[
 "Transfer from rearing to laying house happens at 16–17 weeks, before onset of lay, in cool hours. A 10–12% weight loss after transfer is normal — from reduced water intake — and must recover quickly. Never combine transfer and vaccination on the same day.",
 "Light stimulation (increasing day length) triggers sexual maturity and onset of lay. It happens only when target body weight is reached. Stimulating an underweight flock gives small eggs, prolapse and a shortened career. Switch to pre-lay feed from 15 weeks, and stop it at the first egg: it does not contain enough calcium for production.",
 "Install nests BEFORE onset of lay: dark, clean, accessible. A floor egg is dirty, often cracked, sometimes unsellable. Age at 50% production is around 20–22 weeks for an improved strain. Collect floor eggs frequently in the first days so the habit does not set in."],
 qz:[{q:"Light stimulation should be triggered…",o:["At 12 weeks whatever the size","When target body weight is reached","After the first egg"],b:1},
     {q:"A 10–12% weight loss after transfer is…",o:["A sign of serious disease","Normal, from reduced water intake","Impossible"],b:1},
     {q:"Pre-lay feed must be stopped…",o:["At 30 weeks","At the first egg","Never"],b:1},
     {q:"Age at 50% production for an improved strain is around…",o:["12 weeks","20 to 22 weeks","35 weeks"],b:1},
     {q:"To prevent floor eggs, you must…",o:["Install nests after the first eggs","Install nests before onset of lay","Let the hens choose"],b:1}]}},

{fr:{ti:"Calculer et suivre le taux de ponte",tx:[
 "Le taux de ponte est l'indicateur roi : Taux de ponte (%) = (œufs pondus ÷ poules présentes) × 100. Exemple : 320 œufs pour 400 poules → (320 ÷ 400) × 100 = 80 %. On le calcule chaque jour et on le suit en moyenne hebdomadaire. C'est ce chiffre, et lui seul, qui dit si l'élevage va bien.",
 "La courbe de ponte monte rapidement après l'entrée en ponte, atteint son pic vers 26–32 semaines à 94–96 %, puis décline lentement. Tracez votre courbe réelle par-dessus la courbe standard de la souche : l'écart entre les deux est votre diagnostic. La persistance — rester haut longtemps après le pic — vaut plus que le pic lui-même : un bon lot reste au-dessus de 90 % pendant jusqu'à 34 semaines.",
 "Les autres indicateurs à surveiller au quotidien : consommation d'eau (une chute est le tout premier signal d'alerte), consommation d'aliment (113–118 g/poule/jour en ponte), mortalité. Devant une chute de ponte, vérifiez dans cet ordre : 1) eau, 2) aliment, 3) lumière, 4) chaleur, 5) stress, 6) maladie."],
 qz:[{q:"Vous ramassez 315 œufs pour 350 poules présentes. Le taux de ponte est…",o:["90 %","111 %","315 %"],b:0},
     {q:"La persistance de la ponte désigne…",o:["La vitesse de montée au pic","La capacité à maintenir un taux élevé longtemps après le pic","Le nombre total d'œufs"],b:1},
     {q:"Le tout premier signal d'alerte d'un problème dans un bâtiment est souvent…",o:["Une chute de la consommation d'eau","La couleur des œufs","Le bruit des poules"],b:0},
     {q:"Devant une chute de ponte, on vérifie EN PREMIER…",o:["L'alimentation","L'eau","La maladie"],b:1},
     {q:"Le pic de ponte d'une souche améliorée se situe autour de…",o:["60–70 %","80–85 %","94–96 %"],b:2}]},
 en:{ti:"Computing and tracking lay rate",tx:[
 "Lay rate is the key indicator: Lay rate (%) = (eggs collected ÷ hens present) × 100. Example: 320 eggs for 400 hens → (320 ÷ 400) × 100 = 80%. Compute it daily and track as a weekly average. This figure alone tells you whether the flock is doing well.",
 "The lay curve rises fast after onset, peaks at 94–96% around weeks 26–32, then declines slowly. Plot your real curve over the breed standard: the gap is your diagnosis. Persistency — staying high after the peak — is worth more than the peak itself: a good flock stays above 90% for up to 34 weeks.",
 "Other indicators to watch daily: water consumption (a drop is the very first warning signal), feed intake (113–118 g/hen/day in lay), mortality. Facing a lay drop, check in order: 1) water, 2) feed, 3) light, 4) heat, 5) stress, 6) disease."],
 qz:[{q:"You collect 315 eggs for 350 hens present. Lay rate is…",o:["90%","111%","315%"],b:0},
     {q:"Laying persistency means…",o:["The speed of the rise to peak","The ability to hold a high rate long after the peak","Total egg count"],b:1},
     {q:"The very first warning signal of a problem in a house is often…",o:["A drop in water consumption","Egg colour","Hen noise"],b:0},
     {q:"Facing a lay drop, you check FIRST…",o:["Feed","Water","Disease"],b:1},
     {q:"Peak lay rate of an improved strain is around…",o:["60–70%","80–85%","94–96%"],b:2}]}},

/* --- NIVEAU 2 · CONFIRMÉ (5-10) --- */
{fr:{ti:"Alimentation de la pondeuse",tx:[
 "L'alimentation évolue avec l'âge : aliment démarrage (0–6 semaines), croissance/poulette (6–15 semaines), pré-ponte (dès 15 semaines, arrêt au 1er œuf), ponte (du 1er œuf à la réforme). La consommation en ponte est de 113–118 g par poule et par jour. L'aliment est le premier poste de coût — autour de 65–70 % du total.",
 "Le calcium est le point technique le plus mal maîtrisé. Une poule qui en manque pond des œufs à coquille fine, molle ou sans coquille. La forme compte autant que la quantité : environ la moitié du calcium doit être en grosses particules (2–4 mm). Ces particules restent dans le gésier et libèrent le calcium pendant la NUIT, quand la coquille se forme. Sources : coquilles d'huîtres concassées, carbonate de calcium granulé.",
 "Distribuez aux heures fraîches en climat chaud. Limitez le nombre de distributions pour que les poules finissent le fond de mangeoire et ne trient pas les particules. Un aliment moisi produit des mycotoxines qui font chuter la ponte et abîment le foie : stockez au sec sur palettes, ne distribuez jamais un aliment moisi même partiellement."],
 qz:[{q:"Pourquoi une partie du calcium doit-elle être en grosses particules ?",o:["C'est moins cher","Les particules restent dans le gésier et libèrent le calcium la nuit, quand la coquille se forme","Pour que les poules mangent plus"],b:1},
     {q:"La consommation journalière d'une pondeuse en ponte est d'environ…",o:["40–50 g","113–118 g","250 g"],b:1},
     {q:"Des œufs à coquille fine ou molle indiquent d'abord…",o:["Un problème de calcium","Un excès de lumière","Une poule trop jeune"],b:0},
     {q:"Un aliment moisi doit être…",o:["Mélangé à de l'aliment sain","Séché au soleil","Jamais distribué"],b:2},
     {q:"L'aliment pré-ponte est arrêté…",o:["À 30 semaines","Dès le premier œuf","À 20 semaines"],b:1}]},
 en:{ti:"Layer feeding",tx:[
 "Feed changes with age: starter (0–6 weeks), grower/pullet (6–15 weeks), pre-lay (from 15 weeks, stop at first egg), layer (first egg to depletion). Intake in lay is 113–118 g per hen per day. Feed is the largest cost item — around 65–70% of total.",
 "Calcium is the most poorly mastered technical point. A calcium-short hen lays thin, soft or shell-less eggs. Form matters as much as amount: about half the calcium should be coarse particles (2–4 mm). These particles stay in the gizzard and release calcium at NIGHT, when the shell forms. Sources: crushed oyster shell, granular calcium carbonate.",
 "Feed in cool hours in a hot climate. Limit the number of feeding rounds so hens finish the bottom of the feeder and do not sort particles. Mouldy feed produces mycotoxins that crash lay and damage the liver: store dry on pallets, never feed mouldy feed even partly."],
 qz:[{q:"Why must part of the calcium be coarse particles?",o:["It is cheaper","Particles stay in the gizzard and release calcium at night, when the shell forms","To make hens eat more"],b:1},
     {q:"Daily feed intake of a layer in production is about…",o:["40–50 g","113–118 g","250 g"],b:1},
     {q:"Thin or soft shells point first to…",o:["A calcium problem","Too much light","Too young a hen"],b:0},
     {q:"Mouldy feed must be…",o:["Mixed with clean feed","Sun-dried","Never given"],b:2},
     {q:"Pre-lay feed is stopped…",o:["At 30 weeks","At the first egg","At 20 weeks"],b:1}]}},

{fr:{ti:"Santé et biosécurité",tx:[
 "En aviculture, un lot malade se soigne mal et se soigne cher. La production perdue ne revient jamais. Prévenir coûte toujours moins cher que soigner. Les règles de base : vide sanitaire entre deux bandes (nettoyage, désinfection, bâtiment vide plusieurs jours), pédiluve à l'entrée renouvelé régulièrement, visiteurs limités, aucun mélange d'âges dans le même bâtiment.",
 "Maladies à prévenir par vaccination : Newcastle (mortalité jusqu'à 100 %), Gumboro/bursite infectieuse (détruit l'immunité des jeunes), bronchite infectieuse (chute de ponte, coquilles déformées), Marek (tumeurs, vaccination au couvoir), variole aviaire en zone endémique. Il n'existe pas de programme vaccinal universel : établissez-le avec un vétérinaire ou technicien de votre zone.",
 "Marche en avant : toujours les jeunes avant les vieux, les sains avant les malades. Un bâtiment silencieux alors qu'il est normalement bruyant est un bâtiment qui va mal. L'oreille est le premier outil de diagnostic. Notez la mortalité chaque jour — un nombre exact, jamais « quelques-unes »."],
 qz:[{q:"Quelle maladie détruit l'immunité des jeunes pondeuses et les rend vulnérables à toutes les autres ?",o:["La variole aviaire","La maladie de Gumboro (bursite infectieuse)","Le coryza"],b:1},
     {q:"Le principe de « marche en avant » consiste à…",o:["Nourrir les poules en marchant","S'occuper toujours des jeunes avant les vieux, des sains avant les malades","Avancer les dates de vaccination"],b:1},
     {q:"Un programme vaccinal valable partout…",o:["Existe et doit être appliqué tel quel","N'existe pas — il dépend des maladies de la zone","Est fourni par le vendeur d'aliment"],b:1},
     {q:"Le vide sanitaire entre deux bandes sert à…",o:["Reposer l'éleveur","Casser le cycle des microbes du bâtiment","Économiser l'aliment"],b:1},
     {q:"La maladie de Newcastle peut provoquer une mortalité de…",o:["5–10 %","30–40 %","Jusqu'à 100 %"],b:2}]},
 en:{ti:"Health and biosecurity",tx:[
 "In poultry, a sick flock treats poorly and expensively. Lost production never returns. Prevention always costs less than treatment. Basic rules: downtime between flocks (cleaning, disinfection, several days empty), regularly renewed footbath at entry, limited visitors, never mixing ages in the same house.",
 "Diseases to prevent by vaccination: Newcastle (up to 100% mortality), Gumboro/infectious bursal disease (destroys young birds' immunity), infectious bronchitis (lay drop, misshapen shells), Marek (tumours, hatchery vaccination), fowl pox in endemic areas. There is no universal vaccine schedule: set one with a vet or technician in your area.",
 "One-way flow: always young before old, healthy before sick. A house gone quiet when it is normally noisy is a house in trouble. The ear is the first diagnostic tool. Record mortality daily — an exact number, never 'a few'."],
 qz:[{q:"Which disease destroys young layers' immunity and exposes them to all others?",o:["Fowl pox","Gumboro (infectious bursal disease)","Coryza"],b:1},
     {q:"The one-way flow principle means…",o:["Feeding hens while walking","Always tending young before old, healthy before sick","Bringing vaccination dates forward"],b:1},
     {q:"A vaccine schedule valid everywhere…",o:["Exists and should be applied as is","Does not exist — it depends on local diseases","Is supplied by the feed seller"],b:1},
     {q:"Downtime between flocks serves to…",o:["Rest the farmer","Break the microbial cycle in the house","Save feed"],b:1},
     {q:"Newcastle disease can cause mortality of…",o:["5–10%","30–40%","Up to 100%"],b:2}]}},
