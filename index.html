<style>
  :root{
    --vert-foret:#9A3412; --vert-fonce:#6B2409; --vert-moyen:#E2711D;
    --feuille:#F4B41A; --feuille-fonce:#0E7A46;
    --creme:#FBF3E0; --creme-2:#FDF8EC; --encre:#2A1C10; --gris:#7A6A55;
    --rouge:#C0392B; --ambre:#D98E04; --or:#D4A017;
    --lime:#F4B41A; --cyan:#22D3EE;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--creme-2);color:var(--encre);}

  .app{display:flex;min-height:100vh;}
  .sidebar{width:230px;background:linear-gradient(160deg,var(--vert-moyen),var(--vert-fonce));color:var(--creme);
    padding:22px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:12px;padding:4px 8px 18px;border-bottom:1px solid rgba(243,238,223,.18);margin-bottom:12px;}
  .brand h1{font-size:1.25rem;letter-spacing:.5px;}
  .brand h1 span{color:var(--feuille);}
  .brand small{display:block;font-size:.62rem;letter-spacing:2.5px;color:rgba(243,238,223,.65);font-weight:500;}
  .nav-btn{display:flex;align-items:center;gap:10px;background:none;border:none;color:rgba(243,238,223,.82);
    font-size:.93rem;padding:10px 14px;border-radius:10px;cursor:pointer;text-align:left;width:100%;transition:.15s;}
  .nav-btn:hover{background:rgba(243,238,223,.08);}
  .nav-btn.active{background:var(--creme);color:var(--vert-foret);font-weight:600;}
  .nav-btn .ico{width:20px;text-align:center;}
  .lang-btn{margin-top:8px;background:rgba(243,238,223,.12);border:1px solid rgba(243,238,223,.3);
    color:var(--creme);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:.85rem;font-weight:600;}
  .lang-btn:hover{background:rgba(243,238,223,.22);}
  .sidebar .foot{margin-top:auto;font-size:.7rem;color:rgba(243,238,223,.5);padding:0 8px;}

  main{flex:1;padding:28px 34px;max-width:1100px;}
  .page-title{font-size:1.5rem;color:var(--vert-foret);margin-bottom:4px;}
  .page-sub{color:var(--gris);font-size:.9rem;margin-bottom:22px;}

  .grid{display:grid;gap:16px;}
  .grid.stats{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:22px;}
  .card{background:#fff;border:1px solid #E6E0D0;border-radius:14px;padding:18px;}
  .stat .val{font-size:1.9rem;font-weight:700;color:var(--vert-foret);}
  .stat .lab{font-size:.78rem;color:var(--gris);letter-spacing:.6px;text-transform:uppercase;margin-top:2px;}
  .stat.leaf{border-top:4px solid var(--lime);}
  .stat.amber{border-top:4px solid var(--ambre);}
  .stat.red{border-top:4px solid var(--rouge);}
  .card h3{color:var(--vert-foret);font-size:1.02rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

  .alerte{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:10px;margin-bottom:8px;font-size:.9rem;}
  .alerte.warn{background:#FCF3E2;border:1px solid #EAD2A4;}
  .alerte.urgent{background:#F9E9E4;border:1px solid #E3B7A9;}
  .alerte.info{background:#EAF3EA;border:1px solid #C7E0C6;}
  .alerte b{color:var(--vert-foret);}
  .vide{color:var(--gris);font-size:.9rem;font-style:italic;padding:8px 0;}

  form.ligne{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:18px;}
  .champ{display:flex;flex-direction:column;gap:4px;}
  .champ label{font-size:.72rem;letter-spacing:.5px;color:var(--gris);text-transform:uppercase;font-weight:600;}
  .champ input,.champ select{padding:9px 12px;border:1.5px solid #D8D1BE;border-radius:9px;background:#fff;
    font-size:.92rem;min-width:130px;color:var(--encre);}
  .champ input:focus,.champ select:focus{outline:2px solid var(--feuille);border-color:var(--feuille-fonce);}
  .btn{background:var(--vert-foret);color:var(--creme);border:none;padding:10px 20px;border-radius:9px;
    font-size:.92rem;font-weight:600;cursor:pointer;transition:.15s;}
  .btn:hover{background:var(--vert-moyen);}
  .btn.sec{background:var(--feuille);color:var(--vert-fonce);}
  .btn.mini{padding:5px 12px;font-size:.8rem;border-radius:7px;}
  .btn.danger{background:transparent;color:var(--rouge);border:1.5px solid var(--rouge);}
  .btn.danger:hover{background:var(--rouge);color:#fff;}
  .btn.wa{background:#25D366;color:#fff;}
  .btn.wa:hover{background:#1EBE5B;}

  table{width:100%;border-collapse:collapse;font-size:.9rem;}
  th{text-align:left;padding:9px 10px;color:var(--gris);font-size:.72rem;letter-spacing:.8px;
    text-transform:uppercase;border-bottom:2px solid #E6E0D0;}
  td{padding:10px;border-bottom:1px solid #EFEADB;}
  tr:last-child td{border-bottom:none;}
  .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;}
  .tag.f{background:#F3E4EC;color:#8A4A6B;}
  .tag.m{background:#E2ECF5;color:#3A5E82;}
  .tag.ok{background:#EAF3EA;color:var(--feuille-fonce);}
  .tag.gest{background:#FCF3E2;color:var(--ambre);}
  .tag.fin{background:#EEEBE2;color:var(--gris);}
  .tag.vente{background:#EAF3EA;color:var(--feuille-fonce);}
  .tag.dep{background:#F9E9E4;color:var(--rouge);}
  .solde-pos{color:var(--feuille-fonce);} .solde-neg{color:var(--rouge);}

  /* ===== École ===== */
  .lecon-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid #E6E0D0;
    border-radius:12px;margin-bottom:10px;cursor:pointer;background:#fff;transition:.15s;}
  .lecon-item:hover{border-color:var(--feuille-fonce);}
  .lecon-num{width:34px;height:34px;border-radius:50%;background:var(--creme);color:var(--vert-foret);
    display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
  .lecon-item.done .lecon-num{background:var(--feuille);color:var(--vert-fonce);}
  .lecon-titre{flex:1;font-weight:600;color:var(--vert-foret);}
  .lecon-texte p{margin-bottom:10px;line-height:1.6;font-size:.93rem;}
  .quiz-q{margin:14px 0;padding:13px;border:1.5px solid #E6E0D0;border-radius:12px;background:#FDFCF7;}
  .quiz-q p{font-weight:600;margin-bottom:8px;color:var(--vert-foret);}
  .quiz-opt{display:flex;gap:8px;align-items:center;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:.92rem;}
  .quiz-opt:hover{background:#F2EFE4;}
  .quiz-opt.bonne{background:#EAF3EA;border:1px solid var(--feuille-fonce);}
  .quiz-opt.fausse{background:#F9E9E4;border:1px solid var(--rouge);}
  .progress-bar{height:10px;background:#E6E0D0;border-radius:6px;overflow:hidden;margin:8px 0 4px;}
  .progress-bar div{height:100%;background:linear-gradient(90deg,var(--lime),var(--feuille-fonce));transition:.4s;}

  /* ===== Certificat ===== */
  .certif{background:linear-gradient(135deg,#FDF6E3,#F5E7C1);border:3px double var(--or);border-radius:16px;
    padding:26px;text-align:center;margin-bottom:18px;}
  .certif h3{justify-content:center;color:var(--or);letter-spacing:1px;}
  .certif .grand-nom{font-size:1.5rem;font-weight:700;color:var(--vert-foret);margin:10px 0;}
  .certif p{font-size:.9rem;color:var(--gris);}
  .certif input{margin:10px auto;display:block;text-align:center;padding:9px 14px;border:1.5px solid var(--or);
    border-radius:9px;font-size:1rem;max-width:280px;width:100%;}

  /* ===== Bilan / diagnostic ===== */
  .kpi-note{font-size:.75rem;color:var(--gris);margin-top:3px;}
  .diag{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border-radius:10px;margin-bottom:8px;
    font-size:.9rem;background:#F4F8F2;border:1px solid #D7E6D4;}

  @media(max-width:900px){
    .app{flex-direction:column;}
    .sidebar{width:100%;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center;padding:12px;}
    .brand{border:none;padding:4px 10px;margin:0;}
    .nav-btn{width:auto;padding:8px 11px;font-size:.83rem;}
    .lang-btn{margin-top:0;}
    .sidebar .foot{display:none;}
    main{padding:18px;}
    .champ input,.champ select{min-width:110px;}
  }
</style>

/* ================= ÉTAT & PERSISTANCE ================= */
let etat = { lapins: [], saillies: [], transactions: [], soins: [], ecole: { validees: [], nom: '' }, racesPerso: [] };
let vueActive = 'tableau';
let leconOuverte = null;
let quizResultat = null;
const CLE = 'kunikribi-donnees';
const CLE_LANG = 'kunikribi-langue';
const memoire = {};

const store = {
  async get(k){
    try{ if(window.storage){ const r = await window.storage.get(k); return r ? r.value : null; } }catch(e){}
    try{ return localStorage.getItem(k); }catch(e){ return memoire[k] ?? null; }
  },
  async set(k, v){
    try{ if(window.storage){ await window.storage.set(k, v); return; } }catch(e){}
    try{ localStorage.setItem(k, v); }catch(e){ memoire[k] = v; }
  }
};

async function charger(){
  try{
    const d = await store.get(CLE);
    if(d){
      const anc = JSON.parse(d);
      etat = Object.assign(etat, anc);
      if(!etat.soins) etat.soins = [];
      if(!etat.ecole) etat.ecole = { validees: [], nom: '' };
      if(!etat.racesPerso) etat.racesPerso = [];
    }
    const l = await store.get(CLE_LANG);
    if(l === 'en' || l === 'fr') langue = l;
  }catch(e){}
  appliquerLangue(); rendre();
}
async function sauver(){ try{ await store.set(CLE, JSON.stringify(etat)); }catch(e){} }

function basculerLangue(){
  langue = (langue === 'fr') ? 'en' : 'fr';
  store.set(CLE_LANG, langue);
  appliquerLangue(); rendre();
}
function appliquerLangue(){
  document.documentElement.lang = langue;
  document.getElementById('brand-tag').textContent = t('brand_tag');
  document.getElementById('lang-btn').textContent = t('lang_btn');
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
}

const GESTATION = 31, PALPATION = 12, SEVRAGE = 35;
const RACES = ['Néo-Zélandais blanc / New Zealand White','Californien / Californian','Bélier / Lop',
  'Rex','Fauve de Bourgogne','Géant des Flandres / Flemish Giant','Papillon / Checkered',

/* ================= UTILITAIRES ================= */
const auj = () => new Date().toISOString().slice(0,10);
const ajJours = (d,n) => { const x=new Date(d+'T00:00:00'); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); };
const diffJours = (a,b) => Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);
const fdate = d => d ? new Date(d+'T00:00:00').toLocaleDateString(locale(),{day:'numeric',month:'short',year:'numeric'}) : '—';
const fcfa = n => n.toLocaleString(locale()) + ' FCFA';
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const lapin = id => etat.lapins.find(l => l.id === id);
const nom = id => { const l = lapin(id); return l ? esc(l.nom) : '(?)'; };
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const pct = (num, den) => den > 0 ? Math.round(num / den * 100) : null;
function partagerWhatsApp(texte){ window.open('https://wa.me/?text=' + encodeURIComponent(texte), '_blank'); }

const toutesRaces = () => [...RACES, ...(etat.racesPerso||[])];

/* ================= ALERTES ================= */
function calculerAlertes(){
  const a = [];
  etat.saillies.forEach(s => {
    if(s.statut === 'attente'){
      const jp = diffJours(auj(), ajJours(s.date, PALPATION));
      if(jp <= 0) a.push({t:'warn', txt: fmt(t('al_palp'), {f:nom(s.femelle), d:fdate(s.date)})});
      const jmb = diffJours(auj(), ajJours(s.date, GESTATION));
      if(jmb <= 3 && jmb >= 0) a.push({t:'urgent', txt: fmt(t('al_soon'), {f:nom(s.femelle), d:fdate(ajJours(s.date,GESTATION)), n:jmb})});
      if(jmb < 0) a.push({t:'urgent', txt: fmt(t('al_over'), {f:nom(s.femelle), d:fdate(ajJours(s.date,GESTATION))})});
    }
    if(s.statut === 'misebas' && !s.sevre){
      const js = diffJours(auj(), ajJours(s.dateMiseBas, SEVRAGE));
      if(js <= 2){
        const q = js >= 0 ? fmt(t('al_wean_on'), {d:fdate(ajJours(s.dateMiseBas,SEVRAGE))}) : t('al_wean_now');
        a.push({t:'info', txt: fmt(t('al_wean'), {f:nom(s.femelle), q, n:s.vivants})});
      }
    }
  });
  return a;
}

/* ================= INDICATEURS DU BILAN ================= */
function calculerKPI(){
  const terminees = etat.saillies.filter(s => s.statut === 'misebas' || s.statut === 'echec');
  const reussies = etat.saillies.filter(s => s.statut === 'misebas');
  const fert = pct(reussies.length, terminees.length);
  const totVivants = reussies.reduce((x,s)=>x+(s.vivants||0),0);
  const totMorts = reussies.reduce((x,s)=>x+(s.morts||0),0);
  const prol = reussies.length ? Math.round(totVivants / reussies.length * 10) / 10 : null;
  const still = pct(totMorts, totVivants + totMorts);
  const ventes = etat.transactions.filter(x=>x.type==='vente').reduce((x,y)=>x+y.montant,0);
  const dep = etat.transactions.filter(x=>x.type==='depense').reduce((x,y)=>x+y.montant,0);
  return { fert, prol, still, ventes, dep, marge: ventes - dep, nbPortees: reussies.length, nbTerminees: terminees.length };
}
function calculerDiagnostic(k){
  const c = [];
  if(k.fert !== null && k.fert < 70) c.push(fmt(t('d_fert'), {v:k.fert}));
  if(k.prol !== null && k.prol < 6) c.push(fmt(t('d_prol'), {v:k.prol}));
  if(k.still !== null && k.still > 10) c.push(fmt(t('d_still'), {v:k.still}));
  if(etat.transactions.length && k.marge < 0) c.push(t('d_margin'));
  if(!c.length && (k.nbTerminees > 0 || etat.transactions.length > 0)) c.push(t('d_ok'));
  return c;
}

  else if(vueActive === 'cheptel') c.innerHTML = vueCheptel();
  else if(vueActive === 'repro') c.innerHTML = vueRepro();
  else if(vueActive === 'sante') c.innerHTML = vueSante();
  else if(vueActive === 'finances') c.innerHTML = vueFinances();
  else if(vueActive === 'bilan') c.innerHTML = vueBilan();
  else c.innerHTML = vueEcole();
}

function vueTableau(){
  const actifs = etat.lapins.filter(l => l.statut === 'actif');
  const fem = actifs.filter(l => l.sexe === 'F').length;
  const mal = actifs.filter(l => l.sexe === 'M').length;
  const gest = etat.saillies.filter(s => s.statut === 'attente').length;
  const kits = etat.saillies.filter(s => s.statut==='misebas' && !s.sevre).reduce((x,s)=>x+(s.vivants||0),0);
  const k = calculerKPI();
  const alertes = calculerAlertes();
  const dateJour = new Date().toLocaleDateString(locale(),{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  return `
    <h2 class="page-title">${t('dash_title')}</h2>
    <p class="page-sub">${t('dash_sub')} — ${dateJour}</p>
    <div class="grid stats">
      <div class="card stat leaf"><div class="val">${fem}</div><div class="lab">${t('st_females')}</div></div>
      <div class="card stat leaf"><div class="val">${mal}</div><div class="lab">${t('st_males')}</div></div>
      <div class="card stat amber"><div class="val">${gest}</div><div class="lab">${t('st_gest')}</div></div>
      <div class="card stat leaf"><div class="val">${kits}</div><div class="lab">${t('st_kits')}</div></div>
      <div class="card stat ${k.marge>=0?'leaf':'red'}"><div class="val ${k.marge>=0?'solde-pos':'solde-neg'}" style="font-size:1.4rem">${fcfa(k.marge)}</div><div class="lab">${t('st_balance')}</div></div>
      <div class="card stat amber"><div class="val">${etat.ecole.validees.length}/6</div><div class="lab">${t('st_school')}</div></div>
    </div>
    <div class="card">
      <h3>${t('alerts_title')}</h3>
      ${alertes.length ? alertes.map(a=>`<div class="alerte ${a.t}">${a.t==='urgent'?'⚠️':a.t==='warn'?'✋':'ℹ️'} <span>${a.txt}</span></div>`).join('')
        : `<p class="vide">${t('alerts_none')}</p>`}
    </div>`;
}

function partagerBilan(){
  const k = calculerKPI();
  const conseils = calculerDiagnostic(k);
  const actifs = etat.lapins.filter(l => l.statut === 'actif');
  const fem = actifs.filter(l=>l.sexe==='F').length, mal = actifs.filter(l=>l.sexe==='M').length;
  const kits = etat.saillies.filter(s=>s.statut==='misebas' && !s.sevre).reduce((x,s)=>x+(s.vivants||0),0);
  const v = x => x === null ? '—' : x;
  const lignes = [
    t('wa_report_title') + ' — ' + fdate(auj()),
    t('wa_herd') + ' : ' + fem + ' ♀ · ' + mal + ' ♂ · ' + kits + ' 🐇',
    t('kpi_fert') + ' : ' + v(k.fert) + (k.fert!==null?' %':''),
    t('kpi_prol') + ' : ' + v(k.prol),
    t('kpi_still') + ' : ' + v(k.still) + (k.still!==null?' %':''),
    t('st_sales') + ' : ' + fcfa(k.ventes),
    t('st_exp') + ' : ' + fcfa(k.dep),
    '*' + t('kpi_margin') + ' : ' + fcfa(k.marge) + '*'
  ];
  if(conseils.length) lignes.push(t('wa_advice') + ' : ' + conseils[0]);
  lignes.push('— CuniSmart 🐇');
  partagerWhatsApp(lignes.join('\n'));
}

function vueLecon(i){
  const l = LECONS[i][langue];
  const done = etat.ecole.validees.includes(i);
  let feedback = '';
  if(quizResultat === 'ok') feedback = `<div class="alerte info" style="margin-top:12px">🎉 <span><b>${t('quiz_pass')}</b></span></div>`;
  if(quizResultat === 'ko') feedback = `<div class="alerte urgent" style="margin-top:12px">✋ <span>${t('quiz_fail')}</span>
    <button class="btn mini" onclick="reessayerQuiz(${i})">${t('btn_retry')}</button></div>`;

  return `
    <button class="btn mini sec" onclick="fermerLecon()">${t('btn_back')}</button>
    <h2 class="page-title" style="margin-top:14px">${i+1}. ${l.ti} ${done?'<span class="tag ok">'+t('lesson_done')+'</span>':''}</h2>
    <div class="card lecon-texte" style="margin-bottom:16px">
      ${l.tx.map(p=>`<p>${p}</p>`).join('')}
    </div>
    <div class="card">
      <h3>${fmt(t('quiz_title'),{n:2})}</h3>
      <div id="quiz-zone">
      ${l.qz.map((q,qi)=>`
        <div class="quiz-q" data-q="${qi}">
          <p>${qi+1}. ${q.q}</p>
          ${q.o.map((o,oi)=>`
            <label class="quiz-opt" data-o="${oi}">
              <input type="radio" name="q${qi}" value="${oi}" ${quizResultat?'disabled':''}> ${o}
            </label>`).join('')}
        </div>`).join('')}
      </div>
      ${!quizResultat ? `<button class="btn" onclick="corrigerQuiz(${i})">${t('btn_check')}</button>` : ''}
      ${feedback}
    </div>`;
}

function ouvrirLecon(i){ leconOuverte = i; quizResultat = null; rendre(); window.scrollTo(0,0); }
function fermerLecon(){ leconOuverte = null; quizResultat = null; rendre(); }
function reessayerQuiz(i){ quizResultat = null; rendre(); }

function corrigerQuiz(i){
  const qz = LECONS[i][langue].qz;
  let bonnes = 0;
  qz.forEach((q,qi)=>{
    const sel = document.querySelector(`input[name="q${qi}"]:checked`);
    const rep = sel ? parseInt(sel.value) : -1;
    if(rep === q.b) bonnes++;
    document.querySelectorAll(`.quiz-q[data-q="${qi}"] .quiz-opt`).forEach(opt=>{
      const oi = parseInt(opt.dataset.o);
      if(oi === q.b) opt.classList.add('bonne');
      else if(oi === rep) opt.classList.add('fausse');
      opt.querySelector('input').disabled = true;
    });
  });
  quizResultat = bonnes >= 2 ? 'ok' : 'ko';
  if(quizResultat === 'ok' && !etat.ecole.validees.includes(i)){
    etat.ecole.validees.push(i); sauver();
  }
  /* Réafficher uniquement le feedback sans re-rendre le quiz (pour garder les couleurs) */
  const zone = document.getElementById('quiz-zone');
  const bloc = zone.parentElement;
  const btn = bloc.querySelector('button.btn:not(.mini)');
  if(btn) btn.remove();
  const div = document.createElement('div');
  div.innerHTML = quizResultat === 'ok'
    ? `<div class="alerte info" style="margin-top:12px">🎉 <span><b>${t('quiz_pass')}</b></span></div>
       <button class="btn sec" style="margin-top:8px" onclick="fermerLecon()">${t('btn_back')}</button>`
    : `<div class="alerte urgent" style="margin-top:12px">✋ <span>${t('quiz_fail')}</span></div>
       <button class="btn" style="margin-top:8px" onclick="reessayerQuiz(${i})">${t('btn_retry')}</button>`;
  bloc.appendChild(div);
}

function majNomCertif(v){
  etat.ecole.nom = v; sauver();
  const gn = document.querySelector('.certif .grand-nom');
  if(gn) gn.textContent = v || '…';
}
function partagerCertif(){
  const n = etat.ecole.nom ? ' — ' + etat.ecole.nom : '';
  partagerWhatsApp(t('wa_certif') + n + '\n' + fdate(auj()) + ' · CuniSmart');
}

/* ================= ACTIONS ================= */
function ajouterLapin(e){
  e.preventDefault();
  etat.lapins.push({
    id: uid(),
    nom: document.getElementById('l-nom').value.trim(),
    sexe: document.getElementById('l-sexe').value,
    race: document.getElementById('l-race').value,
    naissance: document.getElementById('l-naiss').value || null,
    statut: 'actif'
  });
  sauver(); rendre();
}
function changerStatut(id, st){ const l = lapin(id); if(!l) return; l.statut = st; sauver(); rendre(); }
function supprimerLapin(id){
  if(!confirm(t('confirm_del'))) return;
  etat.lapins = etat.lapins.filter(l=>l.id!==id); sauver(); rendre();
}
function ajouterSaillie(e){
  e.preventDefault();
  etat.saillies.push({
    id: uid(),
    femelle: document.getElementById('s-fem').value,
    male: document.getElementById('s-mal').value,
    date: document.getElementById('s-date').value,
    statut: 'attente', sevre: false
  });
  sauver(); rendre();
}
function echecSaillie(id){ const s = etat.saillies.find(x=>x.id===id); if(!s) return; s.statut='echec'; sauver(); rendre(); }
function formMiseBas(id){
  const s = etat.saillies.find(x=>x.id===id); if(!s) return;
  document.getElementById('zone-misebas').innerHTML = `
    <div class="card">
      <h3>${fmt(t('mb_title'),{f:nom(s.femelle)})}</h3>
      <form class="ligne" onsubmit="validerMiseBas(event,'${id}')">
        <div class="champ"><label>${t('f_date')}</label><input type="date" id="mb-date" value="${auj()}" required></div>
        <div class="champ"><label>${t('f_alive')}</label><input type="number" id="mb-viv" min="0" value="8" required></div>
        <div class="champ"><label>${t('f_still')}</label><input type="number" id="mb-mort" min="0" value="0" required></div>
        <button class="btn">${t('btn_ok')}</button>
      </form>
    </div>`;
  document.getElementById('zone-misebas').scrollIntoView({behavior:'smooth'});
}
function validerMiseBas(e, id){
  e.preventDefault();
  const s = etat.saillies.find(x=>x.id===id); if(!s) return;
  s.statut = 'misebas';
  s.dateMiseBas = document.getElementById('mb-date').value;
  s.vivants = parseInt(document.getElementById('mb-viv').value)||0;
  s.morts = parseInt(document.getElementById('mb-mort').value)||0;
  sauver(); rendre();
}
function sevrer(id){ const s = etat.saillies.find(x=>x.id===id); if(!s) return; s.sevre = true; sauver(); rendre(); }
function ajouterSoin(e){
  e.preventDefault();
  etat.soins.push({
    id: uid(),
    date: document.getElementById('so-date').value,
    animal: document.getElementById('so-animal').value,
    type: document.getElementById('so-type').value,
    produit: document.getElementById('so-produit').value.trim(),
    note: document.getElementById('so-note').value.trim()
  });
  sauver(); rendre();
}
