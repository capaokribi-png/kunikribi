{fr:{ti:"Gestion et rentabilité",tx:[
 "Enregistrez chaque jour : poules présentes, œufs ramassés (et séparément les œufs déclassés), aliment distribué, mortalité, dépenses et ventes. Sans ces chiffres, aucun pilotage n'est possible. L'indice de consommation (IC) = kilos d'aliment ÷ kilos d'œufs produits. Repère : environ 2,1 pour une souche améliorée à 72 semaines. Un IC dégradé est le signal d'alerte n° 1 sur la rentabilité.",
 "Un œuf cassé, sale ou pondu au sol coûte autant à produire mais rapporte moins ou rien. Réduire les œufs déclassés est une des façons les plus rapides d'améliorer la marge. Comparez vos circuits de vente : vente directe, revendeurs, restaurants, boulangeries. Le prix au plateau varie fortement.",
 "La réforme se fait généralement à 72–80 semaines : quand l'aliment consommé coûte plus que les œufs produits, le lot n'est plus rentable. La vente des poules de réforme est une vraie recette à intégrer au calcul. Commandez les poulettes de remplacement à l'avance : les couvoirs sont souvent en rupture."],
 qz:[{q:"L'indice de consommation se calcule par…",o:["Œufs ÷ poules","Kg d'aliment ÷ kg d'œufs produits","Prix de l'aliment × poules"],b:1},
     {q:"La décision de réformer un lot se prend principalement sur…",o:["L'âge en mois uniquement","Le taux de ponte comparé au coût de l'aliment","La couleur des plumes"],b:1},
     {q:"Un œuf pondu au sol et sali…",o:["Se vend au même prix","A coûté autant à produire mais rapporte moins","Ne coûte rien"],b:1},
     {q:"L'indice de consommation repère d'une souche améliorée à 72 semaines est d'environ…",o:["1,0","2,1","4,0"],b:1},
     {q:"La vente des poules de réforme…",o:["N'a aucune valeur","Est une recette réelle à intégrer au calcul","Est interdite"],b:1}]},
 en:{ti:"Management and profitability",tx:[
 "Record daily: hens present, eggs collected (and downgraded eggs separately), feed given, mortality, expenses and sales. Without these figures, no steering is possible. Feed conversion ratio (FCR) = kg of feed ÷ kg of eggs produced. Benchmark: about 2.1 for an improved strain at 72 weeks. A worsening FCR is profit warning number one.",
 "A cracked, dirty or floor egg costs as much to produce but returns less or nothing. Cutting downgraded eggs is one of the fastest ways to lift margin. Compare your sales channels: direct, resellers, restaurants, bakeries. Farm-gate prices vary greatly.",
 "Depletion is usually at 72–80 weeks: when feed costs more than the eggs produced, the flock is no longer profitable. Spent hen sales are real income to include in the calculation. Order replacement pullets well ahead: hatcheries are often out of stock."],
 qz:[{q:"Feed conversion ratio is calculated as…",o:["Eggs ÷ hens","Kg feed ÷ kg eggs produced","Feed price × hens"],b:1},
     {q:"The depletion decision rests mainly on…",o:["Age in months only","Lay rate vs cost of feed consumed","Feather colour"],b:1},
     {q:"A dirty floor egg…",o:["Sells at the same price","Cost the same to produce but returns less","Costs nothing"],b:1},
     {q:"FCR benchmark for an improved strain at 72 weeks is about…",o:["1.0","2.1","4.0"],b:1},
     {q:"Spent hen sales…",o:["Have no value","Are real income to include in the calculation","Are forbidden"],b:1}]}},

{fr:{ti:"Le stress thermique en aviculture",tx:[
 "La pondeuse est sensible à la chaleur. Au-delà de 33 °C environ, on observe des pertes de production et de la mortalité. Signe visible : la poule respire vite, bec ouvert (halètement). Elle mange moins, pond moins, et les coquilles deviennent plus fines — elle consacre son énergie à dissiper la chaleur plutôt qu'à produire.",
 "Mesures de gestion : ventilation renforcée, eau fraîche et abondante disponible en permanence (une rupture de quelques heures en forte chaleur peut décimer un lot), aliment distribué aux heures fraîches (tôt le matin, en soirée), densité réduite, ombrière ou double toiture pour réduire le rayonnement. Un lot progressivement acclimaté souffre beaucoup moins qu'un lot exposé brutalement.",
 "En saison froide, les poules mangent plus (elles brûlent de l'énergie pour se réchauffer) et pondent moins d'œufs à coquille plus épaisse. Adaptez la ration et le programme lumineux : une nuit longue diminue la durée d'éclairage disponible et peut faire chuter la ponte — compensez avec un éclairage artificiel."],
 qz:[{q:"Au-delà de quelle température environ la pondeuse subit-elle des pertes de production ?",o:["20 °C","33 °C","45 °C"],b:1},
     {q:"Le signe visible du stress thermique chez la poule est…",o:["Elle pond davantage","Elle respire vite, bec ouvert (halètement)","Elle mange plus"],b:1},
     {q:"En forte chaleur, que distribue-t-on aux heures fraîches ?",o:["De l'eau uniquement","L'aliment","Rien — on ne change pas ses habitudes"],b:1},
     {q:"Une rupture d'eau de quelques heures en forte chaleur peut…",o:["N'avoir aucun effet","Décimer un lot entier","Augmenter la ponte"],b:1},
     {q:"Pour réduire le stress thermique, on peut…",o:["Augmenter la densité","Réduire la ventilation","Distribuer l'aliment aux heures fraîches et assurer de l'eau fraîche en permanence"],b:2}]},
 en:{ti:"Heat stress in poultry",tx:[
 "The layer is sensitive to heat. Above about 33 °C, production losses and mortality occur. Visible sign: the hen breathes fast, beak open (panting). She eats less, lays less, and shells become thinner — she uses her energy dissipating heat rather than producing.",
 "Management measures: increased ventilation, abundant cool water always available (a break of a few hours in high heat can decimate a flock), feed in cool hours (early morning, evening), reduced density, shade net or double roof to cut radiation. A gradually acclimatised flock suffers far less than one exposed abruptly.",
 "In cold seasons, hens eat more (burning energy to keep warm) and lay fewer eggs with thicker shells. Adjust the ration and lighting programme: a long night reduces available day length and can drop lay — compensate with artificial lighting."],
 qz:[{q:"Above about which temperature does the layer suffer production losses?",o:["20 °C","33 °C","45 °C"],b:1},
     {q:"The visible sign of heat stress in a hen is…",o:["She lays more","She breathes fast, beak open (panting)","She eats more"],b:1},
     {q:"In high heat, what is given in cool hours?",o:["Water only","Feed","Nothing — do not change habits"],b:1},
     {q:"A water break of a few hours in high heat can…",o:["Have no effect","Decimate an entire flock","Increase lay"],b:1},
     {q:"To reduce heat stress you can…",o:["Increase density","Reduce ventilation","Feed in cool hours and keep cool water always available"],b:2}]}},

/* --- NIVEAU 3 · EXPERT (10-16) --- */
{fr:{ti:"Programme lumineux avancé",tx:[
 "La lumière contrôle la ponte via la photopériode. Un programme lumineux bien conduit peut décaler l'entrée en ponte, hisser le pic et maintenir la persistance. En poussinière, programme dégressif (réduction progressive de la durée d'éclairage) pour que la poulette grandisse avant de produire. En bâtiment de ponte, programme progressif (augmentation) pour déclencher puis soutenir la production.",
 "En bâtiment clos, la durée totale d'éclairage visée en ponte est souvent de 14 à 16 heures. En bâtiment ouvert en zone tropicale, vous ne contrôlez pas la lumière naturelle : calculez votre durée de lumière artificielle à ajouter pour atteindre la cible, et assurez une intensité suffisante (au moins 10 lux au niveau des têtes des poules).",
 "Règles d'or : ne jamais réduire la durée d'éclairage en ponte (sauf mue programmée), ne jamais stimuler un lot qui n'a pas atteint son poids cible, et vérifier régulièrement que les ampoules fonctionnent toutes — une zone sombre dans un bâtiment crée une hétérogénéité de ponte."],
 qz:[{q:"La durée d'éclairage totale visée en bâtiment de ponte est souvent de…",o:["6–8 heures","10–12 heures","14–16 heures"],b:2},
     {q:"En bâtiment ouvert en zone tropicale, vous ne pouvez pas descendre sous…",o:["8 h de lumière","La durée du jour naturel","12 h de lumière"],b:1},
     {q:"En ponte, on ne doit jamais…",o:["Augmenter la durée d'éclairage","Réduire la durée d'éclairage","Vérifier les ampoules"],b:1},
     {q:"L'intensité lumineuse minimale au niveau des têtes des poules est d'environ…",o:["1 lux","10 lux","100 lux"],b:1},
     {q:"En poussinière, le programme lumineux est…",o:["Progressif (on augmente)","Dégressif (on réduit progressivement)","Constant"],b:1}]},
 en:{ti:"Advanced lighting programme",tx:[
 "Light controls laying through photoperiod. A well-run lighting programme can delay onset of lay, raise the peak and maintain persistency. In the brooder, a step-down programme (gradually reducing day length) lets the pullet grow before producing. In the laying house, a step-up programme (increasing) triggers then sustains production.",
 "In a closed house, the target total lighting in lay is often 14–16 hours. In open-sided tropical housing, you cannot control natural light: compute the artificial light to add to hit the target, and ensure sufficient intensity (at least 10 lux at hen head height).",
 "Golden rules: never reduce day length in lay (except planned moulting), never light-stimulate a flock that has not reached target body weight, and check regularly that all bulbs work — a dark zone in a house creates a patchy lay."],
 qz:[{q:"Target total lighting in a laying house is often…",o:["6–8 hours","10–12 hours","14–16 hours"],b:2},
     {q:"In open-sided tropical housing, you cannot go below…",o:["8 h of light","Natural day length","12 h of light"],b:1},
     {q:"In lay, you must never…",o:["Increase day length","Reduce day length","Check the bulbs"],b:1},
     {q:"Minimum light intensity at hen head height is about…",o:["1 lux","10 lux","100 lux"],b:1},
     {q:"In the brooder, the lighting programme is…",o:["Step-up (increasing)","Step-down (gradually reducing)","Constant"],b:1}]}},

{fr:{ti:"Qualité de coquille et diagnostic",tx:[
 "La qualité de coquille est le premier indicateur visible d'un problème de formulation ou de santé. Tableau de diagnostic : coquille fine ou molle → calcium insuffisant ou trop fin (manque de particules) ; œuf sans coquille → carence sévère ou stress intense ; coquille rugueuse ou déformée → maladie (bronchite infectieuse en tête) ou lot trop âgé ; coquille pâle sur souche rousse → stress, chaleur, maladie ; beaucoup d'œufs cassés → coquille fragile ou pondoirs insuffisants.",
 "La solution calcium particulaire : environ la moitié du calcium doit être en grosses particules de 2–4 mm, augmentées à 3–5 mm à partir de 10 semaines. Ces particules libèrent le calcium la nuit, au moment précis où la coquille se calcifie dans l'utérus. Une poule manquant de calcium mobilise le calcium de ses os — on parle de fatigue osseuse (ostéoporose de ponte), qui entraîne des paralysies et des mortalités.",
 "L'eau joue aussi sur la coquille : une rupture d'eau réduit la consommation d'aliment et donc l'apport de calcium. La vitamine D3 est indispensable à l'absorption du calcium : une carence donne des coquilles fines même si le calcium alimentaire est suffisant. Sources : exposition à la lumière naturelle, prémix vitaminé."],
 qz:[{q:"Une coquille rugueuse ou déformée évoque d'abord…",o:["Un manque d'eau","Une maladie (notamment la bronchite infectieuse) ou un lot trop âgé","Un excès de lumière"],b:1},
     {q:"Que se passe-t-il si la poule manque de calcium sur le long terme ?",o:["Elle pond plus","Elle mobilise le calcium de ses os, risquant paralysie et mortalité","Elle mange moins"],b:1},
     {q:"La vitamine D3 est nécessaire pour…",o:["La pigmentation de la coquille","L'absorption du calcium","La couleur du jaune d'œuf"],b:1},
     {q:"La moitié du calcium doit être en grosses particules car…",o:["C'est moins cher","Elles libèrent le calcium la nuit, quand la coquille se forme","Les poules les préfèrent"],b:1},
     {q:"Un pic d'œufs sans coquille signale…",o:["Un simple changement de saison","Une carence sévère ou un stress intense","Une bonne production"],b:1}]},
 en:{ti:"Shell quality and diagnosis",tx:[
 "Shell quality is the first visible sign of a formulation or health problem. Diagnostic table: thin or soft shell → insufficient calcium or too fine (no particles); shell-less egg → severe deficiency or intense stress; rough or misshapen shell → disease (infectious bronchitis above all) or old flock; pale shell on a brown strain → stress, heat, disease; many cracked eggs → fragile shell or too few nests.",
 "The particulate calcium solution: about half the calcium should be coarse particles of 2–4 mm, raised to 3–5 mm from 10 weeks. These particles release calcium at night, at the precise moment the shell calcifies in the uterus. A calcium-deficient hen draws on bone calcium — this is cage layer fatigue (laying osteoporosis), leading to paralysis and deaths.",
 "Water also affects the shell: a water break reduces feed intake and thus calcium supply. Vitamin D3 is essential for calcium absorption: a deficiency gives thin shells even when dietary calcium is adequate. Sources: natural light exposure, vitamin premix."],
 qz:[{q:"A rough or misshapen shell points first to…",o:["Lack of water","Disease (especially infectious bronchitis) or an old flock","Too much light"],b:1},
     {q:"What happens if a hen lacks calcium long-term?",o:["She lays more","She draws on bone calcium, risking paralysis and death","She eats less"],b:1},
     {q:"Vitamin D3 is needed for…",o:["Shell pigmentation","Calcium absorption","Yolk colour"],b:1},
     {q:"Half the calcium must be coarse particles because…",o:["It is cheaper","They release calcium at night, when the shell forms","Hens prefer them"],b:1},
     {q:"A surge of shell-less eggs signals…",o:["A simple seasonal change","Severe deficiency or intense stress","Good production"],b:1}]}},

{fr:{ti:"Uniformité du lot et pesées",tx:[
 "L'uniformité se calcule ainsi : pesez au moins 100 sujets (idéalement chaque semaine), calculez le poids moyen, comptez ceux qui se trouvent entre 90 % et 110 % de ce poids moyen, divisez par le total et multipliez par 100. Un lot uniforme à 80 % ou plus entre en ponte de façon groupée, pic plus haut et plus rapide.",
 "Un lot hétérogène entre en ponte en désordre : certaines poulettes commencent trop tôt (prolapsus, petits œufs), d'autres trop tard. La principale cause d'hétérogénéité est la compétition à la mangeoire : si les mangeoires sont insuffisantes ou mal placées, les dominantes mangent et les autres attendent. Un linéaire de mangeoire de 10–12 cm par poule est la norme.",
 "Si l'uniformité est mauvaise, séparez les sujets en deux groupes (grands et petits) et adaptez l'alimentation : plus de fréquence de distribution et plus d'aliment pour les petits, moins pour les grands. Un tri à 12 semaines est encore rattrapable ; à 16 semaines, les dés sont jetés."],
 qz:[{q:"Un lot est uniforme à 75 %. Cela signifie…",o:["75 % des poules pondent","75 % des sujets sont dans ± 10 % du poids moyen","75 % ont été vaccinés"],b:1},
     {q:"La principale cause d'hétérogénéité dans un lot est…",o:["Une mauvaise génétique uniquement","La compétition à la mangeoire (espace insuffisant)","La couleur de la litière"],b:1},
     {q:"Le linéaire de mangeoire recommandé par poule est de…",o:["2–3 cm","10–12 cm","30 cm"],b:1},
     {q:"Un tri et une correction d'uniformité à 12 semaines sont…",o:["Inutiles","Encore rattrapables","Trop tardifs"],b:1},
     {q:"Un lot hétérogène entre en ponte…",o:["De façon groupée et efficace","En désordre, avec risques de prolapsus et de petits œufs","Plus rapidement"],b:1}]},
 en:{ti:"Flock uniformity and weighing",tx:[
 "Uniformity is computed as follows: weigh at least 100 birds (ideally weekly), compute the average, count those between 90% and 110% of that average, divide by the total and multiply by 100. A flock 80% or more uniform enters lay together, with a higher, faster peak.",
 "A non-uniform flock enters lay in disarray: some pullets start too early (prolapse, small eggs), others too late. The main cause of heterogeneity is feeder competition: if feeders are too few or badly placed, dominant birds eat and others wait. A feeder space of 10–12 cm per hen is the standard.",
 "If uniformity is poor, split birds into two groups (large and small) and adjust feeding: more frequent distribution and more feed for the small, less for the large. A sort at 12 weeks is still correctable; at 16 weeks, the die is cast."],
 qz:[{q:"A flock is 75% uniform. This means…",o:["75% of hens are laying","75% of birds are within ±10% of average weight","75% have been vaccinated"],b:1},
     {q:"The main cause of heterogeneity in a flock is…",o:["Bad genetics only","Feeder competition (insufficient space)","Litter colour"],b:1},
     {q:"Recommended feeder space per hen is…",o:["2–3 cm","10–12 cm","30 cm"],b:1},
     {q:"A uniformity sort and correction at 12 weeks is…",o:["Useless","Still correctable","Too late"],b:1},
     {q:"A non-uniform flock enters lay…",o:["Evenly and efficiently","In disarray, with prolapse and small-egg risks","Faster"],b:1}]}},

{fr:{ti:"Mue et prolongation du cycle",tx:[
 "La mue est le renouvellement naturel du plumage, accompagné d'un arrêt ou d'une forte baisse de ponte. En élevage commercial, on peut induire une mue forcée (restriction alimentaire ou hydrique courte, sous contrôle vétérinaire) pour donner une deuxième carrière productive au lot et retarder la réforme. Les œufs de la deuxième carrière sont plus gros, avec des coquilles meilleures.",
 "La décision de prolonger un lot (mue programmée) ou de réformer dépend du prix de l'aliment, du prix de l'œuf, du coût des poulettes de remplacement et de la disponibilité des couvoirs. Un calcul économique rigoureux est nécessaire. Règle pratique : si le taux de ponte descend sous 60–65 %, la marge devient souvent négative.",
 "Indicateurs avancés de réforme : taux de ponte < 60–65 %, proportion d'œufs déclassés en hausse, mortalité en hausse, indice de consommation dégradé. En pratique à l'échelle africaine, la réforme se fait souvent à 72 semaines, avec vente des poules au marché local comme volaille de table."],
 qz:[{q:"La mue forcée peut être utilisée pour…",o:["Augmenter la taille des œufs uniquement","Donner une deuxième carrière productive au lot","Remplacer la vaccination Newcastle"],b:1},
     {q:"Les œufs de la deuxième carrière (post-mue) sont en général…",o:["Plus petits avec des coquilles fines","Plus gros avec de meilleures coquilles","Identiques"],b:1},
     {q:"La décision de prolonger un lot plutôt que de réformer nécessite…",o:["Aucun calcul","Un calcul économique rigoureux","L'avis du voisin"],b:1},
     {q:"À quel taux de ponte environ la marge devient-elle souvent négative ?",o:["90 %","75 %","60–65 %"],b:2},
     {q:"La réforme des pondeuses se fait habituellement en élevage commercial vers…",o:["30 semaines","72–80 semaines","2 ans"],b:1}]},
 en:{ti:"Moulting and cycle extension",tx:[
 "Moulting is the natural renewal of plumage, accompanied by a stop or sharp drop in lay. In commercial farming, forced moulting can be induced (short feed or water restriction, under veterinary supervision) to give the flock a second productive career and delay depletion. Second-career eggs are larger, with better shells.",
 "The decision to extend a flock (planned moult) or deplete depends on feed price, egg price, replacement pullet cost and hatchery availability. A rigorous economic calculation is needed. Practical rule: if lay rate falls below 60–65%, the margin often turns negative.",
 "Advanced depletion indicators: lay rate < 60–65%, rising proportion of downgraded eggs, rising mortality, worsening FCR. In practice at African scale, depletion usually happens at 72 weeks, with hens sold on the local market as table poultry."],
 qz:[{q:"Forced moulting can be used to…",o:["Increase egg size only","Give the flock a second productive career","Replace Newcastle vaccination"],b:1},
     {q:"Second-career (post-moult) eggs are generally…",o:["Smaller with thin shells","Larger with better shells","Identical"],b:1},
     {q:"The decision to extend a flock rather than deplete requires…",o:["No calculation","A rigorous economic calculation","The neighbour's opinion"],b:1},
     {q:"At about which lay rate does the margin often turn negative?",o:["90%","75%","60–65%"],b:2},
     {q:"Depletion of layers in commercial farming usually happens around…",o:["30 weeks","72–80 weeks","2 years"],b:1}]}},

{fr:{ti:"Biosécurité avancée et vide sanitaire",tx:[
 "Le vide sanitaire est le cœur de la biosécurité. Il se déroule en 4 étapes : 1) Sortie du lot et retrait de toute la litière ; 2) Lavage au jet haute pression de toutes les surfaces (sol, murs, équipements) avec un détergent ; 3) Désinfection avec un désinfectant homologué, en respectant le temps de contact ; 4) Séchage complet puis période de repos avant l'entrée du lot suivant.",
 "Les points faibles habituels : les équipements qu'on oublie (mangeoires, abreuvoirs, grilles), les coins et recoins non nettoyés, la litière humide sous les perchoirs, et les rongeurs qui persistent entre les bandes. Un rattrapage de souris ou de rats pendant le vide sanitaire vaut toutes les désinfections.",
 "Vérifiez les pédiluves : un pédiluve vide ou avec un désinfectant périmé est un faux sentiment de sécurité. Changez le produit régulièrement. Formez les employés : un agent d'élevage qui entre dans le bâtiment avec les mêmes bottes que la veille contourne tout le protocole. Le sas sanitaire (vestiaire dédié, bottes réservées) est non négociable."],
 qz:[{q:"La première étape du vide sanitaire est…",o:["La désinfection chimique","La sortie du lot et l'enlèvement de toute la litière","Le repos du bâtiment"],b:1},
     {q:"Un pédiluve avec un désinfectant périmé est…",o:["Efficace quand même","Un faux sentiment de sécurité","Suffisant si changé chaque mois"],b:1},
     {q:"L'ordre des étapes du vide sanitaire est…",o:["Désinfection → Lavage → Séchage → Repos","Sortie du lot → Lavage → Désinfection → Séchage","Repos → Lavage → Sortie du lot → Désinfection"],b:1},
     {q:"Les rongeurs entre deux bandes constituent…",o:["Aucun risque particulier","Un risque majeur — ils transmettent des maladies","Un avantage, ils nettoient les restes"],b:1},
     {q:"Le sas sanitaire (vestiaire + bottes dédiées) est…",o:["Optionnel selon le budget","Non négociable pour protéger le bâtiment","Utile uniquement en saison des pluies"],b:1}]},
 en:{ti:"Advanced biosecurity and downtime",tx:[
 "Downtime is the heart of biosecurity. It runs in 4 steps: 1) Remove the flock and all litter; 2) Power-wash all surfaces (floor, walls, equipment) with detergent; 3) Disinfect with an approved product, respecting contact time; 4) Full drying then a rest period before the next flock.",
 "Usual weak points: equipment that gets overlooked (feeders, drinkers, grilles), uncleaned corners, damp litter under perches, and rodents persisting between flocks. Catching mice and rats during downtime is worth any disinfection.",
 "Check footbaths: an empty or expired-disinfectant footbath is a false sense of security. Change the product regularly. Train staff: a stockperson entering the house in yesterday's boots bypasses the whole protocol. The sanitary lock (dedicated changing room, dedicated boots) is non-negotiable."],
 qz:[{q:"The first step of downtime is…",o:["Chemical disinfection","Removing the flock and all litter","House rest"],b:1},
     {q:"A footbath with expired disinfectant is…",o:["Still effective","A false sense of security","Fine if changed monthly"],b:1},
     {q:"The order of downtime steps is…",o:["Disinfect → Wash → Dry → Rest","Remove flock → Wash → Disinfect → Dry","Rest → Wash → Remove flock → Disinfect"],b:1},
     {q:"Rodents between flocks represent…",o:["No particular risk","A major risk — they transmit diseases","An advantage, they clean leftovers"],b:1},
     {q:"The sanitary lock (changing room + dedicated boots) is…",o:["Optional depending on budget","Non-negotiable to protect the house","Useful only in the rainy season"],b:1}]}},

{fr:{ti:"Pilotage économique du lot",tx:[
 "Le coût de revient d'un œuf = total des charges ÷ nombre d'œufs vendables. Les charges comprennent : poulettes (amorties sur le cycle), aliment (60–70 % du total), santé, énergie, eau, litière, main-d'œuvre, emballages, transport. Un œuf déclassé coûte autant à produire et rapporte moins ou rien : la qualité des œufs est directement de la marge.",
 "Piloter par la marge et non par le chiffre d'affaires. Calculez votre marge par poule logée sur le cycle complet. Comparez vos circuits de vente : un œuf vendu directement à un restaurant peut valoir 1,5 à 2 fois l'œuf vendu au revendeur. La relation commerciale directe avec les acheteurs réguliers (hôtels, boulangeries, cantines) sécurise la trésorerie.",
 "Anticipez les cycles : commandez les poulettes de remplacement avant la fin du lot. Le temps entre la sortie d'un lot et l'entrée du suivant (vide sanitaire + attente poulettes) coûte cher en fixe (loyer, salaire, intérêts) sans recettes. Optimiser ce temps est un levier de rentabilité souvent négligé."],
 qz:[{q:"Le coût de revient d'un œuf se calcule par…",o:["Total des charges ÷ œufs vendables","Prix de vente × nombre de poules","Aliment ÷ poules"],b:0},
     {q:"L'aliment représente environ … du coût total de production de l'œuf.",o:["10–15 %","30–40 %","60–70 %"],b:2},
     {q:"Vendre directement à un restaurant plutôt qu'à un revendeur…",o:["Ne change rien au prix","Peut doubler ou presque la marge par œuf","Est toujours interdit"],b:1},
     {q:"Le temps entre deux bandes (vide sanitaire + attente poulettes) est…",o:["Neutre économiquement","Un coût réel en charges fixes sans recettes","Une période de repos gratuit"],b:1},
     {q:"La marge par poule logée se calcule sur…",o:["Le mois en cours uniquement","Le cycle complet","Une semaine de production"],b:1}]},
 en:{ti:"Economic management of the flock",tx:[
 "Cost per egg = total costs ÷ saleable eggs. Costs include: pullets (amortised over the cycle), feed (60–70% of total), health, energy, water, litter, labour, packaging, transport. A downgraded egg costs as much to produce and returns less or nothing: egg quality is directly margin.",
 "Steer by margin, not turnover. Compute your margin per hen housed over the full cycle. Compare sales channels: an egg sold directly to a restaurant can fetch 1.5 to 2 times the price of one sold to a reseller. Direct commercial relationships with regular buyers (hotels, bakeries, canteens) secure cash flow.",
 "Anticipate cycles: order replacement pullets before the current flock ends. The time between one flock out and the next in (downtime + pullet wait) costs money in fixed charges (rent, wages, interest) with no income. Optimising this time is an often-overlooked profitability lever."],
 qz:[{q:"Cost per egg is calculated as…",o:["Total costs ÷ saleable eggs","Selling price × number of hens","Feed ÷ hens"],b:0},
     {q:"Feed represents about … of total egg production cost.",o:["10–15%","30–40%","60–70%"],b:2},
     {q:"Selling directly to a restaurant rather than a reseller…",o:["Changes nothing","Can nearly double the margin per egg","Is always forbidden"],b:1},
     {q:"Time between flocks (downtime + pullet wait) is…",o:["Economically neutral","A real cost in fixed charges with no income","A free rest period"],b:1},
     {q:"Margin per hen housed is computed over…",o:["The current month only","The full cycle","One week of production"],b:1}]}}
,
{fr:{ti:"Couvoirs, commandes et intégration amont",tx:[
 "Choisir son couvoir est une décision stratégique : la qualité sanitaire du poussin d'un jour — taux de mycoplasme, programme vaccinal au couvoir (Marek notamment), homogénéité de l'éclosion — conditionne tout le lot. Visitez le couvoir ou renseignez-vous auprès d'éleveurs qui en sont clients. Un poussin de mauvaise qualité ne deviendra jamais une bonne pondeuse, quels que soient vos efforts.",
 "Anticipez les commandes : les couvoirs fonctionnent sur des bandes programmées longtemps à l'avance. Une commande tardive signifie un lot raté, des poulettes de mauvaise qualité ou un vide sanitaire rallongé qui coûte en charges fixes sans recettes. Planifiez sur 12 mois : sortie du lot N, vide sanitaire, entrée du lot N+1.",
 "L'intégration amont — partenariat avec un fournisseur d'aliment de confiance et un prestataire de santé animal — réduit les coûts et sécurise les approvisionnements. Négociez des prix à l'avance sur l'aliment : c'est 65–70 % de votre coût. Un écart de 5 % sur le prix de l'aliment peut doubler ou effacer votre marge."],
 qz:[{q:"Que faut-il vérifier avant de choisir son couvoir ?",o:["Le nom du directeur","La qualité sanitaire, le programme vaccinal et l'homogénéité des lots","La couleur des bâtiments"],b:1},
     {q:"Un vide sanitaire rallongé à cause d'une commande tardive coûte…",o:["Rien, c'est une pause bienvenue","En charges fixes (loyer, salaires) sans recettes","Uniquement le prix de l'aliment"],b:1},
     {q:"L'aliment représente environ … du coût de production de l'œuf.",o:["10 %","30–40 %","65–70 %"],b:2},
     {q:"Un poussin de mauvaise qualité sanitaire à la livraison…",o:["Peut être rattrapé avec un bon aliment","Ne deviendra jamais une bonne pondeuse","Suffit si on vaccine bien ensuite"],b:1},
     {q:"Négocier le prix de l'aliment à l'avance est important parce que…",o:["C'est obligatoire par la loi","Un écart de 5 % peut doubler ou effacer la marge","Cela impressionne le fournisseur"],b:1}]},
 en:{ti:"Hatcheries, ordering and upstream integration",tx:[
 "Choosing a hatchery is a strategic decision: the sanitary quality of the day-old chick — mycoplasma status, hatchery vaccination programme (Marek especially), hatch uniformity — conditions the whole flock. Visit the hatchery or ask other farmers who use it. A poor-quality chick will never become a good layer, whatever effort you put in.",
 "Plan orders ahead: hatcheries run batches scheduled far in advance. A late order means a disrupted flock, poor-quality pullets or an extended downtime that costs in fixed charges with no income. Plan on a 12-month basis: flock N out, downtime, flock N+1 in.",
 "Upstream integration — a reliable feed supplier and animal health service partner — cuts costs and secures supply. Negotiate feed prices in advance: it is 65–70% of your cost. A 5% difference in feed price can double or wipe out your margin."],
 qz:[{q:"What must you check before choosing a hatchery?",o:["The director's name","Sanitary quality, vaccination programme and flock uniformity","Building colour"],b:1},
     {q:"An extended downtime caused by a late order costs…",o:["Nothing, it is a welcome break","Fixed charges (rent, wages) with no income","Only the feed price"],b:1},
     {q:"Feed represents about … of egg production cost.",o:["10%","30–40%","65–70%"],b:2},
     {q:"A chick with poor sanitary quality on delivery…",o:["Can be rescued with good feed","Will never become a good layer","Is fine if vaccinated well afterwards"],b:1},
     {q:"Negotiating feed prices in advance matters because…",o:["It is legally required","A 5% difference can double or wipe out the margin","It impresses the supplier"],b:1}]}}

];

/* ===== ÉCOLE DE PORCICULTURE — 16 leçons ===== */
const LECONS_PORC = [

/* ---------- NIVEAU 1 · DÉBUTANT (0-5) ---------- */
{fr:{ti:"Choisir ses animaux et ses races",tx:[
 "En Afrique tropicale, le porc est l'un des élevages les plus rentables à petite échelle. Mais le choix de la race décide de tout. Le porc local africain est rustique, résistant à la chaleur et aux maladies, et nécessite peu d'intrants — mais sa croissance est lente (8 à 10 mois pour l'engraissement) et ses portées modestes (6 à 8 porcelets). Les races améliorées européennes (Large White, Landrace, Duroc, Piétrain) sont plus productives mais exigeantes : elles ont besoin d'un logement adapté, d'un aliment de qualité et d'une bonne conduite sanitaire. Le croisé — local × amélioré — est souvent le meilleur compromis pour l'éleveur africain en transition : rusticité + meilleur rendement.",
 "Quand vous achetez un animal, exigez une quarantaine de 3 à 4 semaines dans un lieu isolé de votre élevage, avant toute introduction. C'est votre premier mur de défense contre les maladies, en particulier la Peste Porcine Africaine (PPA). À l'achat, vérifiez : poil propre et lisse, yeux vifs sans écoulement, pas de diarrhée sous la queue, pattes solides sans boiterie, muqueuses roses. Une cochette destinée à la reproduction doit avoir au moins 12 mamelles bien développées et symétriques.",
 "Comptez un verrat pour 15 à 20 truies maximum. Un verrat utilisé trop souvent voit sa qualité de sperme baisser — une saillie tous les 2 jours au maximum. Renouvelez le verrat tous les 2 ans pour éviter la consanguinité dans votre cheptel. Notez chaque animal dès l'entrée dans CuniSmart : identifiant, race, date de naissance ou d'achat, père et mère si connus."],
 qz:[{q:"Le principal avantage du porc local africain face aux races améliorées est…",o:["Une croissance plus rapide","Sa rusticité et son adaptation à la chaleur","Des portées plus nombreuses"],b:1},
     {q:"Avant d'introduire un porc acheté dans votre élevage, il faut obligatoirement…",o:["Le peser","Le faire passer 3 à 4 semaines en quarantaine isolée","Le vacciner immédiatement"],b:1},
     {q:"Un verrat peut saillir au maximum…",o:["5 truies par jour","Une fois tous les 2 jours","Sans limite"],b:1},
     {q:"Combien de mamelles doit avoir au minimum une cochette de reproduction ?",o:["6","12","20"],b:1},
     {q:"Le croisé (local × amélioré) est recommandé en Afrique tropicale car…",o:["Il est moins cher à l'achat","Il combine rusticité et meilleur rendement","Il ne nécessite aucun soin"],b:1}]},
 en:{ti:"Choosing your animals and breeds",tx:[
 "In tropical Africa, the pig is one of the most profitable small-scale livestock enterprises. But breed choice decides everything. The local African pig is hardy, heat- and disease-resistant and needs few inputs — but it grows slowly (8–10 months to slaughter) and has modest litters (6–8 piglets). Improved European breeds (Large White, Landrace, Duroc, Piétrain) are more productive but demanding: they need appropriate housing, quality feed and good health management. The crossbred — local × improved — is often the best compromise for the transitioning African farmer: hardiness + better yield.",
 "When you buy an animal, insist on a 3–4 week quarantine in a place isolated from your farm before any introduction. This is your first line of defence against disease, especially African Swine Fever (ASF). On purchase, check: clean smooth coat, bright eyes with no discharge, no diarrhoea under the tail, sound legs with no lameness, pink mucous membranes. A gilt intended for breeding must have at least 12 well-developed symmetrical teats.",
 "Allow one boar for every 15–20 sows at most. A boar used too often sees his semen quality drop — one mating every 2 days maximum. Replace the boar every 2 years to avoid inbreeding in your herd. Record every animal in CuniSmart from day one: ID, breed, date of birth or purchase, sire and dam if known."],
 qz:[{q:"The main advantage of the local African pig over improved breeds is…",o:["Faster growth","Hardiness and heat tolerance","More numerous litters"],b:1},
     {q:"Before introducing a purchased pig into your farm, you must…",o:["Weigh it","Keep it in isolated quarantine for 3–4 weeks","Vaccinate it immediately"],b:1},
     {q:"A boar can mate at most…",o:["5 sows per day","Once every 2 days","Without limit"],b:1},
     {q:"How many teats must a breeding gilt have at minimum?",o:["6","12","20"],b:1},
     {q:"The crossbred (local × improved) is recommended in tropical Africa because…",o:["It is cheaper to buy","It combines hardiness and better yield","It needs no care at all"],b:1}]}},

{fr:{ti:"Construire et organiser la porcherie",tx:[
 "La porcherie est l'investissement de départ le plus important — et le plus structurant pour toute la conduite de l'élevage. La règle n°1 : séparer les stades physiologiques. Une bonne porcherie comprend au minimum : la verraterie (loge individuelle pour le mâle), les loges des truies gestantes (groupe ou individuel), la maternité (case individuelle d'environ 6 m² avec barre anti-écrasement), le post-sevrage et les loges d'engraissement. Mélanger les stades provoque stress, compétition, transmission de maladies.",
 "Le sol bétonné est indispensable : pente de 2 à 3 % vers un caniveau qui permet d'évacuer facilement le lisier et les eaux de lavage. La propreté du sol est la première protection sanitaire. Le toit doit déborder largement (1,5 m minimum) pour protéger les murs de la pluie et créer de l'ombre. Le porc ne transpire pas : il souffre dès que la température dépasse 30 °C. Orientez le bâtiment face aux vents dominants, prévoyez un espace humide (bauge) ou un arrosage au sol pour rafraîchir. Densité : environ 1 m² par porc à l'engrais, 6 m² pour une truie suitée.",
 "La porcherie doit être clôturée et fermée aux animaux extérieurs. Les phacochères, potamochères et sangliers sont porteurs sains de la PPA — un seul contact avec vos porcs peut décimer tout l'élevage en quelques jours. Prévoyez aussi un pédiluve à l'entrée et un vestiaire dédié : les chaussures et les vêtements apportés de l'extérieur sont des vecteurs de maladies aussi réels que les animaux eux-mêmes."],
 qz:[{q:"Pourquoi faut-il séparer les stades physiologiques dans la porcherie ?",o:["Pour le plaisir des animaux","Pour éviter stress, compétition et transmission de maladies","Pour réduire la consommation d'aliment uniquement"],b:1},
     {q:"La pente du sol bétonné d'une porcherie doit être de…",o:["0 % (sol plat)","2 à 3 % vers un caniveau","10 % vers l'extérieur"],b:1},
     {q:"Le porc commence à souffrir de la chaleur à partir de…",o:["20 °C","30 °C","40 °C"],b:1},
     {q:"Pourquoi clôturer la porcherie et empêcher l'accès aux animaux sauvages ?",o:["Pour éviter le vol","Parce que les phacochères et sangliers peuvent transmettre la PPA","Par obligation légale uniquement"],b:1},
     {q:"La surface recommandée pour une truie suitée en maternité est d'environ…",o:["1 m²","6 m²","20 m²"],b:1}]},
 en:{ti:"Building and organising the pig house",tx:[
 "The pig house is the biggest start-up investment — and the one that most shapes herd management. Rule number one: separate the physiological stages. A good pig house has at minimum: a boar pen (individual), gestating sow pens (group or individual), a farrowing unit (individual pen of about 6 m² with a farrowing rail), a weaner section and fattening pens. Mixing stages causes stress, competition and disease spread.",
 "A concrete floor is essential: 2–3% slope toward a channel to drain slurry and wash water easily. Floor cleanliness is the primary health protection. The roof must overhang generously (at least 1.5 m) to keep walls dry and provide shade. The pig does not sweat: it suffers as soon as temperature exceeds 30 °C. Orient the building facing prevailing winds, provide a wallow or floor wetting to cool animals. Density: about 1 m² per fattening pig, 6 m² for a nursing sow.",
 "The pig house must be fenced and closed to outside animals. Warthogs, bushpigs and wild boar are healthy carriers of ASF — a single contact with your pigs can wipe out the whole herd within days. Also provide a footbath at the entrance and a dedicated changing area: shoes and clothes brought from outside are just as real a disease vector as animals."],
 qz:[{q:"Why must physiological stages be separated in the pig house?",o:["For the animals' comfort","To prevent stress, competition and disease transmission","To reduce feed intake only"],b:1},
     {q:"The slope of a pig house concrete floor should be…",o:["0% (flat)","2–3% toward a channel","10% toward the outside"],b:1},
     {q:"A pig starts to suffer from heat above…",o:["20 °C","30 °C","40 °C"],b:1},
     {q:"Why fence the pig house and stop access by wild animals?",o:["To prevent theft","Because warthogs and wild boar can transmit ASF","For legal obligation only"],b:1},
     {q:"Recommended space for a nursing sow in the farrowing unit is about…",o:["1 m²","6 m²","20 m²"],b:1}]}},

{fr:{ti:"Alimentation : les bases tropicales",tx:[
 "Le porc est omnivore et valorise très bien les sous-produits agricoles locaux. C'est son atout majeur en Afrique tropicale. Mais une règle est absolue et non négociable : ne jamais donner de déchets de cuisine contenant de la viande ou des produits à base de porc (même cuits, même en petite quantité). Le virus de la PPA survit plusieurs mois dans la viande et des années dans la viande congelée. Un seul repas contaminé peut décimer tout l'élevage.",
 "Les matières premières locales utilisables et sûres : son de maïs ou de riz (énergie + fibres), tourteau d'arachide ou de soja (protéines), pulpe de manioc séchée (énergie, max 30 % de la ration car pauvre en protéines), drêches de brasserie séchées (protéines), feuilles de citrouille et feuilles de patate douce bien fanées (fibres + vitamines). Compléter avec un prémix vitamino-minéral, de la poudre d'os ou coquilles d'huîtres pour le calcium et le phosphore, et une pincée de sel. Jamais de déchets de cuisine crus.",
 "L'eau est le premier nutriment. Un porc adulte boit 5 à 10 litres par jour — et une truie allaitante jusqu'à 20 litres. Un manque d'eau, même quelques heures, réduit l'appétit et la croissance. En zone tropicale, l'eau doit être fraîche et disponible en permanence. Les besoins alimentaires varient selon le stade : porcelet démarrage (protéines 18–20 %), croissance (16–18 %), finition (14–16 %), truie gestante (14–15 %, rationnée), truie allaitante (18–20 %, à volonté)."],
 qz:[{q:"Pourquoi ne jamais donner de déchets de cuisine avec de la viande de porc à vos porcs ?",o:["C'est interdit par la religion","Le virus de la PPA survit dans la viande et peut décimer tout l'élevage","Les porcs n'aiment pas ça"],b:1},
     {q:"La pulpe de manioc séchée ne doit pas dépasser … de la ration du porc.",o:["5 %","30 %","80 %"],b:1},
     {q:"Une truie allaitante peut boire jusqu'à … d'eau par jour.",o:["2 litres","10 litres","20 litres"],b:2},
     {q:"Le stade qui a les besoins en protéines les plus élevés est…",o:["La truie gestante","Le porcelet au démarrage (18–20 %)","Le porc en finition"],b:1},
     {q:"Les matières premières interdites aux porcs en Afrique sont…",o:["Le son de maïs","Les déchets de cuisine contenant de la viande de porc","Le tourteau d'arachide"],b:1}]},
 en:{ti:"Feeding: tropical basics",tx:[
 "The pig is omnivorous and makes excellent use of local agricultural by-products. That is its main advantage in tropical Africa. But one rule is absolute and non-negotiable: never give kitchen scraps containing meat or pork products (even cooked, even in small quantities). The ASF virus survives for months in meat and years in frozen meat. A single contaminated meal can wipe out the entire herd.",
 "Safe and usable local raw materials: maize or rice bran (energy + fibre), groundnut or soybean cake (protein), dried cassava pulp (energy, max 30% of ration as it is low in protein), dried brewers' grains (protein), pumpkin leaves and well-wilted sweet potato leaves (fibre + vitamins). Complete with a vitamin-mineral premix, bone meal or crushed oyster shells for calcium and phosphorus, and a pinch of salt. Never raw kitchen waste.",
 "Water is the first nutrient. An adult pig drinks 5–10 litres a day — and a nursing sow up to 20 litres. Even a few hours without water reduces appetite and growth. In tropical conditions, water must be cool and permanently available. Feed needs vary by stage: piglet starter (protein 18–20%), grower (16–18%), finisher (14–16%), gestating sow (14–15%, rationed), nursing sow (18–20%, ad lib)."],
 qz:[{q:"Why never feed kitchen scraps containing pork meat to your pigs?",o:["It is religiously forbidden","The ASF virus survives in meat and can wipe out the herd","Pigs do not like it"],b:1},
     {q:"Dried cassava pulp must not exceed … of a pig's ration.",o:["5%","30%","80%"],b:1},
     {q:"A nursing sow can drink up to … of water per day.",o:["2 litres","10 litres","20 litres"],b:2},
     {q:"The stage with the highest protein needs is…",o:["The gestating sow","The starter piglet (18–20%)","The finishing pig"],b:1},
     {q:"The raw materials forbidden for pigs in Africa are…",o:["Maize bran","Kitchen scraps containing pork meat","Groundnut cake"],b:1}]}},

{fr:{ti:"Le cycle de reproduction : comprendre pour piloter",tx:[
 "Maîtriser le cycle de la truie, c'est maîtriser son revenu. La truie revient en chaleur toutes les 3 semaines (21 jours). Les chaleurs durent 2 à 3 jours. Le signe le plus fiable : le réflexe d'immobilité — posez la main sur le dos de la truie et exercez une pression ; si elle reste immobile, elle est en chaleur et prête pour la saillie. Ce réflexe est encore plus net en présence du verrat.",
 "La cochette (jeune femelle n'ayant jamais mis bas) ne doit pas être saillie avant 7 à 8 mois et 100 à 120 kg minimum. Saillir trop tôt donne une portée réduite, épuise la cochette avant la fin de sa croissance, et raccourcit sa carrière. La gestation dure exactement 114 jours — 3 mois, 3 semaines, 3 jours. La mise bas a lieu entre le 114ème et le 118ème jour. Après le sevrage (28 jours en intensif, 45 jours en extensif), la truie revient en chaleur 3 à 5 jours plus tard.",
 "Objectif de conduite : 2 à 2,2 portées par truie et par an. Pour l'atteindre, l'intervalle entre le sevrage et la saillie fécondante suivante doit rester court (idéalement 5 à 7 jours). Un intervalle long signifie souvent une truie trop maigre en fin de lactation. Notez chaque saillie dans CuniSmart avec la date exacte : le logiciel calcule automatiquement la date prévue de mise bas."],
 qz:[{q:"La truie revient en chaleur tous les…",o:["14 jours","21 jours","31 jours"],b:1},
     {q:"Le signe le plus fiable de chaleur chez la truie est…",o:["Elle mange moins","Le réflexe d'immobilité au toucher du dos","Elle crie fort"],b:1},
     {q:"La gestation de la truie dure…",o:["31 jours","114 jours","283 jours"],b:1},
     {q:"Une cochette ne doit pas être saillie avant…",o:["3 mois","7 à 8 mois et 100 kg minimum","2 ans"],b:1},
     {q:"L'objectif de portées par truie et par an est de…",o:["1 portée","2 à 2,2 portées","4 portées"],b:1}]},
 en:{ti:"The reproduction cycle: understand to manage",tx:[
 "Mastering the sow cycle means mastering your income. The sow returns to heat every 3 weeks (21 days). Oestrus lasts 2–3 days. The most reliable sign: the standing reflex — place your hand on the sow's back and apply pressure; if she stands still, she is in heat and ready to mate. This reflex is even stronger in the presence of the boar.",
 "The gilt (young female that has never farrowed) must not be mated before 7–8 months and at least 100–120 kg. Mating too early gives a reduced litter, exhausts the gilt before she has finished growing, and shortens her career. Gestation lasts exactly 114 days — 3 months, 3 weeks, 3 days. Farrowing occurs between day 114 and 118. After weaning (28 days intensive, 45 days extensive), the sow returns to heat 3–5 days later.",
 "Management target: 2 to 2.2 litters per sow per year. To achieve this, the interval from weaning to the next successful mating must stay short (ideally 5–7 days). A long interval usually means a sow that was too thin at the end of lactation. Record every mating in CuniSmart with the exact date: the software automatically calculates the expected farrowing date."],
 qz:[{q:"The sow returns to heat every…",o:["14 days","21 days","31 days"],b:1},
     {q:"The most reliable sign of heat in a sow is…",o:["She eats less","The standing reflex when pressure is applied to her back","She calls out loudly"],b:1},
     {q:"Sow gestation lasts…",o:["31 days","114 days","283 days"],b:1},
     {q:"A gilt must not be mated before…",o:["3 months","7–8 months and at least 100 kg","2 years"],b:1},
     {q:"The target number of litters per sow per year is…",o:["1 litter","2 to 2.2 litters","4 litters"],b:1}]}},

{fr:{ti:"La mise bas et les premiers jours des porcelets",tx:[
 "La mise bas est le moment le plus critique et le plus rentable de tout le cycle. 80 % de la mortalité des porcelets survient dans les 72 premières heures. Quatre causes dominent en Afrique tropicale : l'écrasement par la truie (une truie peut peser 150 à 250 kg), le manque de colostrum, le froid nocturne, et la diarrhée des nouveau-nés. Toutes sont évitables avec de la méthode.",
 "Préparez la case de maternité 7 jours avant la date prévue : nettoyage complet, désinfection, séchage, litière sèche et propre. Installez une barre anti-écrasement (rail fixé à 25–30 cm du sol sur les côtés de la loge) : c'est la mesure la plus simple et la plus efficace pour réduire l'écrasement. Prévoyez une lampe chauffante pour les porcelets dans un coin de la loge — ils ne régulent pas encore leur température. Les porcelets doivent boire le colostrum dans les 2 premières heures : c'est vital pour leur immunité. Guidez les faibles vers les mamelles antérieures (les plus laitières).",
 "Après la mise bas, pesez la portée et comptez : nés vivants, mort-nés, et momifiés (décédés en cours de gestation). Sevrez vers 28 jours en élevage intensif. À partir du 15ème jour de vie, proposez aux porcelets un pré-starter solide en libre accès dans une mangeoire protégée de la truie (créep feeding) : cela prépare leur tube digestif au sevrage et réduit le choc alimentaire."],
 qz:[{q:"Quel pourcentage de la mortalité des porcelets survient dans les 72 premières heures ?",o:["20 %","50 %","80 %"],b:2},
     {q:"La barre anti-écrasement dans la case de maternité sert à…",o:["Attacher la truie pour la traite","Empêcher la truie d'écraser ses porcelets","Séparer les porcelets de la truie dès la naissance"],b:1},
     {q:"Le colostrum doit être bu par les porcelets…",o:["À n'importe quel moment de la première semaine","Dans les 2 premières heures après la naissance","Seulement à partir du 3ème jour"],b:1},
     {q:"Le créep feeding (pré-starter solide pour porcelets) commence à partir de…",o:["La naissance","Le 15ème jour de vie","Le sevrage"],b:1},
     {q:"La principale cause de mortalité des porcelets en Afrique tropicale est…",o:["La fièvre","L'écrasement par la truie","Le manque d'eau"],b:1}]},
 en:{ti:"Farrowing and the first days of piglets",tx:[
 "Farrowing is the most critical and most profitable moment in the whole cycle. 80% of piglet mortality happens in the first 72 hours. Four causes dominate in tropical Africa: crushing by the sow (a sow can weigh 150–250 kg), lack of colostrum, cold nights, and newborn diarrhoea. All are preventable with method.",
 "Prepare the farrowing pen 7 days before the expected date: full clean, disinfect, dry, clean dry bedding. Install a farrowing rail (rail fixed 25–30 cm from the floor on the sides of the pen): this is the simplest and most effective measure to cut crushing. Provide a heat lamp for piglets in one corner of the pen — they cannot yet regulate their temperature. Piglets must drink colostrum within the first 2 hours: it is vital for their immunity. Guide the weakest to the front teats (most productive).",
 "After farrowing, weigh the litter and count: born alive, stillborn and mummified (died during gestation). Wean at around 28 days in intensive systems. From day 15 of life, offer piglets a solid pre-starter ad lib in a creep feeder protected from the sow: this prepares their digestive tract for weaning and reduces the feed shock."],
 qz:[{q:"What percentage of piglet mortality occurs in the first 72 hours?",o:["20%","50%","80%"],b:2},
     {q:"The farrowing rail in the maternity pen is there to…",o:["Tie the sow for milking","Prevent the sow from crushing her piglets","Separate piglets from the sow at birth"],b:1},
     {q:"Colostrum must be drunk by piglets…",o:["Any time in the first week","Within the first 2 hours after birth","Only from the 3rd day"],b:1},
     {q:"Creep feeding (solid pre-starter for piglets) starts from…",o:["Birth","Day 15 of life","Weaning"],b:1},
     {q:"The main cause of piglet mortality in tropical Africa is…",o:["Fever","Crushing by the sow","Lack of water"],b:1}]}},

/* ---------- NIVEAU 2 · CONFIRMÉ (5-10) ---------- */
{fr:{ti:"Conduire le porcelet après le sevrage",tx:[
 "Le sevrage est un triple choc pour le porcelet : il quitte le lait pour l'aliment solide, il est séparé de sa mère, et il est souvent regroupé avec des inconnus. Ce stress immunitaire et digestif est la principale fenêtre de vulnérabilité après la naissance. La diarrhée post-sevrage est la première cause de mortalité à ce stade — et elle est largement évitable avec de la méthode.",
 "L'aliment post-sevrage doit être très digestible, riche en protéines (18–20 %) et distribué en petites quantités fréquentes. Les petites granulés ou la farine humidifiée facilitent la consommation. L'eau propre doit être disponible en permanence. Les porcelets sevrés ont encore besoin de chaleur : maintenez une zone chaude (25–28 °C) avec une lampe ou une résistance pendant les 2 premières semaines, surtout la nuit en saison fraîche.",
 "Triez les porcelets par taille à l'entrée en post-sevrage : les petits regroupés ensemble mangent sans être écartés par les dominants. Ne déplacez pas inutilement les animaux — chaque déplacement est un stress supplémentaire qui ralentit la croissance. Observez chaque jour : un porcelet qui ne mange pas, prostré, avec les flancs creux, est un porcelet en danger. Isolez immédiatement tout animal suspect pour éviter la contamination du groupe."],
 qz:[{q:"Le triple choc du sevrage pour le porcelet est…",o:["Alimentation + logement + vaccination","Aliment solide + séparation de la mère + nouveau groupe","Chaleur + eau + aliment"],b:1},
     {q:"La température recommandée pour les porcelets sevrés les 2 premières semaines est…",o:["15–18 °C","25–28 °C","38 °C"],b:1},
     {q:"La principale cause de mortalité au stade post-sevrage est…",o:["L'écrasement","La diarrhée post-sevrage","La chaleur"],b:1},
     {q:"Pourquoi trier les porcelets par taille à l'entrée en post-sevrage ?",o:["Pour les peser plus facilement","Pour que les petits mangent sans être écartés par les dominants","Pour les identifier"],b:1},
     {q:"Face à un porcelet prostré qui ne mange pas, la première action est…",o:["Le nourrir de force","L'isoler immédiatement du groupe","Augmenter la chaleur générale"],b:1}]},
 en:{ti:"Managing the piglet after weaning",tx:[
 "Weaning is a triple shock for the piglet: it leaves milk for solid feed, it is separated from its mother, and it is usually grouped with strangers. This immune and digestive stress is the main window of vulnerability after birth. Post-weaning diarrhoea is the leading cause of mortality at this stage — and it is largely preventable with method.",
 "Post-weaning feed must be highly digestible, rich in protein (18–20%) and given in frequent small amounts. Small pellets or moistened meal are easier to eat. Clean water must be available at all times. Weaners still need warmth: maintain a warm zone (25–28 °C) with a lamp or heat mat for the first 2 weeks, especially at night in cool weather.",
 "Sort piglets by size on entry to the weaner pen: smaller ones grouped together eat without being pushed aside by dominant ones. Do not move animals unnecessarily — every move is additional stress that slows growth. Observe daily: a piglet that is not eating, dull, with hollow flanks, is a piglet in danger. Isolate any suspect animal immediately to prevent spread to the group."],
 qz:[{q:"The triple shock of weaning for a piglet is…",o:["Feed + housing + vaccination","Solid feed + separation from mother + new group","Heat + water + feed"],b:1},
     {q:"Recommended temperature for weaners in the first 2 weeks is…",o:["15–18 °C","25–28 °C","38 °C"],b:1},
     {q:"The leading cause of mortality at the post-weaning stage is…",o:["Crushing","Post-weaning diarrhoea","Heat"],b:1},
     {q:"Why sort piglets by size on entry to the weaner pen?",o:["To weigh them more easily","So that smaller ones can eat without being pushed aside","To identify them"],b:1},
     {q:"Facing a dull piglet that is not eating, the first action is…",o:["Force-feed it","Isolate it from the group immediately","Raise the general temperature"],b:1}]}},

{fr:{ti:"Alimentation avancée et formulation locale",tx:[
 "L'aliment représente 65 à 70 % du coût de production du porc. Réduire ce coût de 20 à 30 % grâce aux matières premières locales sans dégrader les performances, c'est le levier de rentabilité le plus accessible à l'éleveur africain. La formulation repose sur 3 piliers : énergie (maïs broyé, son, manioc séché, drêches), protéines (tourteau d'arachide ou soja, farine de poisson, drêches de brasserie), et le complément (prémix vitamino-minéral, calcaire ou poudre d'os, sel). Le maïs ne doit pas dépasser 40–45 % de la ration pour éviter un excès de lipides en finition.",
 "Le flushing truie est une technique simple et très rentable : augmentez l'alimentation de la truie 10 à 15 jours avant la saillie prévue (environ 3 kg/jour au lieu de 2,5 kg). Cela stimule l'ovulation et augmente la taille de la portée. Revenez à la ration normale dès la confirmation de gestation. Truie gestante sobre (2,2 à 2,5 kg/jour selon le format) : une truie trop grasse aura une mise bas difficile (dystocie) et allaitera moins bien. Truie allaitante : à volonté (4 à 8 kg/jour selon la taille de la portée).",
 "L'indice de consommation (IC) = kilos d'aliment ÷ kilos de gain de poids vif. Repère : 2,8 à 3,2 pour une race améliorée bien conduite en engraissement, 4 à 5 pour le porc local. Un IC qui se dégrade signale un problème : chaleur, aliment de mauvaise qualité ou déséquilibré, porc hors de sa fenêtre optimale d'engraissement, maladie en cours. Pesez chaque semaine pour calculer le gain moyen quotidien (GMQ) et décider du bon moment de vente."],
 qz:[{q:"Le flushing consiste à…",o:["Nettoyer les abreuvoirs avant la mise bas","Augmenter l'alimentation de la truie 10 à 15 jours avant la saillie","Réduire la ration en fin de gestation"],b:1},
     {q:"L'indice de consommation repère en engraissement pour une race améliorée est de…",o:["1,0 à 1,5","2,8 à 3,2","6 à 8"],b:1},
     {q:"Une truie gestante trop grasse risque…",o:["D'avoir une portée plus nombreuse","Une mise bas difficile (dystocie) et d'allaiter moins bien","De manquer de calcium"],b:1},
     {q:"Le maïs ne doit pas dépasser … de la ration du porc pour éviter l'excès de lipides.",o:["10 %","40–45 %","80 %"],b:1},
     {q:"L'aliment représente environ … du coût de production du porc.",o:["20–25 %","65–70 %","90 %"],b:1}]},
 en:{ti:"Advanced feeding and local formulation",tx:[
 "Feed represents 65–70% of pig production cost. Cutting that cost by 20–30% using local raw materials without hurting performance is the most accessible profitability lever for the African farmer. Formulation rests on 3 pillars: energy (ground maize, bran, dried cassava, draff), protein (groundnut or soya cake, fishmeal, brewers' grains), and the complement (vitamin-mineral premix, limestone or bone meal, salt). Maize should not exceed 40–45% of the ration to avoid excess fat at finishing.",
 "Sow flushing is a simple and highly profitable technique: increase the sow's feed 10–15 days before the planned mating (about 3 kg/day instead of 2.5 kg). This stimulates ovulation and increases litter size. Return to normal ration as soon as gestation is confirmed. Gestating sow — lean (2.2–2.5 kg/day depending on frame size): an over-fat sow will have a difficult farrowing (dystocia) and will suckle poorly. Nursing sow: ad lib (4–8 kg/day depending on litter size).",
 "Feed conversion ratio (FCR) = kg feed ÷ kg live weight gain. Benchmark: 2.8 to 3.2 for a well-managed improved breed at fattening, 4–5 for the local pig. A worsening FCR signals a problem: heat, poor or unbalanced feed, pig outside its optimal fattening window, ongoing disease. Weigh weekly to compute average daily gain (ADG) and decide the right time to sell."],
 qz:[{q:"Flushing consists of…",o:["Cleaning drinkers before farrowing","Increasing the sow's feed 10–15 days before mating","Reducing ration at the end of gestation"],b:1},
     {q:"FCR benchmark for an improved breed at fattening is…",o:["1.0 to 1.5","2.8 to 3.2","6 to 8"],b:1},
     {q:"An over-fat gestating sow risks…",o:["Having a more numerous litter","A difficult farrowing (dystocia) and poorer nursing","Calcium deficiency"],b:1},
     {q:"Maize should not exceed … of the pig's ration to avoid excess fat.",o:["10%","40–45%","80%"],b:1},
     {q:"Feed represents about … of pig production cost.",o:["20–25%","65–70%","90%"],b:1}]}},

{fr:{ti:"La PPA : comprendre pour survivre",tx:[
 "La Peste Porcine Africaine est la menace n°1 de l'élevage porcin en Afrique subsaharienne. C'est une maladie virale causée par un Asfivirus, endémique dans la faune sauvage africaine depuis des décennies — phacochères, potamochères et certaines tiques (genre Ornithodoros) sont porteurs sains et ne meurent pas de la maladie. Les porcs domestiques, eux, en meurent presque toujours. Il n'existe aucun vaccin et aucun traitement. La mortalité approche 100 % dans les 10 jours.",
 "Le virus est extrêmement résistant dans l'environnement : il survit plusieurs mois dans les sécrétions, des mois à des années dans la viande selon les conditions de conservation, et des années dans la viande congelée. La transmission se fait par contact direct porc à porc, par les déchets de cuisine contenant de la viande de porc ou sanglier, par les humains et les véhicules contaminés, et par les tiques vectrices. Les symptômes : fièvre très haute (40–42 °C), taches hémorragiques rouges ou violacées sur la peau (oreilles, ventre, pattes), prostration totale, refus d'alimentation, mort rapide en 3 à 10 jours.",
 "Conduite à tenir en cas de suspicion : isoler immédiatement les animaux suspects, ne rien vendre ni déplacer, ne pas abattre pour la viande (le virus se propage), alerter le vétérinaire ou l'autorité sanitaire de votre zone. En Afrique centrale et de l'Ouest, la déclaration rapide peut déclencher un appui vétérinaire et parfois des indemnisations. La PPA ne touche pas l'humain : vous ne risquez rien à manipuler un porc malade — mais votre élevage, oui."],
 qz:[{q:"La PPA est transmise aux porcs domestiques par…",o:["L'eau de pluie","Contact avec des porcs infectés, déchets de cuisine à base de porc, ou tiques vectrices","L'air uniquement"],b:1},
     {q:"Il existe un vaccin efficace contre la PPA.",o:["Oui, disponible chez le vétérinaire","Non, il n'existe aucun vaccin ni traitement","Oui mais très coûteux"],b:1},
     {q:"La fièvre dans la PPA atteint…",o:["38–39 °C (normale)","40–42 °C","35 °C"],b:1},
     {q:"Face à un cas suspect de PPA, la première action est…",o:["Abattre immédiatement tous les porcs pour la viande","Isoler les animaux suspects et alerter le vétérinaire sans rien vendre ni déplacer","Donner des antibiotiques en urgence"],b:1},
     {q:"La PPA est-elle dangereuse pour l'humain ?",o:["Oui, c'est une zoonose mortelle","Non, elle ne touche que les porcs et suidés sauvages","Oui, mais seulement chez les enfants"],b:1}]},
 en:{ti:"ASF: understand to survive",tx:[
 "African Swine Fever is the number-one threat to pig farming in sub-Saharan Africa. It is a viral disease caused by an Asfivirus, endemic in African wildlife for decades — warthogs, bushpigs and certain ticks (genus Ornithodoros) are healthy carriers that do not die from the disease. Domestic pigs almost always do. There is no vaccine and no treatment. Mortality approaches 100% within 10 days.",
 "The virus is extremely resistant in the environment: it survives months in secretions, months to years in meat depending on storage conditions, and years in frozen meat. Transmission is by direct pig-to-pig contact, by kitchen scraps containing pork or wild boar meat, by contaminated people and vehicles, and by vector ticks. Symptoms: very high fever (40–42 °C), red or purple haemorrhagic patches on the skin (ears, belly, legs), total prostration, refusal to eat, rapid death in 3–10 days.",
 "What to do if ASF is suspected: isolate suspect animals immediately, sell and move nothing, do not slaughter for meat (the virus spreads), alert the vet or animal health authority in your area. In Central and West Africa, rapid reporting can trigger veterinary support and sometimes compensation. ASF does not affect humans: you risk nothing by handling a sick pig — but your farm does."],
 qz:[{q:"ASF is transmitted to domestic pigs by…",o:["Rainwater","Contact with infected pigs, pork kitchen scraps, or vector ticks","Air only"],b:1},
     {q:"There is an effective vaccine against ASF.",o:["Yes, available from the vet","No, there is no vaccine or treatment","Yes but very expensive"],b:1},
     {q:"Fever in ASF reaches…",o:["38–39 °C (normal)","40–42 °C","35 °C"],b:1},
     {q:"Facing a suspected ASF case, the first action is…",o:["Immediately slaughter all pigs for meat","Isolate suspect animals and alert the vet without selling or moving anything","Give antibiotics urgently"],b:1},
     {q:"Is ASF dangerous for humans?",o:["Yes, it is a fatal zoonosis","No, it only affects pigs and wild suids","Yes, but only in children"],b:1}]}},

{fr:{ti:"Santé, vaccinations et parasites",tx:[
 "En l'absence de vaccin contre la PPA, la biosécurité est la seule protection. Mais d'autres maladies évitables existent et méritent un programme prophylactique rigoureux. Le rouget (érysipèle) est une bactériose très répandue en zone tropicale : fièvre, lésions cutanées en losanges, prostration, morts subites chez les jeunes — un vaccin existe et doit être administré selon le calendrier de votre vétérinaire. La parvovirose truie provoque avortements et mortinatalité — vacciner avant la première saillie.",
 "Le déparasitage est souvent négligé et pourtant très rentable. Les parasites internes (helminthes : ascaris, trichures) réduisent silencieusement la croissance et l'efficacité alimentaire. Déparasitez systématiquement à chaque cycle reproducteur de la truie et à l'entrée de tout nouvel animal. La gale porcine (Sarcoptes scabiei) est très contagieuse et très répandue : prurit intense, perte de poils, retard de croissance — traitez avec un acaricide toute la loge et tous les animaux en même temps.",
 "Règle d'or : la température rectale normale du porc est de 38 à 39,5 °C. Toute fièvre au-delà de 40 °C appelle une action immédiate : isolement, observation, appel du vétérinaire. Ne donnez jamais d'antibiotiques sans diagnostic — cela crée des résistances et laisse des résidus dans la viande qui peuvent vous coûter des clients. Nettoyage et désinfection de la case entre chaque lot : c'est la première médecine."],
 qz:[{q:"Quelle maladie bactérienne du porc provoque des lésions cutanées en losanges et des morts subites ?",o:["La PPA","Le rouget (érysipèle)","La gale"],b:1},
     {q:"La gale porcine est causée par…",o:["Un virus","Un parasite externe (Sarcoptes scabiei)","Une bactérie"],b:1},
     {q:"La température rectale normale du porc est de…",o:["36–37 °C","38–39,5 °C","41–42 °C"],b:1},
     {q:"Pourquoi ne pas donner des antibiotiques sans diagnostic vétérinaire ?",o:["C'est trop cher","Cela crée des résistances et laisse des résidus dans la viande","Les antibiotiques sont inefficaces chez le porc"],b:1},
     {q:"Le déparasitage de la truie se fait…",o:["Une seule fois dans sa vie","À chaque cycle reproducteur","Uniquement si elle montre des symptômes"],b:1}]},
 en:{ti:"Health, vaccinations and parasites",tx:[
 "With no vaccine against ASF, biosecurity is the only protection. But other preventable diseases exist and deserve a rigorous prophylaxis programme. Erysipelas is a bacterial disease very widespread in tropical conditions: fever, diamond-shaped skin lesions, prostration, sudden deaths in young pigs — a vaccine exists and should be given on your vet's schedule. Sow parvovirus causes abortions and stillbirths — vaccinate before the first mating.",
 "Deworming is often neglected yet very profitable. Internal parasites (helminths: ascarids, whipworms) silently reduce growth and feed efficiency. Deworm systematically at each reproductive cycle of the sow and on entry of any new animal. Pig mange (Sarcoptes scabiei) is highly contagious and very widespread: intense itching, hair loss, growth lag — treat the whole pen and all animals simultaneously with an acaricide.",
 "Golden rule: normal rectal temperature in pigs is 38–39.5 °C. Any fever above 40 °C calls for immediate action: isolation, observation, call the vet. Never give antibiotics without a diagnosis — it creates resistance and leaves residues in the meat that can cost you customers. Cleaning and disinfection of the pen between every group: that is the first medicine."],
 qz:[{q:"Which bacterial pig disease causes diamond-shaped skin lesions and sudden deaths?",o:["ASF","Erysipelas","Mange"],b:1},
     {q:"Pig mange is caused by…",o:["A virus","An external parasite (Sarcoptes scabiei)","A bacterium"],b:1},
     {q:"Normal rectal temperature in pigs is…",o:["36–37 °C","38–39.5 °C","41–42 °C"],b:1},
     {q:"Why not give antibiotics without a veterinary diagnosis?",o:["It is too expensive","It creates resistance and leaves residues in the meat","Antibiotics are ineffective in pigs"],b:1},
     {q:"Sow deworming is done…",o:["Once in her life","At each reproductive cycle","Only if symptoms appear"],b:1}]}},

/* ---------- NIVEAU 3 · EXPERT (10-16) ---------- */
{fr:{ti:"La truie haute performance",tx:[
 "La carrière d'une truie se joue dès ses deux premières portées. L'objectif est d'atteindre 5 à 6 portées productives — c'est à partir de la 3ème portée que la truie donne ses meilleures performances. Les deux premières sont souvent les moins prolifiques car la truie est encore en croissance pendant la gestation. C'est pourquoi la cochette doit être sailllie au bon poids, bien nourrie pendant la gestation, et surtout ne pas finir trop maigre à l'issue de la lactation.",
 "Le pilotage par la note d'état corporel (NEC) est l'outil clé de la truie haute performance. La NEC se note de 1 (cachectique) à 5 (obèse), l'idéal étant 3 à 3,5 à la saillie et à la mise bas, et pas moins de 2,5 au sevrage. Une truie qui atteint le sevrage trop maigre (NEC < 2,5) aura un retour en chaleur tardif (> 10 jours), une ovulation médiocre et donc une portée réduite. Adaptez la ration en conséquence : augmentez si la truie maigrit, réduisez si elle engraisse trop.",
 "L'intervalle sevrage–saillie fécondante est l'indicateur de pilotage n°1 de la conduite de la truie. Idéalement 5 à 7 jours. Au-delà de 10 jours, c'est une perte économique directe. Causes d'allongement : truie trop maigre, chaleur excessive, stress, maladie intercurrente. La réforme s'impose après 6 à 7 portées, ou si 2 portées consécutives donnent moins de 7 porcelets nés vivants, ou en cas de problèmes locomoteurs répétés qui compromettent la saillie."],
 qz:[{q:"La NEC idéale de la truie à la saillie et à la mise bas est de…",o:["1 à 2 (très maigre)","3 à 3,5","5 (obèse)"],b:1},
     {q:"Un intervalle sevrage–saillie supérieur à 10 jours signale souvent…",o:["Une excellente performance","Une truie trop maigre en fin de lactation","Une truie trop grasse"],b:1},
     {q:"La truie atteint ses meilleures performances à partir de…",o:["La 1ère portée","La 3ème portée","La 10ème portée"],b:1},
     {q:"La réforme de la truie est justifiée si…",o:["Elle a eu sa 1ère portée","2 portées consécutives donnent moins de 7 porcelets nés vivants","Elle a plus de 1 an"],b:1},
     {q:"La NEC ne doit pas descendre en dessous de … au sevrage.",o:["1","2,5","4"],b:1}]},
 en:{ti:"The high-performing sow",tx:[
 "A sow's career is decided in her first two litters. The target is 5–6 productive litters — it is from the 3rd litter onwards that the sow gives her best performance. The first two are often the least prolific because the sow is still growing during gestation. That is why the gilt must be mated at the right weight, well fed during gestation, and above all must not finish too thin after lactation.",
 "Managing by body condition score (BCS) is the key tool for a high-performing sow. BCS runs from 1 (emaciated) to 5 (obese), the ideal being 3 to 3.5 at mating and farrowing, and no less than 2.5 at weaning. A sow that reaches weaning too thin (BCS < 2.5) will have a delayed return to heat (> 10 days), poor ovulation and therefore a reduced litter. Adjust the ration accordingly: increase if the sow loses weight, reduce if she gets too fat.",
 "The weaning-to-service interval is the number-one management indicator for sow performance. Ideally 5–7 days. Beyond 10 days, it is a direct economic loss. Causes of lengthening: sow too thin, excessive heat, stress, intercurrent disease. Culling is indicated after 6–7 litters, or if 2 consecutive litters give fewer than 7 born alive, or in cases of repeated locomotion problems that compromise mating."],
 qz:[{q:"Ideal BCS of the sow at mating and farrowing is…",o:["1 to 2 (very thin)","3 to 3.5","5 (obese)"],b:1},
     {q:"A weaning-to-service interval above 10 days often signals…",o:["Excellent performance","A sow too thin at the end of lactation","A sow too fat"],b:1},
     {q:"The sow reaches her best performance from…",o:["The 1st litter","The 3rd litter","The 10th litter"],b:1},
     {q:"Culling the sow is justified if…",o:["She has had her 1st litter","2 consecutive litters give fewer than 7 born alive","She is over 1 year old"],b:1},
     {q:"BCS must not fall below … at weaning.",o:["1","2.5","4"],b:1}]}},

{fr:{ti:"Gérer la chaleur tropicale en porciculture",tx:[
 "Le porc est l'animal d'élevage le plus sensible à la chaleur. Il ne possède pratiquement pas de glandes sudoripares fonctionnelles et ne peut pas transpirer pour se refroidir. Sa seule régulation thermique est le halètement et la recherche de surfaces fraîches. Dès 30 °C, il réduit sa consommation alimentaire de 20 à 30 %, sa croissance ralentit, et son IC se dégrade. La truie allaitante est la plus touchée : elle mange moins, produit moins de lait, perd du poids, et ses porcelets croissent moins vite.",
 "Solutions architecturales : orientation du bâtiment face aux vents dominants, débords de toit de 1,5 m minimum, toiture en matériaux isolants ou double toiture avec lame d'air, murs ouverts avec filet anti-moustique pour la ventilation, bauge (zone humide avec eau froide ou sol arrosé) accessible à tous les animaux en engraissement. Surdimensionnez les abreuvoirs en saison chaude — une panne d'eau quelques heures suffit à déclencher un coup de chaleur.",
 "Solutions zootechniques : distribuez l'aliment aux heures fraîches (tôt le matin, fin d'après-midi), aspergez les toitures aux heures les plus chaudes (11 h–15 h), réduisez la densité en saison chaude, ventilateurs dans la maternité. La chaleur aggrave aussi les pathologies respiratoires et immunitaires : les animaux affaiblis par le stress thermique résistent moins aux infections et à la PPA. Tenez un registre de température dans votre porcherie — CuniSmart Santé permet de le noter."],
 qz:[{q:"Le porc régule sa température principalement par…",o:["La transpiration","Le halètement et la recherche de surfaces fraîches","Le pelage"],b:1},
     {q:"Dès 30 °C, le porc réduit sa consommation alimentaire d'environ…",o:["5 %","20 à 30 %","50 %"],b:1},
     {q:"La truie allaitante est particulièrement sensible à la chaleur car…",o:["Elle est plus grosse","Elle mange moins, produit moins de lait et perd du poids","Elle a plus de parasites"],b:1},
     {q:"Pour réduire la chaleur dans la porcherie, on peut…",o:["Fermer toutes les ouvertures","Arroser les toitures aux heures les plus chaudes","Augmenter la densité"],b:1},
     {q:"La chaleur aggrave la sensibilité aux maladies car…",o:["Les animaux dorment plus","Le stress thermique affaiblit les défenses immunitaires","Les bactéries disparaissent par la chaleur"],b:1}]},
 en:{ti:"Managing tropical heat in pig farming",tx:[
 "The pig is the livestock animal most sensitive to heat. It has virtually no functional sweat glands and cannot sweat to cool itself. Its only thermal regulation is panting and seeking cool surfaces. From 30 °C, it reduces feed intake by 20–30%, growth slows and FCR deteriorates. The nursing sow is most affected: she eats less, produces less milk, loses weight, and her piglets grow more slowly.",
 "Architectural solutions: building orientation facing prevailing winds, roof overhangs of at least 1.5 m, insulating roofing materials or double roof with air gap, open walls with mosquito net for ventilation, wallow (wet zone with cool water or watered floor) accessible to all fattening animals. Oversize drinkers in hot weather — a water failure for a few hours is enough to trigger heat stress.",
 "Management solutions: feed in cool hours (early morning, late afternoon), spray rooftops during the hottest hours (11 am–3 pm), reduce density in the hot season, fans in the farrowing unit. Heat also worsens respiratory and immune conditions: animals weakened by thermal stress resist infections and ASF less well. Keep a temperature log in your pig house — CuniSmart Health lets you record it."],
 qz:[{q:"The pig regulates its temperature mainly by…",o:["Sweating","Panting and seeking cool surfaces","Coat"],b:1},
     {q:"From 30 °C, the pig reduces feed intake by about…",o:["5%","20–30%","50%"],b:1},
     {q:"The nursing sow is especially sensitive to heat because…",o:["She is bigger","She eats less, produces less milk and loses weight","She has more parasites"],b:1},
     {q:"To reduce heat in the pig house, you can…",o:["Close all openings","Spray rooftops during the hottest hours","Increase density"],b:1},
     {q:"Heat worsens disease susceptibility because…",o:["Animals sleep more","Thermal stress weakens immune defences","Bacteria disappear with heat"],b:1}]}},
