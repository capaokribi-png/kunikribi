<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paiement reçu — CuniSmart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1b2a1f;--green:#24512f;--gold:#e0a32e;--paper:#eef2e7;--sage:#66755f;--line:#e2e6da}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 60% at 50% -10%, #f7faf2 0%, var(--paper) 60%) fixed;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;line-height:1.55}
  .card{width:100%;max-width:430px;background:#fff;border:1px solid var(--line);border-radius:18px;
    padding:34px 26px;text-align:center;box-shadow:0 16px 40px -24px rgba(27,42,31,.25)}
  .check{width:66px;height:66px;border-radius:50%;background:#e7f0e3;border:1px solid #cfe0c9;
    margin:0 auto 20px;position:relative}
  .check::after{content:"";position:absolute;left:24px;top:20px;width:11px;height:22px;
    border-right:3px solid var(--green);border-bottom:3px solid var(--green);transform:rotate(42deg)}
  h1{font-family:"Bricolage Grotesque";font-weight:800;font-size:25px;letter-spacing:-.02em;margin:0 0 10px}
  p{color:#3f4a3a;font-size:15px;margin:0 auto 22px;max-width:34ch}
  a.btn{display:inline-block;background:var(--green);color:#fff;text-decoration:none;
    font-family:"Bricolage Grotesque";font-weight:700;font-size:15.5px;padding:14px 26px;border-radius:12px}
  a.btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .ref{margin-top:18px;font-size:12px;color:var(--sage)}
</style>
</head>
<body>
  <main class="card">
    <div class="check"></div>
    <h1>Paiement reçu</h1>
    <p>Merci ! Votre abonnement CuniSmart Pro est en cours d'activation. Vous pouvez retourner à votre espace.</p>
    <a class="btn" href="/">Ouvrir mon espace</a>
    <div class="ref" id="ref"></div>
  </main>
<script>
  // AfribaPay peut renvoyer des infos dans l'URL (?order_id=...&status=...). On les affiche.
  const p = new URLSearchParams(location.search);
  const order = p.get("order_id") || p.get("reference") || "";
  if (order) document.getElementById("ref").textContent = "Référence : " + order;
</script>
</body>
</html>
